<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Bags | Sollene Group Official</title>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: sans-serif; background: #f7f3eb; color: #1a1a1a; }
        .main-header { background: #f7f3eb; display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #d4af37; background: #fff url('sollenegroup.png.png') no-repeat center center; background-size: cover; }
        .brand-title { font-size: 24px; font-weight: 800; color: #7a5c33; letter-spacing: 3px; text-transform: uppercase; }
        nav ul { display: flex; list-style: none; gap: 20px; align-items: center; }
        .nav-item { position: relative; }
        .nav-link { text-decoration: none; color: #000; font-size: 11px; font-weight: 800; text-transform: uppercase; padding: 10px 20px; cursor: pointer; display: block; }
        .btn-home-print { border: 2px solid #000; border-radius: 6px; padding: 8px 20px; background: transparent; font-weight: 800; }
        .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background-color: #fff; min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); border-radius: 4px; z-index: 1100; }
        .dropdown-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; font-size: 10px; font-weight: 700; border-bottom: 1px solid #f9f9f9; }
        .dropdown-content a:hover { background-color: #f7f3eb; color: #7a5c33; }
        .nav-item:hover .dropdown-content { display: block; }
        .cart-icon { cursor: pointer; position: relative; padding: 5px; display: flex; align-items: center; background: none; border: none; }
        .cart-badge { position: absolute; top: -10px; right: -8px; background: #7a5c33; color: #fff; font-size: 10px; font-weight: 800; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #f7f3eb; z-index: 10; }
        .products-section { padding: 60px 5%; background: #fff; min-height: 100vh; text-align: center; }
        .page-title { margin-bottom: 50px; letter-spacing: 5px; color: #7a5c33; text-transform: uppercase; font-size: 14px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1400px; margin: 0 auto; }
        .card { background: #fff; border-radius: 24px; text-align: center; padding: 0 15px 30px 15px; border: 1px solid #f5f5f5; transition: 0.4s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .img-container { width: 100%; height: 380px; overflow: hidden; background: #fdfaf6; margin-top: 15px; margin-bottom: 20px; border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .card-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-options { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .option-group { text-align: left; }
        .option-group label { display: block; font-size: 10px; font-weight: 800; color: #7a5c33; text-transform: uppercase; margin-bottom: 4px; }
        .option-select { background: #fdfaf6; border: 1px solid #e1dbcf; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; color: #1a1a1a; outline: none; cursor: pointer; }
        .btn-add { display: inline-block; background: #7a5c33; color: #fff; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 10px; cursor: pointer; transition: 0.3s; width: 100%; text-align: center; user-select: none; }
        .btn-add:hover { background: #000; }
        .side-menu { position: fixed; top: 0; right: -420px; width: 400px; height: 100%; background: #fff; box-shadow: -10px 0 50px rgba(0,0,0,0.1); z-index: 2000; transition: 0.5s; padding: 40px; overflow-y: auto; }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1900; }
        .overlay.active { display: block; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .remove-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .btn-save-continue { width: 100%; padding: 20px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 800; margin-top: 25px; cursor: pointer; text-transform: uppercase; text-align: center; font-size: 11px; letter-spacing: 1px; display: block; }
        @media(max-width: 768px) { .products-grid { grid-template-columns: 1fr; } .side-menu { width: 100%; } }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <header class="main-header">
        <div class="header-left"><div class="logo-circle"></div><h1 class="brand-title">SOLLENE GROUP</h1></div>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link btn-home-print">HOME</a></li>
                <li class="nav-item">
                    <span class="nav-link">COLLECTIONS ▼</span>
                    <div class="dropdown-content">
                        <a href="menshirts.html">MEN'S SHIRTS</a>
                        <a href="watches.html">WATCHES</a>
                        <a href="bags.html">BAGS COLLECTION</a>
                        <a href="women.html">WOMEN'S SELECTION</a>
                    </div>
                </li>
            </ul>
        </nav>
        <div class="cart-icon" onclick="toggleCart()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7a5c33" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <div class="cart-badge" id="cart-count">0</div>
        </div>
    </header>

    <main class="products-section">
        <h2 class="page-title">Executive Bags Collection</h2>
        <div class="products-grid">
            <div class="card" id="b1">
                <div class="img-container"><img src="bolsa.1.png" class="card-img" onerror="this.src='sollenegroup.png.png'"></div>
                <h3>Executive Signature Bag</h3><p style="font-weight:800; margin:10px 0; font-size: 18px;">€ 195.00</p>
                <div class="product-options"><div class="option-group"><label>Color</label><select class="option-select opt-color"><option>Classic Brown</option><option>Deep Black</option></select></div><div class="option-group"><label>Size</label><select class="option-select opt-size"><option>Standard</option><option>Mini</option></select></div></div>
                <button class="btn-add" onclick="addToCart(event, 'b1', 'Executive Signature Bag', 195)">Add to Bag</button>
            </div>
            <div class="card" id="b2">
                <div class="img-container"><img src="woman.bag.png" class="card-img" onerror="this.src='sollenegroup.png.png'"></div>
                <h3>Luxury Leather Clutch</h3><p style="font-weight:800; margin:10px 0; font-size: 18px;">€ 185.00</p>
                <div class="product-options"><div class="option-group"><label>Color</label><select class="option-select opt-color"><option>Caramel Leather</option><option>Classic Black</option></select></div><div class="option-group"><label>Size</label><select class="option-select opt-size"><option>Unique Size</option></select></div></div>
                <button class="btn-add" onclick="addToCart(event, 'b2', 'Luxury Leather Clutch', 185)">Add to Bag</button>
            </div>
        </div>
    </main>

    <div class="side-menu" id="sideMenu">
        <div onclick="toggleCart()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px; text-align: right;">✕ CLOSE</div>
        <h2>Selected Items</h2><div id="cart-list" style="margin-top:20px;"></div>
        <div style="margin-top:30px; padding-top:20px; border-top:2px solid #7a5c33; display:flex; justify-content:space-between; font-weight:800; font-size: 18px;"><span>TOTAL:</span><span id="total-price">€ 0.00</span></div>
        <button class="btn-save-continue" onclick="toggleCart()">Save & Continue Shopping</button>
    </div>

    <script>
        function getCart() { return JSON.parse(window.localStorage.getItem('sollene_cart')) || []; }
        function toggleCart() { document.getElementById('sideMenu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function addToCart(event, cardId, baseName, price) {
            event.preventDefault(); 
            const cardElement = document.getElementById(cardId);
            const color = cardElement.querySelector('.opt-color').value;
            const size = cardElement.querySelector('.opt-size').value;
            const fullName = `${baseName} (${color} / SZ: ${size})`;
            let currentCart = getCart(); currentCart.push({name: fullName, price: price});
            window.localStorage.setItem('sollene_cart', JSON.stringify(currentCart));
            updateUI(); toggleCart(); 
        }
        function removeItem(index) { let currentCart = getCart(); currentCart.splice(index, 1); window.localStorage.setItem('sollene_cart', JSON.stringify(currentCart)); updateUI(); }
        function updateUI() {
            let currentCart = getCart(); if (document.getElementById('cart-count')) document.getElementById('cart-count').innerText = currentCart.length;
            const list = document.getElementById('cart-list'); if (!list) return;
            if (currentCart.length === 0) { list.innerHTML = '<p style="color:#999; font-size:13px; text-align:center;">Bag is empty.</p>'; } 
            else { list.innerHTML = currentCart.map((item, index) => `<div class="cart-item"><div><p style="font-weight:800;">${item.name}</p><p style="color:#7a5c33; font-size:12px;">€ ${item.price}.00</p></div><button class="remove-btn" onclick="removeItem(${index})">DELETE</button></div>`).join(''); }
            if (document.getElementById('total-price')) document.getElementById('total-price').innerText = `€ ${currentCart.reduce((sum, i) => sum + i.price, 0)}.00`;
        }
        window.onload = updateUI;
    </script>
</body>
</html>
