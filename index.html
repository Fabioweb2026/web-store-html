<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Global Store | Luxury Lifestyle</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #000000; 
            color: #ffffff; 
        }

        /* HEADER */
        header {
            padding: 50px 20px;
            text-align: center;
            border-bottom: 1px solid #b39359;
            background: #0a0a0a;
        }

        .brand-name {
            font-size: 30px;
            font-weight: 800;
            color: #b39359;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        /* LAYOUT PRINCIPAL - PRODUTOS NA ESQUERDA, CARRINHO NA DIREITA */
        .main-layout {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            gap: 30px;
            align-items: flex-start; /* Alinha o topo do carrinho com o topo dos produtos */
        }

        /* LADO ESQUERDO: VITRINE */
        .shop-content {
            flex: 1; /* Ocupa o máximo de espaço possível */
        }

        h2 {
            font-size: 14px;
            color: #b39359;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 25px;
            border-left: 3px solid #b39359;
            padding-left: 15px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        /* CARD DE PRODUTO ALINHADO */
        .card {
            background: #111;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(179, 147, 89, 0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Empurra o botão para o fundo */
            height: 350px; /* ALTURA FIXA PARA FICAR TUDO ALINHADO */
            transition: 0.4s;
        }

        .card:hover { border-color: #b39359; transform: translateY(-5px); }
        .card h3 { font-size: 18px; color: #fff; margin-bottom: 10px; }
        .card .price { font-size: 22px; color: #b39359; font-weight: 800; margin-bottom: 20px; }

        .btn-add {
            background: #b39359;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* LADO DIREITO: CARRINHO TRAVADO */
        .cart-sidebar {
            width: 380px;
            background: #0a0a0a;
            border: 1px solid #b39359;
            border-radius: 24px;
            padding: 35px;
            position: sticky;
            top: 20px; /* Faz o carrinho "seguir" a rolagem da página */
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .cart-sidebar h3 {
            font-size: 16px;
            color: #b39359;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
        }

        #cart-items { min-height: 100px; margin-bottom: 30px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; font-size: 14px; }
        
        .cart-total {
            border-top: 2px solid #b39359;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: 800;
        }

        .btn-checkout {
            width: 100%;
            background: #25d366;
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: 800;
            margin-top: 30px;
            cursor: pointer;
            text-transform: uppercase;
        }

        @media(max-width: 1000px) {
            .main-layout { flex-direction: column; }
            .cart-sidebar { width: 100%; position: static; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">Sollene Global Store</div>
    </header>

    <div class="main-layout">
        <!-- ESQUERDA -->
        <main class="shop-content">
            
            <h2>Clothing & Accessories</h2>
            <div class="products-grid">
                <div class="card">
                    <h3>Executive Shirt</h3>
                    <span class="price">€ 85.00</span>
                    <button class="btn-add" onclick="add('Executive Shirt', 85)">Add to Cart</button>
                </div>
                <div class="card">
                    <h3>Leather Belt</h3>
                    <span class="price">€ 110.00</span>
                    <button class="btn-add" onclick="add('Leather Belt', 110)">Add to Cart</button>
                </div>
            </div>

            <h2>Prestige Perfumes</h2>
            <div class="products-grid">
                <div class="item-section">
                    <div class="card">
                        <h3>Sollene Intense</h3>
                        <span class="price">€ 145.00</span>
                        <button class="btn-add" onclick="add('Sollene Intense', 145)">Add to Cart</button>
                    </div>
                </div>
            </div>

        </main>

        <!-- DIREITA -->
        <aside class="cart-sidebar">
            <h3>Your Selection</h3>
            <div id="cart-items">
                <p style="text-align: center; color: #444;">Your cart is empty</p>
            </div>
            <div class="cart-total">
                <span>Total:</span>
                <span id="total-price">€ 0.00</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">Checkout on WhatsApp</button>
        </aside>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function add(name, price) {
            cart.push({name, price});
            total += price;
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #444;">Your cart is empty</p>';
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>€ ${item.price.toFixed(2)}</span>
                    </div>
                `).join('');
            }
            document.getElementById('total-price').innerText = `€ ${total.toFixed(2)}`;
        }

        function checkout() {
            if (cart.length === 0) return alert("Add items first!");
            let msg = "Order from Sollene Global Store:%0A%0A" + cart.map(i => `- ${i.name}`).join('%0A') + "%0A%0ATotal: €" + total.toFixed(2);
            window.open(`https://wa.me{msg}`);
        }
    </script>

</body>
</html>
