<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Executive Collection</title>
    <style>
        @import url('https://googleapis.com');
        html { scroll-behavior: smooth; }
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f3eb; color: #1a1a1a; min-height: 100vh; }

        /* HEADER */
        .main-header {
            background: rgba(247, 243, 235, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle {
            width: 60px; height: 60px; border-radius: 50%; border: 1px solid #7a5c33;
            background: #fff url('logo.png') no-repeat center center; background-size: cover;
        }
        .brand-info h1 { font-size: 18px; font-weight: 800; color: #7a5c33; text-transform: uppercase; }

        .cart-trigger { cursor: pointer; font-weight: 800; font-size: 12px; display: flex; gap: 10px; align-items: center; }
        .cart-count { background: #7a5c33; color: #fff; padding: 2px 8px; border-radius: 50px; font-size: 10px; }

        /* SEÇÃO DE DESTAQUE ÚNICO */
        .feature-section {
            display: flex; justify-content: center; align-items: center;
            padding: 80px 20px;
        }

        .product-focus-card {
            background: #fff; border-radius: 30px; width: 100%; max-width: 500px;
            overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.08);
            text-align: center; transition: 0.5s;
        }

        .product-focus-card:hover { transform: translateY(-10px); }

        .img-focus { width: 100%; height: 500px; object-fit: cover; background: #fff; }

        .product-details { padding: 40px; }
        .product-details h2 { font-size: 24px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .product-details p { color: #7a5c33; font-weight: 800; font-size: 28px; margin-bottom: 30px; }

        .btn-buy-now {
            width: 100%; background: #7a5c33; color: #fff; border: none;
            padding: 20px; border-radius: 50px; font-weight: 800;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .btn-buy-now:hover { background: #000; }

        /* ABA DE CHECKOUT */
        .side-menu {
            position: fixed; top: 0; right: -420px; width: 400px; height: 100%;
            background: #fff; box-shadow: -10px 0 50px rgba(0,0,0,0.1);
            z-index: 2000; transition: 0.5s; padding: 40px;
        }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1900; }
        .overlay.active { display: block; }

        @media(max-width: 500px) { .side-menu { width: 100%; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <div class="brand-info"><h1>Sollene Group</h1></div>
        </div>
        <div class="cart-trigger" onclick="toggleCart()">
            BAG <span class="cart-count" id="cartCount">0</span>
        </div>
    </header>

    <main class="feature-section">
        <div class="product-focus-card">
            <!-- SUA IMAGEM NOVA AQUI -->
            <img src="executive-shoe.png" alt="Executive Shoes" class="img-focus">
            
            <div class="product-details">
                <h2>Executive Shoes</h2>
                <p>€ 145.00</p>
                <button class="btn-buy-now" onclick="addToCart('Executive Shoes', 145)">Add to Bag</button>
            </div>
        </div>
    </main>

    <div class="side-menu" id="sideMenu">
        <div onclick="toggleCart()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px;">✕ CLOSE</div>
        <h2 style="letter-spacing:1px; font-size:18px; text-transform:uppercase;">Summary</h2>
        <div id="cartItems" style="margin-top:20px; border-bottom:1px solid #eee; padding-bottom:15px">Bag is empty</div>
        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:22px; margin-top:20px">
            <span>Total:</span>
            <span id="totalVal">€ 0.00</span>
        </div>
        <button style="width:100%; padding:18px; background:#25d366; color:#fff; border:none; border-radius:12px; font-weight:800; margin-top:40px; cursor:pointer;" onclick="finish()">Finalize on WhatsApp</button>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function toggleCart() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            updateUI();
            toggleCart();
        }

        function updateUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const container = document.getElementById('cartItems');
            container.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px"><span>${i.name}</span><span>€${i.price}.00</span></div>`).join('');
            document.getElementById('totalVal').innerText = `€ ${total}.00`;
        }

        function finish() {
            if(cart.length === 0) return alert("Empty!");
            let msg = `Hello Sollene Group, I'd like to buy: ` + cart.map(i => i.name).join(', ') + `. Total: €${total}.00`;
            window.open(`https://wa.me{msg}`);
        }
    </script>
</body>
</html>
