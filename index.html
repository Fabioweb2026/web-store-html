<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Store Group | Official Store</title>
    <style>
        @import url('https://googleapis.com');
        
        html { scroll-behavior: smooth; }
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f7f3eb; 
            color: #1a1a1a;
            overflow-x: hidden;
        }

        /* HEADER PREMIUM BEGE */
        .main-header {
            background-color: #f7f3eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 5%;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        
        .logo-circle {
            width: 65px; height: 65px;
            border-radius: 50%;
            border: 1px solid #7a5c33;
            background: #fff url('logo.png') no-repeat center center;
            background-size: cover;
        }

        .brand-info h1 {
            font-size: 22px; font-weight: 800; color: #7a5c33; 
            letter-spacing: 3px; text-transform: uppercase; line-height: 1;
        }

        nav ul { display: flex; list-style: none; gap: 15px; align-items: center; }
        nav ul li a { 
            text-decoration: none; color: #000; font-size: 11px; 
            font-weight: 800; text-transform: uppercase; 
            padding: 8px 12px; transition: 0.3s;
        }

        /* ÍCONE DE CARRINHO */
        .cart-icon-container {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 5px;
        }

        .cart-badge {
            position: absolute; top: -5px; right: -5px;
            background: #7a5c33; color: #fff;
            font-size: 9px; font-weight: 800;
            width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: 2px solid #f7f3eb;
        }

        /* SEÇÃO HERO */
        .hero-section {
            width: 100%;
            height: 85vh;
            background: url('Solle-Global-Store.png') no-repeat center top;
            background-size: cover;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 40px;
        }

        .scroll-hint { color: #7a5c33; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; font-size: 11px; }

        /* GALERIA DE PRODUTOS AJUSTADA PARA 3 ITENS */
        .products-section {
            background: #fff;
            padding: 80px 5%;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            text-align: center;
            padding-bottom: 30px;
            transition: 0.4s;
        }

        .img-container {
            width: 100%; height: 400px;
            overflow: hidden; border-radius: 20px;
            margin-bottom: 20px; background: #f9f9f9;
        }

        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover .card-img { transform: scale(1.08); }
        .card:hover { transform: translateY(-10px); }

        .btn-add {
            background: #7a5c33; color: #fff; border: none;
            padding: 14px 40px; border-radius: 50px; font-weight: 800;
            text-transform: uppercase; font-size: 10px; cursor: pointer;
        }

        /* ABA LATERAL */
        .side-menu {
            position: fixed; top: 0; right: -420px;
            width: 400px; height: 100%; background: #fff;
            box-shadow: -10px 0 50px rgba(0,0,0,0.1);
            z-index: 2000; transition: 0.5s; padding: 40px;
        }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1900; }
        .overlay.active { display: block; }

        @media(max-width: 900px) {
            .main-header { flex-direction: column; gap: 15px; }
            .side-menu { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <div class="brand-info"><h1>Sollene Group</h1></div>
        </div>
        
        <nav>
            <ul>
                <li><a href="#" style="border: 2px solid #000; border-radius: 8px;">HOME</a></li>
                <li><a onclick="toggleMenu()" style="cursor:pointer;">COLLECTIONS</a></li>
            </ul>
        </nav>

        <div class="cart-icon-container" onclick="toggleMenu()">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7a5c33" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <div class="cart-badge" id="cart-count">0</div>
        </div>
    </header>

    <section class="hero-section">
        <div class="scroll-hint">Explore Collection ↓</div>
    </section>

    <section class="products-section" id="collections">
        <div class="products-grid">
            <!-- PRODUTO 1 -->
            <div class="card">
                <div class="img-container"><img src="productos1.png" class="card-img"></div>
                <h3>Executive Shirt</h3>
                <p style="margin:15px 0; font-weight:800;">€ 85.00</p>
                <button class="btn-add" onclick="add()">Add to Cart</button>
            </div>
            <!-- PRODUTO 2 -->
            <div class="card">
                <div class="img-container"><img src="prodcuto2.png" class="card-img"></div>
                <h3>Luxury Selection</h3>
                <p style="margin:15px 0; font-weight:800;">€ 110.00</p>
                <button class="btn-add" onclick="add()">Add to Cart</button>
            </div>
            <!-- PRODUTO 3: BOLSA -->
            <div class="card">
                <div class="img-container"><img src="bolsa..png" class="card-img"></div>
                <h3>Executive Leather Bag</h3>
                <p style="margin:15px 0; font-weight:800;">€ 185.00</p>
                <button class="btn-add" onclick="add()">Add to Cart</button>
            </div>
        </div>
    </section>

    <div class="side-menu" id="sideMenu">
        <div onclick="toggleMenu()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px; text-align: right;">✕ CLOSE</div>
        <h2 style="letter-spacing:2px; font-size:18px; color:#7a5c33; text-transform:uppercase;">Your Selection</h2>
        <div id="cart-items" style="margin-top:20px; font-size:13px; color:#666;">Bag is empty.</div>
        <p style="margin-top: 30px; font-size: 11px; color: #991b1b; font-weight: 800;">* FULL PAYMENT ONLY (NO INSTALLMENTS)</p>
        <button style="width:100%; padding:18px; background:#25d366; color:#fff; border:none; border-radius:12px; font-weight:800; margin-top:20px; cursor:pointer;">CHECKOUT WHATSAPP</button>
    </div>

    <script>
        let count = 0;
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        function add() {
            count++;
            document.getElementById('cart-count').innerText = count;
            alert("Item added to your selection!");
        }
    </script>
</body>
</html>
