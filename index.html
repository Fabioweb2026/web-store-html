<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Luxury Store</title>
    <style>
        @import url('https://googleapis.com');
        html { scroll-behavior: smooth; }
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f7f3eb; 
            color: #1a1a1a;
        }

        /* HEADER FIXO */
        .main-header {
            background: rgba(247, 243, 235, 0.95);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle {
            width: 60px; height: 60px; border-radius: 50%; border: 1px solid #7a5c33;
            background: #fff url('logo.png') no-repeat center center; background-size: cover;
        }
        .brand-info h1 { font-size: 20px; font-weight: 800; color: #7a5c33; text-transform: uppercase; letter-spacing: 2px; }

        nav a { text-decoration: none; color: #000; font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        /* HERO SECTION */
        .hero-section {
            width: 100%; height: 90vh;
            background: url('Solle-Global-Store.png') no-repeat center top;
            background-size: cover;
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 50px;
        }

        /* GALERIA ABAIXO */
        .gallery-section {
            background: #fff; padding: 80px 5%; text-align: center;
        }

        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px; max-width: 1200px; margin: 0 auto;
        }

        .product-card {
            background: #fdfaf6; border-radius: 20px; overflow: hidden;
            border: 1px solid #f1eee4; transition: 0.4s; padding-bottom: 25px;
        }
        .product-card:hover { transform: translateY(-10px); border-color: #7a5c33; }

        .product-img { width: 100%; height: 450px; object-fit: cover; }

        .product-card h3 { margin: 20px 0 5px; font-size: 14px; text-transform: uppercase; font-weight: 800; }
        .product-card p { font-weight: 800; color: #7a5c33; font-size: 18px; margin-bottom: 15px; }

        /* ABA LATERAL */
        .side-menu {
            position: fixed; top: 0; right: -400px; width: 400px; height: 100%;
            background: #fff; box-shadow: -10px 0 50px rgba(0,0,0,0.2);
            z-index: 2000; transition: 0.5s; padding: 40px;
        }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; z-index: 1900; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <div class="brand-info"><h1>Sollene Group</h1></div>
        </div>
        <nav><a onclick="toggleMenu()">COLLECTIONS</a></nav>
    </header>

    <section class="hero-section"></section>

    <section class="gallery-section">
        <h2 style="margin-bottom: 50px; letter-spacing: 5px; text-transform: uppercase; font-size: 14px;">Prestige Collection</h2>
        <div class="gallery-grid">
            
            <!-- PRODUTO 1: productos1.png -->
            <div class="product-card">
                <img src="productos1.png" class="product-img" alt="Executive Shirt">
                <h3>Executive Shirt</h3>
                <p>€ 85.00</p>
            </div>

            <!-- PRODUTO 2: prodcuto2.png -->
            <div class="product-card">
                <img src="prodcuto2.png" class="product-img" alt="Luxury Selection">
                <h3>Luxury Selection</h3>
                <p>€ 110.00</p>
            </div>

            <!-- PRODUTO 3: produtdos45.png -->
            <div class="product-card">
                <img src="produtdos45.png" class="product-img" alt="Classic Collection">
                <h3>Classic Collection</h3>
                <p>€ 145.00</p>
            </div>

        </div>
    </section>

    <div class="side-menu" id="sideMenu">
        <div onclick="toggleMenu()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px;">✕ CLOSE</div>
        <h2>SELECTION</h2>
        <button style="width:100%; padding:18px; background:#25d366; color:#fff; border:none; border-radius:12px; font-weight:800; margin-top:30px; cursor:pointer;">WHATSAPP ORDER</button>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
