<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Group | Official Store</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0f0f0f;
    color: #fff;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: #000;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 2px;
}

/* HERO */
.hero {
    height: 70vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    background: linear-gradient(180deg, #111, #000);
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.hero p {
    opacity: 0.7;
}

/* COLLECTIONS */
.collections {
    padding: 60px 40px;
    text-align: center;
}

.collections h2 {
    margin-bottom: 30px;
    font-size: 28px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: #1a1a1a;
    padding: 40px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: #222;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    opacity: 0.5;
}
</style>

</head>

<body>

<header>
    <div class="logo">SOLLENE GROUP</div>
</header>

<section class="hero">
    <h1>Modern Luxury Wear</h1>
    <p>Minimal · Elegant · Premium</p>
</section>

<section class="collections" id="collections">
    <h2>COLLECTIONS</h2>

    <div class="grid">

        <div class="card" onclick="location.href='menshirts.html'">
            MEN SHIRTS
        </div>

        <div class="card" onclick="location.href='shorts.html'">
            SHORTS
        </div>

        <div class="card" onclick="location.href='accessories.html'">
            ACCESSORIES
        </div>

    </div>
</section>

<footer>
    © 2026 Sollene Group
</footer>

</body>
</html>
