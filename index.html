<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Global Store | Luxury Lifestyle</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            /* IMAGEM DE FUNDO REALISTA E FIXA */
            background: url('Solle-Global-Store.png') no-repeat center center fixed;
            background-size: cover;
            color: #1a1a1a; 
            min-height: 100vh;
        }

        /* BARRA SUPERIOR PRETA TRANSPARENTE */
        header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            color: #b39359;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #b39359;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        header h1 { font-size: 22px; font-weight: 800; letter-spacing: 8px; text-transform: uppercase; }

        .main-layout {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* LADO ESQUERDO: PRODUTOS */
        .shop-content { flex: 1; }

        h2 { 
            font-size: 11px; 
            color: #000; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 25px; 
            background: rgba(179, 147, 89, 0.8); /* Fundo dourado para ler o título */
            display: inline-block;
            padding: 8px 20px;
            border-radius: 4px;
            font-weight: 800;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* CARDS COM EFEITO VIDRO PARA APARECER O FUNDO */
        .card {
            background: rgba(255, 255, 255, 0.4); /* Muito transparente */
            backdrop-filter: blur(8px); /* Desfoque leve para dar elegância */
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            height: 260px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.4s;
        }
        .card:hover { 
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-5px);
        }

        .card h3 { font-size: 15px; font-weight: 800; color: #000; }
        .card .price { font-size: 22px; color: #000; font-weight: 800; }

        .btn-add {
            background: #000;
            color: #b39359;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 10px;
            cursor: pointer;
        }

        /* CARRINHO TRANSPARENTE NA DIREITA */
        .cart-sidebar {
            width: 350px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid #b39359;
            border-radius: 24px;
            padding: 35px;
            position: sticky;
            top: 100px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.2);
        }

        .cart-total {
            border-top: 1px solid #b39359;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 24px;
            color: #000;
        }

        .btn-checkout {
            width: 100%;
            background: #25d366;
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: 800;
            margin-top: 30px;
            cursor: pointer;
            text-transform: uppercase;
        }

        @media(max-width: 1000px) {
            .main-layout { flex-direction: column; }
            .cart-sidebar { width: 100%; position: static; }
        }
    </style>
</head>
<body>

    <header>
        <h1>SOLLENE GLOBAL STORE</h1>
    </header>

    <div class="main-layout">
        <main class="shop-content">
            <h2>Luxury Selection</h2>
            <div class="products-grid">
                <div class="card">
                    <h3>Executive Shirt</h3>
                    <span class="price">€ 85.00</span>
                    <button class="btn-add" onclick="add('Executive Shirt', 85)">Add to Cart</button>
                </div>
                <div class="card">
                    <h3>Leather Belt</h3>
                    <span class="price">€ 110.00</span>
                    <button class="btn-add" onclick="add('Leather Belt', 110)">Add to Cart</button>
                </div>
            </div>
        </main>

        <aside class="cart-sidebar">
            <h3 style="text-align:center; margin-bottom:20px; text-transform:uppercase; letter-spacing:2px;">Your Bag</h3>
            <div id="cart-items" style="margin-bottom:20px; font-weight:600;">Empty</div>
            <div class="cart-total">
                <span>Total</span>
                <span id="total-price">€ 0.00</span>
            </div>
            <button class="btn-checkout" onclick="sendWhatsApp()">WhatsApp Checkout</button>
        </aside>
    </div>

    <script>
        let cart = []; let total = 0;
        function add(n, p) {
            cart.push({n, p}); total += p; update();
        }
        function update() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#000"><span>${i.n}</span><span>€${i.p.toFixed(2)}</span></div>`).join('');
            document.getElementById('total-price').innerText = `€ ${total.toFixed(2)}`;
        }
        function sendWhatsApp() {
            if(cart.length === 0) return alert("Selecione um produto!");
            window.open(`https://wa.me from Sollene Store`);
        }
    </script>
</body>
</html>
