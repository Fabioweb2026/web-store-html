<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Global Store | Luxury Lifestyle</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            /* AJUSTE PARA NÃO CORTAR ROSTOS: Foco no topo e centro */
            background: url('Solle-Global-Store.png') no-repeat center top fixed;
            background-size: cover;
            color: #1a1a1a; 
            min-height: 100vh;
        }

        /* CAMADA DE BRILHO PARA MELHORAR A CLARIDADE DA FOTO */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1); /* Deixa a foto levemente mais clara e realista */
            z-index: -1;
        }

        header {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            color: #b39359;
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid #b39359;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        header h1 { font-size: 24px; font-weight: 800; letter-spacing: 10px; text-transform: uppercase; }

        .main-layout {
            max-width: 1400px;
            margin: 50px auto;
            padding: 0 20px;
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        /* LADO ESQUERDO: PRODUTOS */
        .shop-content { flex: 1; }

        h2 { 
            font-size: 12px; 
            color: #ffffff; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 30px; 
            background: #000;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 4px;
            font-weight: 800;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        /* CARDS COM TRANSPARÊNCIA REFINADA (EFEITO VIDRO) */
        .card {
            background: rgba(255, 255, 255, 0.3); /* Mais transparente para ver o fundo */
            backdrop-filter: blur(12px);
            padding: 30px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.4s;
        }
        .card:hover { 
            background: rgba(255, 255, 255, 0.6);
            transform: translateY(-8px);
            border-color: #b39359;
        }

        .card h3 { font-size: 16px; font-weight: 800; color: #000; text-transform: uppercase; }
        .card .price { font-size: 24px; color: #000; font-weight: 800; }

        .btn-add {
            background: #000;
            color: #b39359;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 10px;
            cursor: pointer;
            letter-spacing: 1px;
        }

        /* CARRINHO (LADO DIREITO) */
        .cart-sidebar {
            width: 380px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid #b39359;
            border-radius: 24px;
            padding: 40px;
            position: sticky;
            top: 120px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
        }

        .cart-total {
            border-top: 2px solid #b39359;
            padding-top: 25px;
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 26px;
            color: #000;
        }

        .btn-checkout {
            width: 100%;
            background: #25d366;
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: 12px;
            font-weight: 800;
            margin-top: 30px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        /* AJUSTE PARA CELULAR: PRIORIZA O ROSTO */
        @media(max-width: 1000px) {
            body { background-position: 70% top; } /* Move a foto lateralmente para focar nas pessoas no mobile */
            .main-layout { flex-direction: column; }
            .cart-sidebar { width: 100%; position: static; }
        }
    </style>
</head>
<body>

    <header>
        <h1>SOLLENE GLOBAL STORE</h1>
    </header>

    <div class="main-layout">
        <main class="shop-content">
            <h2>Luxury Collection</h2>
            <div class="products-grid">
                <div class="card">
                    <h3>Executive Shirt</h3>
                    <span class="price">€ 85.00</span>
                    <button class="btn-add" onclick="add('Executive Shirt', 85)">Add to Cart</button>
                </div>
                <div class="card">
                    <h3>Leather Belt</h3>
                    <span class="price">€ 110.00</span>
                    <button class="btn-add" onclick="add('Leather Belt', 110)">Add to Cart</button>
                </div>
            </div>
        </main>

        <aside class="cart-sidebar">
            <h3 style="text-align:center; margin-bottom:25px; text-transform:uppercase; letter-spacing:3px; color:#000;">Your Selection</h3>
            <div id="cart-items" style="margin-bottom:25px; font-weight:700; color:#000;">Empty Bag</div>
            <div class="cart-total">
                <span>Total</span>
                <span id="total-price">€ 0.00</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">WhatsApp Checkout</button>
        </aside>
    </div>

    <script>
        let cart = []; let total = 0;
        function add(n, p) {
            cart.push({n, p}); total += p; update();
        }
        function update() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid rgba(0,0,0,0.05); padding-bottom:5px;"><span>${i.n}</span><span>€${i.p.toFixed(2)}</span></div>`).join('');
            document.getElementById('total-price').innerText = `€ ${total.toFixed(2)}`;
        }
        function checkout() {
            if(cart.length === 0) return alert("Selecione um produto!");
            window.open(`https://wa.me`);
        }
    </script>
</body>
</html>
