<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Official Luxury Hub</title>
    <style>
        /* CONFIGURAÇÕES GLOBAIS DE LUXO */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        body { 
            font-family: sans-serif; 
            background: #f7f3eb; 
            color: #1a1a1a; 
            overflow-x: hidden; 
        }

        /* HEADER PREMIUM PREMIUM (STICKY) */
        .main-header {
            background: #f7f3eb; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 15px 5%; 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }
        .header-left { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        .logo-circle { 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            border: 1px solid #d4af37; 
            background: #fff url('sollenegroup.png.png') no-repeat center center; 
            background-size: cover; 
        }
        .brand-title { 
            font-size: 24px; 
            font-weight: 800; 
            color: #7a5c33; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
        }

        /* NAVEGAÇÃO E MENU DROPDOWN */
        nav ul { 
            display: flex; 
            list-style: none; 
            gap: 20px; 
            align-items: center; 
        }
        .nav-item { 
            position: relative; 
        }
        .nav-link { 
            text-decoration: none; 
            color: #000; 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            padding: 10px 20px; 
            cursor: pointer; 
            display: block; 
        }
        .btn-home-print { 
            border: 2px solid #000; 
            border-radius: 6px; 
            padding: 8px 20px; 
            background: transparent; 
            transition: 0.3s;
        }
        .btn-home-print:hover {
            background: #000;
            color: #fff;
        }

        .dropdown-content { 
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 0; 
            background-color: #fff; 
            min-width: 220px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); 
            border-radius: 4px; 
            z-index: 1100; 
        }
        .dropdown-content a { 
            color: #333; 
            padding: 12px 16px; 
            text-decoration: none; 
            display: block; 
            font-size: 10px; 
            font-weight: 700; 
            border-bottom: 1px solid #f9f9f9; 
        }
        .dropdown-content a:hover { 
            background-color: #f7f3eb; 
            color: #7a5c33; 
        }
        .nav-item:hover .dropdown-content { 
            display: block; 
        }

        /* ÍCONE DO CARRINHO E BOLINHA NOTIFICADORA */
        .cart-icon { 
            cursor: pointer; 
            position: relative; 
            padding: 5px; 
            display: flex; 
            align-items: center; 
            background: none; 
            border: none; 
            outline: none;
        }
        .cart-badge { 
            position: absolute; 
            top: -10px; 
            right: -8px; 
            background: #7a5c33; 
            color: #fff; 
            font-size: 10px; 
            font-weight: 800; 
            width: 20px; 
            height: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 50%; 
            border: 2px solid #f7f3eb; 
        }

        /* BANNER DE CAMPANHA PRINCIPAL */
        .hero-banner { 
            width: 100%; 
            height: 75vh; 
            background: url('sollenegroup.png.png') no-repeat center top; 
            background-size: cover; 
        }

        /* MENU LATERAL DE RESUMO E PAGAMENTO */
        .side-menu { 
            position: fixed; 
            top: 0; 
            right: -420px; 
            width: 400px; 
            height: 100%; 
            background: #fff; 
            box-shadow: -10px 0 50px rgba(0,0,0,0.1); 
            z-index: 2000; 
            transition: 0.5s; 
            padding: 40px; 
            overflow-y: auto; 
        }
        .side-menu.active { 
            right: 0; 
        }
        .overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.4); 
            display: none; 
            z-index: 1900; 
        }
        .overlay.active { 
            display: block; 
        }
        
        .cart-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            padding-bottom: 10px; 
            border-bottom: 1px solid #eee; 
        }
        .btn-delete { 
            color: #ff4d4d; 
            border: none; 
            background: none; 
            cursor: pointer; 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            transition: 0.2s;
        }
        .btn-delete:hover {
            color: #b91c1c;
        }

        .payment-box { 
            margin-top: 30px; 
            text-align: left; 
            background: #fdfaf6; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #f1eee4; 
        }
        
        /* BOTÃO PRINCIPAL DE FECHAMENTO */
        .btn-finalize-purchase { 
            width: 100%; 
            padding: 20px; 
            background: #000; 
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            margin-top: 25px; 
            cursor: pointer; 
            text-transform: uppercase; 
            text-align: center; 
            font-size: 11px; 
            letter-spacing: 1px; 
            transition: 0.3s;
        }
        .btn-finalize-purchase:hover {
            background: #7a5c33;
        }

        @media(max-width: 768px) { 
            .side-menu { width: 100%; } 
        }
    </style>
</head>
<body>
    <!-- Camada escura de foco -->
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <!-- HEADER PREMIUM -->
    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <h1 class="brand-title">SOLLENE GROUP</h1>
        </div>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link btn-home-print">HOME</a></li>
                <li class="nav-item">
                    <span class="nav-link">COLLECTIONS ▼</span>
                    <div class="dropdown-content">
                        <a href="menshirts.html">MEN'S SHIRTS</a>
                        <a href="watches.html">WATCHES</a>
                        <a href="bags.html">BAGS COLLECTION</a>
                        <a href="women.html">WOMEN'S SELECTION</a>
                    </div>
                </li>
            </ul>
        </nav>
        <button class="cart-icon" onclick="toggleCart()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7a5c33" stroke-width="2">
                <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <div class="cart-badge" id="cart-count">0</div>
        </button>
    </header>

    <!-- FOTO DE ENTRADA PRINCIPAL -->
    <section class="hero-banner"></section>

    <!-- CENTRAL DE LIQUIDAÇÃO LATERAL -->
    <div class="side-menu" id="sideMenu">
        <div onclick="toggleCart()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px; text-align: right;">✕ CLOSE</div>
        <h2 style="letter-spacing:1px; font-size:18px; text-transform:uppercase; color:#7a5c33; margin-bottom: 20px;">Review & Pay</h2>
        
        <div id="cart-list"></div>

        <div style="margin-top:30px; padding-top:20px; border-top:2px solid #7a5c33; display:flex; justify-content:space-between; font-weight:800; font-size: 18px;">
            <span>TOTAL:</span><span id="total-price">€ 0.00</span>
        </div>

        <div class="payment-box">
            <h4 style="font-size:11px; text-transform:uppercase; color:#7a5c33; margin-bottom:15px;">Payment Method</h4>
            <label style="display:block; margin-bottom:12px; font-size:13px; font-weight:600; cursor:pointer;">
                <input type="radio" name="pay" value="Card" checked style="margin-right:10px; accent-color:#7a5c33;"> Credit / Debit Card
            </label>
            <label style="display:block; font-size:13px; font-weight:600; cursor:pointer;">
                <input type="radio" name="pay" value="Cash" style="margin-right:10px; accent-color:#7a5c33;"> Cash on Delivery
            </label>
        </div>

        <button class="btn-finalize-purchase" onclick="finalizeOrder()">Complete Purchase</button>
    </div>

    <!-- LÓGICA CORE DE CONTROLE DE FLUXO -->
    <script>
        let cart = [];

        function toggleCart() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function loadCart() {
            cart = JSON.parse(localStorage.getItem('sollene_cart')) || [];
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-list');
            if (cart.length === 0) {
                list.innerHTML = '<p style="color:#999; font-size:13px; text-align:center; padding:20px 0;">Your selection is empty.</p>';
            } else {
                list.innerHTML = cart.map((item, index) => `
                    <div class="cart-item">
                        <div>
                            <p style="font-size:12px; font-weight:800; text-transform:uppercase; max-width:220px; word-wrap:break-word;">${item.name}</p>
                            <p style="font-size:12px; color:#7a5c33; margin-top:3px;">€ ${item.price}.00</p>
                        </div>
                        <button class="btn-delete" onclick="removeItem(${index})">DELETE</button>
                    </div>
                `).join('');
            }
            let total = cart.reduce((sum, i) => sum + i.price, 0);
            document.getElementById('total-price').innerText = `€ ${total}.00`;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('sollene_cart', JSON.stringify(cart));
            updateUI();
        }

        function finalizeOrder() {
            if(cart.length === 0) return alert("Select products before paying.");
            const method = document.querySelector('input[name="pay"]:checked').value;
            alert("Success! Order placed via " + method + ".\nTotal: " + document.getElementById('total-price').innerText);
            cart = [];
            localStorage.removeItem('sollene_cart');
            updateUI();
            toggleCart();
        }

        // SENSOR DA URL DA HOME DO PROJETO
        window.onload = function() {
            loadCart();
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('openCheck') === 'true') {
                toggleCart();
            }
        }
    </script>
</body>
</html>
