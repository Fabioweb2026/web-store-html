<title>Sollene Store Group</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:Arial, sans-serif;
    background:#f8f3eb;
    color:#1c1c1c;
    overflow-x:hidden;
}

/* HEADER */

header{
    width:100%;
    padding:18px 40px;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
    background:rgba(248,243,235,0.96);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(0,0,0,0.05);
}

.header-container{
    max-width:1450px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
}

/* LOGO */

.logo-area{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo-area img{
    width:65px;
    height:65px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #b39359;
    background:#fff;
}

.brand-text h1{
    font-size:24px;
    color:#7d5d30;
    letter-spacing:4px;
    font-weight:800;
}

.brand-text span{
    font-size:10px;
    color:#777;
    letter-spacing:3px;
    text-transform:uppercase;
}
