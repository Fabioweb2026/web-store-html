<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Global Store | Luxury Lifestyle</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            /* IMAGEM DE FUNDO DA WEBPAGE */
            background: linear-gradient(rgba(244, 241, 234, 0.85), rgba(244, 241, 234, 0.85)), 
                        url('Solle-Global-Store.png') no-repeat center center fixed;
            background-size: cover;
            color: #1a1a1a; 
            min-height: 100vh;
        }

        /* BARRA SUPERIOR */
        .top-brand-bar {
            background: #000000;
            color: #b39359;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #b39359;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .top-brand-bar h1 { font-size: 22px; font-weight: 800; letter-spacing: 8px; text-transform: uppercase; }

        /* LAYOUT PRINCIPAL */
        .main-layout {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* LADO ESQUERDO: PRODUTOS */
        .shop-content { flex: 1; }

        h2 { 
            font-size: 11px; 
            color: #b39359; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 25px; 
            background: rgba(0,0,0,0.05);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        /* CARDS COMPACTOS COM EFEITO VIDRO (GLASSMORPHISM) */
        .card {
            background: rgba(255, 255, 255, 0.7); /* Branco transparente */
            backdrop-filter: blur(10px); /* Efeito de vidro fosco */
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(179, 147, 89, 0.2);
            text-align: center;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s ease;
        }
        .card:hover { 
            transform: translateY(-5px); 
            background: rgba(255, 255, 255, 0.9);
            border-color: #b39359; 
        }

        .card h3 { font-size: 14px; font-weight: 700; color: #111; }
        .card .price { font-size: 18px; color: #b39359; font-weight: 800; }

        .btn-add {
            background: #111;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 9px;
            cursor: pointer;
        }
        .btn-add:hover { background: #b39359; }

        /* LADO DIREITO: CARRINHO TRAVADO */
        .cart-sidebar {
            width: 350px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid #b39359;
            border-radius: 20px;
            padding: 30px;
            position: sticky;
            top: 100px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .cart-sidebar h3 { font-size: 13px; text-transform: uppercase; margin-bottom: 20px; text-align: center; color: #111; }
        
        .cart-total {
            border-top: 1px solid #e5e1da;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 22px;
            color: #111;
        }

        .btn-checkout {
            width: 100%;
            background: #25d366;
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            margin-top: 25px;
            cursor: pointer;
            text-transform: uppercase;
        }

        @media(max-width: 1000px) {
            .main-layout { flex-direction: column; }
            .cart-sidebar { width: 100%; position: static; }
        }
    </style>
</head>
<body>

    <div class="top-brand-bar">
        <h1>SOLLENE GLOBAL STORE</h1>
    </div>

    <div class="main-layout">
        <main class="shop-content">
            <h2>Executive Selection</h2>
            <div class="products-grid">
                <div class="card">
                    <h3>Executive Shirt</h3>
                    <span class="price">€ 85.00</span>
                    <button class="btn-add" onclick="add('Executive Shirt', 85)">Add to Cart</button>
                </div>
                <div class="card">
                    <h3>Leather Belt</h3>
                    <span class="price">€ 110.00</span>
                    <button class="btn-add" onclick="add('Leather Belt', 110)">Add to Cart</button>
                </div>
            </div>
        </main>

        <aside class="cart-sidebar">
            <h3>Your Selection</h3>
            <div id="cart-items" style="font-size: 13px; color: #444; margin-bottom: 20px;">No items in bag</div>
            <div class="cart-total">
                <span>Total</span>
                <span id="total-price">€ 0.00</span>
            </div>
            <button class="btn-checkout" onclick="sendOrder()">WhatsApp Checkout</button>
        </aside>
    </div>

    <script>
        let cart = []; let total = 0;
        function add(n, p) {
            cart.push({n, p}); total += p; update();
        }
        function update() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom: 1px solid #f4f1ea; padding-bottom: 5px;"><span>${i.n}</span><span>€${i.p.toFixed(2)}</span></div>`).join('');
            document.getElementById('total-price').innerText = `€ ${total.toFixed(2)}`;
        }
        function sendOrder() {
            if(cart.length === 0) return alert("Selecione um produto!");
            window.open(`https://wa.me from Sollene Store`);
        }
    </script>
</body>
</html>
