<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Global Store | Luxury Lifestyle</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: url('Solle-Global-Store.png') no-repeat center top fixed;
            background-size: cover;
            color: #1a1a1a; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            color: #b39359;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #b39359;
            z-index: 1000;
        }

        .logo-round {
            position: absolute;
            left: 40px;
            width: 50px;
            height: 50px;
            background: #000;
            border: 2px solid #b39359;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #b39359;
            text-decoration: none;
        }

        header h1 { font-size: 20px; font-weight: 800; letter-spacing: 6px; text-transform: uppercase; }

        /* CONTAINER DOS CARDS NO TOPO */
        .top-showcase {
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1); /* Faixa sutil no topo */
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap; /* Ajusta se tiver muitos produtos */
        }

        /* CARDS MINI E COMPACTOS */
        .card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            width: 180px; /* BEM MENORES */
            height: 160px; /* ALTURA REDUZIDA */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s;
        }

        .card:hover { 
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-5px);
            border-color: #b39359;
        }

        .card h3 { font-size: 12px; font-weight: 800; color: #000; text-transform: uppercase; }
        .card .price { font-size: 16px; color: #000; font-weight: 800; }

        .btn-add {
            background: #000;
            color: #b39359;
            border: none;
            padding: 8px;
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 8px;
            cursor: pointer;
        }

        /* CARRINHO ABAIXO OU FLUTUANTE */
        .cart-container {
            margin: 20px auto;
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid #b39359;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .cart-total {
            border-top: 1px solid #b39359;
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 18px;
            color: #000;
        }

        .btn-whatsapp {
            width: 100%;
            background: #25d366;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 800;
            margin-top: 15px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
        }

        @media(max-width: 600px) {
            header h1 { font-size: 14px; letter-spacing: 2px; }
            .card { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo-round">SG</a>
        <h1>SOLLENE GLOBAL STORE</h1>
    </header>

    <!-- CARDS NA PARTE SUPERIOR -->
    <div class="top-showcase">
        <div class="card">
            <h3>Executive Shirt</h3>
            <span class="price">€ 85.00</span>
            <button class="btn-add" onclick="add('Shirt', 85)">Add to Cart</button>
        </div>

        <div class="card">
            <h3>Leather Belt</h3>
            <span class="price">€ 110.00</span>
            <button class="btn-add" onclick="add('Belt', 110)">Add to Cart</button>
        </div>

        <div class="card">
            <h3>Classic Tie</h3>
            <span class="price">€ 45.00</span>
            <button class="btn-add" onclick="add('Tie', 45)">Add to Cart</button>
        </div>
    </div>

    <!-- CARRINHO LOGO ABAIXO -->
    <div class="cart-container">
        <h4 style="text-align:center; font-size:12px; text-transform:uppercase; margin-bottom:10px;">Your Bag</h4>
        <div id="cart-items" style="font-size: 12px; color: #000; margin-bottom: 10px;">Empty</div>
        <div class="cart-total">
            <span>Total</span>
            <span id="total-price">€ 0.00</span>
        </div>
        <button class="btn-whatsapp" onclick="checkout()">WhatsApp Checkout</button>
    </div>

    <script>
        let cart = []; let total = 0;
        function add(n, p) {
            cart.push({n, p}); total += p; update();
        }
        function update() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${i.n}</span><span>€${i.p.toFixed(2)}</span></div>`).join('');
            document.getElementById('total-price').innerText = `€ ${total.toFixed(2)}`;
        }
        function checkout() {
            if(cart.length === 0) return alert("Selecione um produto!");
            window.open(`https://wa.me`);
        }
    </script>
</body>
</html>
