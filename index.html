<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Store Group | Official</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f7f3eb;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FUNDO COM FOCO NAS PESSOAS (CENTRALIZADO) */
        .bg-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('Solle-Global-Store.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        /* HEADER BEGE LUXO */
        .main-header {
            background-color: #f7f3eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 5%;
            border-bottom: 1px solid rgba(122, 92, 51, 0.1);
            position: relative;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: 1px solid #7a5c33;
            background: #fff url('Sollene-Group.png') no-repeat center center;
            background-size: 80%;
        }

        .brand-info h1 {
            font-size: 22px; font-weight: 800; color: #7a5c33; 
            letter-spacing: 3px; text-transform: uppercase; line-height: 1;
        }
        .brand-info p {
            font-size: 9px; letter-spacing: 2px; color: #b0a89e;
            text-transform: uppercase; margin-top: 4px;
        }

        nav ul { display: flex; list-style: none; gap: 20px; }
        nav ul li a {
            text-decoration: none; color: #333; font-size: 10px;
            font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
        }

        /* VITRINE SUPERIOR (PRODUTOS NO TOPO) */
        .top-shelf {
            background: rgba(247, 243, 235, 0.9); /* Mesmo bege do header com transparência */
            backdrop-filter: blur(10px);
            padding: 20px 5%;
            display: flex;
            gap: 15px;
            overflow-x: auto; /* Permite deslizar se tiver muitos itens */
            border-bottom: 1px solid rgba(122, 92, 51, 0.1);
            position: relative;
            z-index: 999;
        }

        /* CARD MINI E SLIM */
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            min-width: 160px;
            height: 140px; /* BEM BAIXINHO PARA NÃO TAPAR A FOTO */
            text-align: center;
            border: 1px solid rgba(122, 92, 51, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s;
        }
        .card:hover { border-color: #7a5c33; transform: translateY(-3px); }
        .card h3 { font-size: 10px; font-weight: 800; color: #7a5c33; text-transform: uppercase; }
        .card .price { font-size: 16px; font-weight: 800; color: #1a1a1a; }

        .btn-add {
            background: #7a5c33; color: #fff; border: none;
            padding: 6px; border-radius: 4px; font-weight: 800;
            font-size: 8px; text-transform: uppercase; cursor: pointer;
        }

        /* ESPAÇO PARA A FOTO APARECER */
        .hero-spacer {
            height: 60vh; /* Deixa 60% da tela livre para as pessoas na foto */
        }

        @media(max-width: 900px) {
            .main-header { flex-direction: column; gap: 15px; }
            .top-shelf { justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <div class="bg-fixed"></div>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <div class="brand-info">
                <h1>Sollene Store Group</h1>
                <p>Luxury Fashion Collection</p>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Collections</a></li>
                <li><a href="#">Store</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- VITRINE NO TOPO -->
    <div class="top-shelf">
        <div class="card">
            <h3>Executive Shirt</h3>
            <span class="price">€ 85.00</span>
            <button class="btn-add" onclick="add()">Add to Cart</button>
        </div>
        <div class="card">
            <h3>Leather Belt</h3>
            <span class="price">€ 110.00</span>
            <button class="btn-add" onclick="add()">Add to Cart</button>
        </div>
        <div class="card">
            <h3>Classic Tie</h3>
            <span class="price">€ 45.00</span>
            <button class="btn-add" onclick="add()">Add to Cart</button>
        </div>
    </div>

    <!-- ÁREA LIVRE PARA A FOTO -->
    <div class="hero-spacer"></div>

    <script>
        function add() {
            alert("Item added to selection.");
        }
    </script>
</body>
</html>
