<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollene Global Store | Luxury Lifestyle</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

/* BODY */
body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    color:#fff;

    background:
    linear-gradient(
        rgba(10,10,10,.35),
        rgba(10,10,10,.55)
    ),
    url('Solle-Global-Store.png');

    background-repeat:no-repeat;
    background-size:cover;
    background-position:center top;
    background-attachment:fixed;

    background-color:#0f0f0f;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999;

    backdrop-filter:blur(18px);
    background:rgba(0,0,0,.55);

    border-bottom:1px solid rgba(255,255,255,.08);

    padding:18px 0;
}

.navbar{
    max-width:1400px;
    margin:auto;
    padding:0 40px;

    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    font-size:22px;
    font-weight:900;
    letter-spacing:6px;
    color:#f1d89b;
}

nav{
    display:flex;
    gap:30px;
}

nav a{
    text-decoration:none;
    color:#fff;
    font-size:14px;
    font-weight:600;
}

nav a:hover{
    color:#f1d89b;
}

.contact-btn{
    background:linear-gradient(135deg,#f7e7b3,#d6b36a);
    color:#111;
    border:none;
    padding:12px 24px;
    border-radius:50px;
    font-weight:800;
}

/* PRODUCTS */
.products-section{
    max-width:1400px;
    margin:auto;
    padding:140px 40px 100px;
}

/* ❌ REMOVIDO TITULO E SUBTITULO */

/* GRID */
.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
    gap:35px;
}

/* CARD */
.card{
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.15);
    backdrop-filter:blur(18px);
    border-radius:28px;
    overflow:hidden;
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px);
}

.card-image{
    height:240px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:70px;
}

.card-content{
    padding:30px;
}

.card-category{
    color:#f1d89b;
    font-size:12px;
    font-weight:700;
    letter-spacing:2px;
}

.card h3{
    font-size:24px;
    margin:10px 0;
}

.card p{
    color:#e8e8e8;
    font-size:14px;
    margin-bottom:20px;
}

.price-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.price{
    font-size:28px;
    font-weight:900;
    color:#f1d89b;
}

.btn-add{
    background:linear-gradient(135deg,#f7e7b3,#d6b36a);
    color:#111;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    font-weight:800;
}

/* CART */
.cart-sidebar{
    position:fixed;
    top:120px;
    right:25px;
    width:320px;

    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.15);
    border-radius:28px;

    padding:30px;
    backdrop-filter:blur(22px);
}

.cart-sidebar h4{
    text-align:center;
    color:#f1d89b;
    margin-bottom:20px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:10px;
}

.total-box{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
    padding-top:20px;
    border-top:1px solid rgba(255,255,255,.08);
    font-size:20px;
    color:#f1d89b;
}

.btn-checkout{
    width:100%;
    margin-top:20px;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#25d366;
    color:#fff;
    font-weight:800;
}

/* FOOTER */
footer{
    padding:60px;
    text-align:center;
    background:rgba(255,255,255,.04);
}

footer h3{
    color:#f1d89b;
}

</style>

</head>

<body>

<header>

<div class="navbar">

<div class="logo">SOLLENE</div>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Luxury</a>
<a href="#">Contact</a>
</nav>

<button class="contact-btn">Premium</button>

</div>

</header>

<!-- PRODUCTS (SEM TEXTO NO TOPO) -->

<section class="products-section">

<div class="products-grid">

<div class="card">
<div class="card-image">👔</div>
<div class="card-content">
<div class="card-category">EXECUTIVE</div>
<h3>Luxury Shirt</h3>
<p>Premium cotton shirt</p>
<div class="price-row">
<span class="price">€85</span>
<button class="btn-add" onclick="add('Shirt',85)">Add</button>
</div>
</div>
</div>

<div class="card">
<div class="card-image">⌚</div>
<div class="card-content">
<div class="card-category">SIGNATURE</div>
<h3>Luxury Watch</h3>
<p>Elegant premium design</p>
<div class="price-row">
<span class="price">€390</span>
<button class="btn-add" onclick="add('Watch',390)">Add</button>
</div>
</div>
</div>

</div>

</section>

<!-- CART -->

<aside class="cart-sidebar">

<h4>YOUR BAG</h4>

<div id="cart-items">Empty</div>

<div class="total-box">
<span>Total</span>
<span id="total-price">€0</span>
</div>

<button class="btn-checkout" onclick="checkout()">WhatsApp</button>

</aside>

<script>

let cart=[];
let total=0;

function add(n,p){
cart.push({n,p});
total+=p;
update();
}

function update(){
let box=document.getElementById("cart-items");

if(cart.length===0){
box.innerHTML="Empty";
}else{
box.innerHTML=cart.map(i=>`
<div class="cart-item">
<span>${i.n}</span>
<span>€${i.p}</span>
</div>`).join("");
}

document.getElementById("total-price").innerText="€"+total;
}

function checkout(){
let msg="Order:%0A";
cart.forEach(i=>{
msg+=`${i.n} - €${i.p}%0A`;
});
window.open("https://wa.me/?text="+msg);
}

</script>

</body>
</html>
