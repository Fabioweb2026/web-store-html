<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Official</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f3eb; overflow-x: hidden; }

        /* HEADER PREMIUM */
        .main-header {
            background: #f7f3eb; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle {
            width: 55px; height: 55px; border-radius: 50%; border: 1px solid #d4af37;
            background: #fff url('logo.png') no-repeat center center; background-size: cover;
        }
        .brand-info h1 { font-size: 24px; font-weight: 800; color: #7a5c33; letter-spacing: 3px; text-transform: uppercase; }

        /* MENU */
        nav ul { display: flex; list-style: none; gap: 10px; align-items: center; }
        .nav-item { position: relative; }
        .nav-link { 
            text-decoration: none; color: #000; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; padding: 10px 20px; cursor: pointer; display: block;
        }
        .btn-home { border: 2px solid #000; border-radius: 6px; }

        /* DROPDOWN AMAZON STYLE */
        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 0;
            background-color: #fff; min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-radius: 4px; z-index: 1100;
        }
        .dropdown-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; font-size: 10px; font-weight: 700; border-bottom: 1px solid #f9f9f9; }
        .dropdown-content a:hover { background-color: #f7f3eb; color: #7a5c33; }
        .nav-item:hover .dropdown-content { display: block; }

        /* CARRINHO */
        .cart-icon { cursor: pointer; position: relative; padding: 5px; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #7a5c33; color: #fff; font-size: 9px; font-weight: 800; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        /* AJUSTE DA IMAGEM DE CAMPANHA (SOLUÇÃO DO CORTE) */
        .hero-banner {
            width: 100%;
            height: 90vh;
            /* MUDANÇA AQUI: background-position: center top garante que a cabeça não corte */
            background: url('Solle-Global-Store.png') no-repeat center top;
            background-size: cover;
            background-attachment: scroll; /* Melhora a visualização em mobile */
        }

        @media(max-width: 900px) { 
            .hero-banner { height: 70vh; background-size: contain; background-color: #f7f3eb; } 
            .main-header { padding: 10px 2%; } 
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <div class="brand-info"><h1>SOLLENE GROUP</h1></div>
        </div>
        
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link btn-home">HOME</a></li>
                <li class="nav-item">
                    <span class="nav-link">COLLECTIONS ▼</span>
                    <div class="dropdown-content">
                        <a href="menshirts.html">MEN'S SHIRTS</a>
                        <a href="accessories.html">ACCESSORIES</a>
                        <a href="bolsas.html">BAGS COLLECTION</a>
                        <a href="woman.html">WOMAN'S SELECTION</a>
                    </div>
                </li>
            </ul>
        </nav>

        <div class="cart-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7a5c33" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <div class="cart-badge">0</div>
        </div>
    </header>

    <!-- IMAGEM COM ENQUADRAMENTO PELO TOPO -->
    <section class="hero-banner"></section>

</body>
</html>
