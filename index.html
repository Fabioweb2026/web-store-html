<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollene Global Store | Luxury Lifestyle</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

/* BODY */
body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    color:#fff;

    background:
    linear-gradient(
        rgba(10,10,10,.35),
        rgba(10,10,10,.55)
    ),
    url('Solle-Global-Store.png');

    background-size:cover;
    background-position:center top;
    background-attachment:fixed;

    background-color:#0f0f0f;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999;

    backdrop-filter:blur(18px);
    background:rgba(0,0,0,.55);

    border-bottom:1px solid rgba(255,255,255,.08);

    padding:18px 0;
}

.navbar{
    max-width:1400px;
    margin:auto;
    padding:0 40px;

    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    font-size:22px;
    font-weight:900;
    letter-spacing:6px;
    color:#f1d89b;
}

nav{
    display:flex;
    gap:30px;
}

nav a{
    text-decoration:none;
    color:#fff;
    font-size:14px;
    font-weight:600;
}

nav a:hover{
    color:#f1d89b;
}

.contact-btn{
    background:linear-gradient(135deg,#f7e7b3,#d6b36a);
    color:#111;
    border:none;
    padding:12px 24px;
    border-radius:50px;
    font-weight:800;
}

/* HERO LIMPO (SEM TEXTO) */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* CART */
.cart-sidebar{
    position:fixed;
    top:120px;
    right:25px;
    width:320px;

    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.15);
    border-radius:28px;

    padding:30px;
    backdrop-filter:blur(22px);
}

.cart-sidebar h4{
    text-align:center;
    color:#f1d89b;
    margin-bottom:20px;
}

#cart-items{
    font-size:14px;
    text-align:center;
    color:#ccc;
}

.total-box{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
    padding-top:20px;
    border-top:1px solid rgba(255,255,255,.08);
    color:#f1d89b;
    font-size:20px;
}

.btn-checkout{
    width:100%;
    margin-top:20px;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#25d366;
    color:#fff;
    font-weight:800;
}

/* FOOTER */
footer{
    padding:60px;
    text-align:center;
    background:rgba(255,255,255,.04);
    margin-top:80px;
}

footer h3{
    color:#f1d89b;
    letter-spacing:3px;
}

footer p{
    color:#ccc;
    font-size:14px;
}

</style>

</head>

<body>

<!-- HEADER -->
<header>

<div class="navbar">

<div class="logo">SOLLENE</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<button class="contact-btn">Premium</button>

</div>

</header>

<!-- HERO (LIMPO, SEM TEXTO) -->
<section class="hero"></section>

<!-- CART -->
<aside class="cart-sidebar">

<h4>YOUR BAG</h4>

<div id="cart-items">Empty</div>

<div class="total-box">
<span>Total</span>
<span id="total-price">€0</span>
</div>

<button class="btn-checkout" onclick="checkout()">WhatsApp</button>

</aside>

<!-- FOOTER -->
<footer>

<h3>SOLLENE GLOBAL STORE</h3>
<p>Luxury minimal experience</p>

</footer>

<script>

let cart=[];
let total=0;

function add(n,p){
cart.push({n,p});
total+=p;
update();
}

function update(){
document.getElementById("cart-items").innerHTML =
cart.length ? cart.map(i =>
`${i.n} - €${i.p}`
).join("<br>")
: "Empty";

document.getElementById("total-price").innerText="€"+total;
}

function checkout(){
let msg="Order:%0A";
cart.forEach(i=>{
msg+=`${i.n} - €${i.p}%0A`;
});
window.open("https://wa.me/?text="+msg);
}

</script>

</body>
</html>
