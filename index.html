<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollene Group</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#f7f3eb;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:#fff;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    font-weight:900;
    color:#7a5c33;
    letter-spacing:2px;
}

nav a{
    text-decoration:none;
    color:#000;
    margin:0 10px;
    font-weight:700;
    font-size:12px;
}

/* HERO (CORRIGIDO - SEM CORTAR) */
.hero{
    width:100%;
    height:80vh;
    background:#f7f3eb;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:contain; /* NÃO corta imagem */
}

/* SECTIONS */
.collections{
    padding:60px 5%;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-top:30px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:16px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card a{
    text-decoration:none;
    color:#7a5c33;
    font-weight:800;
}

/* CART ICON */
.cart{
    cursor:pointer;
}

</style>

</head>

<body>

<header>
    <div class="logo">SOLLENE GROUP</div>

    <nav>
        <a href="index.html">HOME</a>
        <a href="woman.html">WOMAN</a>
        <a href="menshirts.html">MEN</a>
        <a href="accessories.html">ACCESSORIES</a>
    </nav>

    <div class="cart">🛒</div>
</header>

<!-- HERO -->
<section class="hero">
    <img src="Solle-Global-Store.png" alt="Hero Image">
</section>

<!-- COLLECTIONS -->
<section class="collections">

    <h2>COLLECTIONS</h2>

    <div class="grid">

        <div class="card">
            <h3>Women</h3>
            <a href="woman.html">View Collection</a>
        </div>

        <div class="card">
            <h3>Men</h3>
            <a href="menshirts.html">View Collection</a>
        </div>

        <div class="card">
            <h3>Accessories</h3>
            <a href="accessories.html">View Collection</a>
        </div>

    </div>

</section>

</body>
</html>
