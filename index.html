
<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollene Store Group</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#f7f3eb;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:#f7f3eb;
    border-bottom:1px solid rgba(0,0,0,0.05);
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    font-weight:800;
    color:#7a5c33;
    letter-spacing:2px;
}

/* MENU */
nav ul{
    display:flex;
    list-style:none;
    gap:12px;
}

nav a{
    text-decoration:none;
    color:#000;
    font-weight:800;
    font-size:11px;
    text-transform:uppercase;
    padding:8px 12px;
    border-radius:8px;
}

nav a:hover{
    background:#000;
    color:#fff;
}

/* HERO */
.hero{
    height:80vh;
    background:url('Solle-Global-Store.png') center/cover no-repeat;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    padding:60px 5%;
    background:#fff;
}

.card{
    background:#fff;
    border-radius:20px;
    text-align:center;
    padding:20px;
}

.card img{
    width:100%;
    border-radius:12px;
}

.btn{
    margin-top:10px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#7a5c33;
    color:#fff;
    font-weight:800;
    cursor:pointer;
}

.btn:hover{
    background:#000;
}
</style>

</head>

<body>

<header>

<div class="logo">Sollene Group</div>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="masculino.html">Masculino</a></li>
<li><a href="feminino.html">Feminino</a></li>
</ul>
</nav>

</header>

<div class="hero"></div>

<section class="products">

<div class="card">
<img src="produto1.jpg">
<h3>Destaque 1</h3>
<button class="btn">Ver Produto</button>
</div>

<div class="card">
<img src="produto2.jpg">
<h3>Destaque 2</h3>
<button class="btn">Ver Produto</button>
</div>

</section>

</body>
</html>
