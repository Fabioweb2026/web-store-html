<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Store Group</title>

<style>
/* ===================== RESET ===================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #fff;
    color: #111;
}

/* ===================== SMOOTH SCROLL ===================== */
html {
    scroll-behavior: smooth;
}

/* ===================== HEADER ===================== */
header {
    width: 100%;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #eee;
    position: sticky;
    top: 0;
    background: white;
    z-index: 999;
}

.logo {
    font-weight: bold;
    font-size: 20px;
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: #111;
    font-weight: 500;
}

nav a:hover {
    opacity: 0.6;
}

/* ===================== HERO ===================== */
.hero {
    height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
}

.hero h1 {
    font-size: 40px;
    font-weight: 300;
}

/* ===================== COLLECTIONS ===================== */
#collections {
    padding: 80px 40px;
}

.section-title {
    font-size: 24px;
    margin-bottom: 30px;
}

/* GRID PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.product {
    border: 1px solid #eee;
    padding: 20px;
    text-align: center;
}

.product img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    margin-bottom: 10px;
}

.price {
    margin-top: 10px;
    font-weight: bold;
}

/* ===================== FOOTER ===================== */
footer {
    padding: 40px;
    text-align: center;
    border-top: 1px solid #eee;
    margin-top: 60px;
}
</style>
</head>

<body>

<!-- ===================== HEADER ===================== -->
<header>
    <div class="logo">SOLLENE</div>

    <nav>
        <a href="#">HOME</a>
        <a href="#collections">COLLECTIONS</a>
        <a href="#">CONTACT</a>
    </nav>
</header>

<!-- ===================== HERO ===================== -->
<section class="hero">
    <h1>Luxury Experience. Minimal Design.</h1>
</section>

<!-- ===================== COLLECTIONS ===================== -->
<section id="collections">
    <div class="section-title">COLLECTIONS</div>

    <div class="products">

        <!-- PRODUCT 1 -->
        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <h3>Luxury Watch</h3>
            <div class="price">€390</div>
        </div>

        <!-- PRODUCT 2 -->
        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <h3>Classic Shirt</h3>
            <div class="price">€120</div>
        </div>

        <!-- PRODUCT 3 -->
        <div class="product">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <h3>Leather Bag</h3>
            <div class="price">€250</div>
        </div>

    </div>
</section>

<!-- ===================== FOOTER ===================== -->
<footer>
    © 2026 Sollene Store Group
</footer>

</body>
</html>
