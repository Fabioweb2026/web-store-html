<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Global Store | Luxury Lifestyle</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #000000; 
            color: #ffffff; 
            line-height: 1.6;
        }

        /* HEADER PREMIUM */
        header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #111, #000);
            border-bottom: 1px solid #b39359;
        }

        .brand-name {
            font-size: 32px;
            font-weight: 800;
            color: #b39359;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .brand-sub {
            font-size: 10px;
            letter-spacing: 5px;
            color: #666;
            text-transform: uppercase;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 40px;
        }

        /* VITRINE DE PRODUTOS */
        h2 {
            font-size: 14px;
            color: #b39359;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 40px 0 25px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #222;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: #0a0a0a;
            border: 1px solid rgba(179, 147, 89, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 420px;
            transition: 0.4s;
        }

        .product-card:hover {
            border-color: #b39359;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(179, 147, 89, 0.05);
        }

        /* ESPAÇO PARA IMAGEM */
        .img-placeholder {
            width: 100%;
            height: 200px;
            background: #111;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px dashed rgba(179, 147, 89, 0.1);
        }

        .product-card h3 { font-size: 18px; margin-bottom: 10px; color: #fff; font-weight: 600; }
        .product-card .price { font-size: 20px; font-weight: 800; color: #b39359; margin-bottom: 20px; display: block; }

        .btn-add {
            background: #b39359;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover { background: #fff; }

        /* CARRINHO LATERAL */
        .cart-sidebar {
            background: #0a0a0a;
            border-radius: 24px;
            padding: 35px;
            border: 1px solid #b39359;
            height: fit-content;
            position: sticky;
            top: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .cart-sidebar h3 {
            font-size: 16px;
            color: #b39359;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        #cart-items {
            min-height: 100px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #888;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #1a1a1a;
            color: #fff;
        }

        .cart-total {
            border-top: 2px solid #b39359;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: 800;
        }

        .btn-whatsapp {
            width: 100%;
            background: #25d366;
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: 800;
            margin-top: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-whatsapp:hover { transform: scale(1.02); background: #20ba5a; }

        @media(max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .brand-name { font-size: 24px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">Sollene Global Store</div>
        <div class="brand-sub">Clothing • Perfumes • Jewelry</div>
    </header>

    <div class="container">
        <main>
            <!-- CATEGORIA ROUPAS -->
            <section id="clothing">
                <h2>Clothing & Accessories</h2>
                <div class="products-grid">
                    <div class="product-card">
                        <div class="img-placeholder">Image Required</div>
                        <h3>Executive Shirt</h3>
                        <span class="price">€ 85.00</span>
                        <button class="btn-add" onclick="addToCart('Executive Shirt', 85)">Add to Cart</button>
                    </div>
                    <div class="product-card">
                        <div class="img-placeholder">Image Required</div>
                        <h3>Luxury Leather Belt</h3>
                        <span class="price">€ 110.00</span>
                        <button class="btn-add" onclick="addToCart('Leather Belt', 110)">Add to Cart</button>
                    </div>
                </div>
            </section>

            <!-- CATEGORIA PERFUMES -->
            <section id="perfumes">
                <h2>Prestige Fragrances</h2>
                <div class="products-grid">
                    <div class="product-card">
                        <div class="img-placeholder">Image Required</div>
                        <h3>Sollene Intense</h3>
                        <span class="price">€ 145.00</span>
                        <button class="btn-add" onclick="addToCart('Sollene Intense', 145)">Add to Cart</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- CARRINHO -->
        <aside class="cart-sidebar">
            <h3>Your Selection</h3>
            <div id="cart-items">
                <p style="text-align: center;">Your cart is empty</p>
            </div>
            <div class="cart-total">
                <span>Total:</span>
                <span id="total-price">€ 0.00</span>
            </div>
            <button class="btn-whatsapp" onclick="sendOrder()">Checkout on WhatsApp</button>
        </aside>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center;">Your cart is empty</p>';
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>€ ${item.price.toFixed(2)}</span>
                    </div>
                `).join('');
            }
            document.getElementById('total-price').innerText = `€ ${total.toFixed(2)}`;
        }

        function sendOrder() {
            if (cart.length === 0) {
                alert("Please add items to your cart first.");
                return;
            }
            
            let message = "Hello! I would like to place an order at Sollene Global Store:%0A%0A";
            cart.forEach(item => {
                message += `- ${item.name} (€ ${item.price.toFixed(2)})%0A`;
            });
            message += `%0A*Total: € ${total.toFixed(2)}*`;
            
            // Substitua pelo seu número (Ex: 5511999999999)
            const whatsappUrl = `https://wa.me{message}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>

</body>
</html>
