<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollene Store Group | Official Store</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

html { scroll-behavior: smooth; }

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f7f3eb;
    color: #1a1a1a;
    overflow-x: hidden;
}

/* HEADER */
.main-header {
    background-color: #f7f3eb;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 5%;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 15px;
}

.logo-circle {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: 1px solid #7a5c33;
    background: #fff url('logo.png') no-repeat center center;
    background-size: cover;
}

.brand-info h1 {
    font-size: 22px;
    font-weight: 800;
    color: #7a5c33;
    letter-spacing: 3px;
    text-transform: uppercase;
}

/* MENU */
nav ul {
    display: flex;
    list-style: none;
    gap: 12px;
    align-items: center;
}

nav ul li {
    position: relative;
}

nav ul li a {
    text-decoration: none;
    color: #000;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    padding: 10px 14px;
    border-radius: 8px;
    transition: 0.3s;
    display: block;
}

nav ul li a:hover {
    background: #000;
    color: #fff;
}

/* DROPDOWN */
.dropdown-menu {
    position: absolute;
    top: 42px;
    left: 0;
    background: #fff;
    min-width: 230px;
    border-radius: 12px;
    padding: 10px 0;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    display: none;
    flex-direction: column;
    z-index: 999;
}

.dropdown-menu li a {
    padding: 12px 18px;
    border-radius: 0;
}

.dropdown:hover .dropdown-menu {
    display: flex;
}

/* CART */
.cart-icon-container {
    position: relative;
    cursor: pointer;
}

.cart-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    background: #7a5c33;
    color: #fff;
    font-size: 9px;
    font-weight: 800;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
}

/* HERO */
.hero-section {
    width: 100%;
    height: 85vh;
    background: url('Solle-Global-Store.png') no-repeat center top;
    background-size: cover;
}

/* PRODUCTS */
.products-section {
    background: #fff;
    padding: 80px 5%;
}

.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 40px;
    max-width: 1300px;
    margin: 0 auto;
}

.card {
    background: #fff;
    border-radius: 24px;
    text-align: center;
    padding-bottom: 30px;
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px);
}

.img-container {
    width: 100%;
    height: 400px;
    overflow: hidden;
    border-radius: 20px;
    margin-bottom: 20px;
}

.card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.5s;
}

.card:hover .card-img {
    transform: scale(1.08);
}

.btn-add {
    background: #7a5c33;
    color: #fff;
    border: none;
    padding: 14px 40px;
    border-radius: 50px;
    font-weight: 800;
    text-transform: uppercase;
    font-size: 10px;
    cursor: pointer;
}

.btn-add:hover {
    background: #000;
}
</style>

</head>

<body>

<header class="main-header">

    <div class="header-left">
        <div class="logo-circle"></div>
        <div class="brand-info">
            <h1>Sollene Group</h1>
        </div>
    </div>

    <!-- MENU COMPLETO COM LINKS -->
    <nav>
        <ul>

            <li><a href="index.html">Home</a></li>

            <li class="dropdown">
                <a href="#">Collections</a>

                <ul class="dropdown-menu">
                    <li><a href="masculino.html">Roupas Masculinas</a></li>
                    <li><a href="feminino.html">Roupas Femininas</a></li>
                    <li><a href="calcados.html">Calçados</a></li>
                    <li><a href="acessorios.html">Acessórios</a></li>
                    <li><a href="bolsas.html">Bolsas</a></li>
                </ul>

            </li>

        </ul>
    </nav>

    <div class="cart-icon-container">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7a5c33" stroke-width="2.5">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>

        <div class="cart-badge">0</div>
    </div>

</header>

<section class="hero-section"></section>

<section class="products-section">

    <div class="products-grid">

        <div class="card">
            <div class="img-container">
                <img src="produto1.jpg" class="card-img">
            </div>
            <button class="btn-add">Ver Produto</button>
        </div>

        <div class="card">
            <div class="img-container">
                <img src="produto2.jpg" class="card-img">
            </div>
            <button class="btn-add">Ver Produto</button>
        </div>

    </div>

</section>

</body>
</html>
