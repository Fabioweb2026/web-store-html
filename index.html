<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Luxury Store</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }
        
        html { scroll-behavior: smooth; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f7f3eb; 
            color: #1a1a1a;
        }

        /* HEADER FIXO */
        .main-header {
            background: rgba(247, 243, 235, 0.95);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle {
            width: 60px; height: 60px; border-radius: 50%; border: 1px solid #7a5c33;
            background: #fff url('logo.png') no-repeat center center; background-size: cover;
        }
        .brand-info h1 { font-size: 20px; font-weight: 800; color: #7a5c33; text-transform: uppercase; letter-spacing: 2px; }

        nav ul { display: flex; list-style: none; gap: 20px; }
        nav a { text-decoration: none; color: #000; font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        /* SEÇÃO DA IMAGEM PRINCIPAL (HERO) */
        .hero-section {
            width: 100%;
            height: 90vh; /* Quase a tela toda */
            background: url('Solle-Global-Store.png') no-repeat center top;
            background-size: cover;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 50px;
        }

        .scroll-indicator {
            color: #7a5c33; font-weight: 800; letter-spacing: 3px; 
            text-transform: uppercase; font-size: 11px; animation: bounce 2s infinite;
        }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} }

        /* NOVA GALERIA DE IMAGENS ABAIXO */
        .gallery-section {
            background: #fff;
            padding: 80px 5%;
            text-align: center;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: #fdfaf6;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #f1eee4;
            transition: 0.4s;
            padding-bottom: 25px;
        }

        .product-card:hover { transform: translateY(-10px); border-color: #7a5c33; }

        .product-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            background: #eee;
        }

        .product-card h3 { margin: 20px 0 10px; font-size: 14px; text-transform: uppercase; color: #333; }
        .product-card p { font-weight: 800; color: #7a5c33; font-size: 18px; margin-bottom: 20px; }

        .btn-select {
            background: #7a5c33; color: #fff; border: none;
            padding: 12px 30px; border-radius: 50px; font-weight: 800;
            font-size: 10px; text-transform: uppercase; cursor: pointer;
        }

        /* ABA LATERAL (COLLECTIONS) */
        .side-menu {
            position: fixed; top: 0; right: -400px; width: 400px; height: 100%;
            background: #fff; box-shadow: -10px 0 50px rgba(0,0,0,0.2);
            z-index: 2000; transition: 0.5s; padding: 40px;
        }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; z-index: 1900; }
        .overlay.active { display: block; }

        @media(max-width: 900px) { .side-menu { width: 100%; right: -100%; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <div class="brand-info"><h1>Sollene Group</h1></div>
        </div>
        <nav>
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a onclick="toggleMenu()">COLLECTIONS</a></li>
            </ul>
        </nav>
    </header>

    <!-- TOPO COM IMAGEM NÍTIDA -->
    <section class="hero-section">
        <div class="scroll-indicator">Explore Collection ↓</div>
    </section>

    <!-- GALERIA ABAIXO -->
    <section class="gallery-section" id="products">
        <h2 style="margin-bottom: 50px; letter-spacing: 5px; text-transform: uppercase; font-size: 14px;">Prestige Selection</h2>
        <div class="gallery-grid">
            
            <div class="product-card">
                <img src="productos1.png" class="product-img">
                <h3>Executive Shirt</h3>
                <p>€ 85.00</p>
                <button class="btn-select" onclick="toggleMenu()">Details</button>
            </div>

            <div class="product-card">
                <img src="producto2.png" class="product-img">
                <h3>Luxury Item</h3>
                <p>€ 110.00</p>
                <button class="btn-select" onclick="toggleMenu()">Details</button>
            </div>

            <div class="product-card">
                <img src="producto3.png" class="product-img">
                <h3>Signature Piece</h3>
                <p>€ 145.00</p>
                <button class="btn-select" onclick="toggleMenu()">Details</button>
            </div>

        </div>
    </section>

    <!-- ABA LATERAL -->
    <div class="side-menu" id="sideMenu">
        <div onclick="toggleMenu()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px; text-align: right;">✕ CLOSE</div>
        <h2 style="letter-spacing:2px; font-size:18px; color:#7a5c33; text-transform:uppercase;">Selection</h2>
        <p style="margin-top:20px; font-size:13px; color:#666;">Our team will check availability for your region.</p>
        <button style="width:100%; padding:18px; background:#25d366; color:#fff; border:none; border-radius:12px; font-weight:800; margin-top:30px; cursor:pointer;">
            ORDER VIA WHATSAPP
        </button>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
