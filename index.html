<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Masculino | Sollene Store</title>

<!-- MESMO CSS DO INDEX -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

html { scroll-behavior: smooth; }

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#f7f3eb;
    color:#1a1a1a;
}

/* HEADER IGUAL INDEX */
.main-header{
    background:#f7f3eb;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    border-bottom:1px solid rgba(0,0,0,0.05);
    position:sticky;
    top:0;
    z-index:1000;
}

.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo-circle{
    width:65px;
    height:65px;
    border-radius:50%;
    border:1px solid #7a5c33;
    background:#fff url('logo.png') center/cover no-repeat;
}

.brand-info h1{
    font-size:22px;
    font-weight:800;
    color:#7a5c33;
    text-transform:uppercase;
    letter-spacing:3px;
}

/* MENU IGUAL INDEX */
nav ul{
    display:flex;
    list-style:none;
    gap:12px;
}

nav a{
    text-decoration:none;
    color:#000;
    font-size:11px;
    font-weight:800;
    text-transform:uppercase;
    padding:8px 12px;
    border-radius:8px;
}

nav a:hover{
    background:#000;
    color:#fff;
}

/* HERO IGUAL ESTILO */
.hero{
    height:60vh;
    background:#e8dfcf;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    font-weight:800;
    color:#7a5c33;
}

/* PRODUTOS IGUAL INDEX */
.products{
    background:#fff;
    padding:80px 5%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:40px;
}

.card{
    background:#fff;
    border-radius:24px;
    text-align:center;
    padding-bottom:30px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    border-radius:20px;
}

.btn{
    margin-top:10px;
    padding:14px 35px;
    border:none;
    border-radius:50px;
    background:#7a5c33;
    color:#fff;
    font-weight:800;
    cursor:pointer;
}

.btn:hover{
    background:#000;
}
</style>

</head>

<body>

<!-- HEADER IGUAL INDEX -->
<header class="main-header">

    <div class="header-left">
        <div class="logo-circle"></div>
        <div class="brand-info">
            <h1>Sollene Group</h1>
        </div>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="masculino.html">Masculino</a></li>
            <li><a href="feminino.html">Feminino</a></li>
            <li><a href="calcados.html">Calçados</a></li>
            <li><a href="acessorios.html">Acessórios</a></li>
            <li><a href="bolsas.html">Bolsas</a></li>
        </ul>
    </nav>

</header>

<!-- HERO -->
<div class="hero">ROUPAS MASCULINAS</div>

<!-- PRODUTOS -->
<section class="products">

    <div class="card">
        <img src="m1.jpg">
        <h3>Camiseta Premium</h3>
        <button class="btn">Ver Produto</button>
    </div>

    <div class="card">
        <img src="m2.jpg">
        <h3>Jaqueta Street</h3>
        <button class="btn">Ver Produto</button>
    </div>

</section>

</body>
</html>
