<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Store Group | Official</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f7f3eb; /* Bege da sua imagem */
            color: #1a1a1a;
        }

        /* HEADER IGUAL À SUA IMAGEM */
        .main-header {
            background-color: #f7f3eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 5%;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        
        .logo-circle {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 1px solid #7a5c33;
            background: #fff url('Sollene-Group.png') no-repeat center center;
            background-size: 80%;
        }

        .brand-info h1 {
            font-size: 28px; font-weight: 800; color: #7a5c33; 
            letter-spacing: 4px; text-transform: uppercase; line-height: 1;
        }
        .brand-info p {
            font-size: 10px; letter-spacing: 3px; color: #b0a89e;
            text-transform: uppercase; margin-top: 5px;
        }

        nav ul { display: flex; list-style: none; gap: 30px; }
        nav ul li a {
            text-decoration: none; color: #000; font-size: 12px;
            font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
        }

        /* ÁREA DA IMAGEM REALISTA (HERO) - 100% LIMPA */
        .hero-section {
            width: 100%;
            height: 90vh; /* Ocupa quase a tela toda */
            background: url('Solle-Global-Store.png') no-repeat center top;
            background-size: cover;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 50px;
        }

        /* SETA INDICANDO PARA DESCER (OPCIONAL) */
        .scroll-indicator {
            color: #7a5c33;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* NOVA SEÇÃO DE PRODUTOS (ABAIXO DA FOTO) */
        .products-section {
            background: #fff;
            padding: 80px 5%;
            text-align: center;
        }

        .section-title {
            font-size: 14px;
            color: #b39359;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 50px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #fdfaf6;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #f4f1ea;
            transition: 0.4s;
        }
        .card:hover { border-color: #7a5c33; transform: translateY(-10px); }
        .card h3 { font-size: 14px; color: #7a5c33; margin-bottom: 15px; text-transform: uppercase; }
        .card .price { font-size: 20px; font-weight: 800; color: #000; margin-bottom: 20px; display: block;}

        .btn-add {
            background: #7a5c33; color: #fff; border: none;
            padding: 12px 30px; border-radius: 50px; font-weight: 800;
            font-size: 10px; text-transform: uppercase; cursor: pointer;
        }

        @media(max-width: 900px) {
            .main-header { flex-direction: column; gap: 15px; }
            .hero-section { height: 60vh; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <div class="brand-info">
                <h1>Sollene Store Group</h1>
                <p>Luxury Fashion Collection</p>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Collections</a></li>
                <li><a href="#">Store</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- ÁREA DA FOTO: AGORA TOTALMENTE LIMPA -->
    <section class="hero-section">
        <div class="scroll-indicator">Scroll to Explore ↓</div>
    </section>

    <!-- PRODUTOS SÓ APARECEM QUANDO ROLA PARA BAIXO -->
    <section class="products-section">
        <h2 class="section-title">New Arrivals</h2>
        <div class="products-grid">
            <div class="card">
                <h3>Executive Shirt</h3>
                <span class="price">€ 85.00</span>
                <button class="btn-add">Add to Cart</button>
            </div>
            <div class="card">
                <h3>Leather Belt</h3>
                <span class="price">€ 110.00</span>
                <button class="btn-add">Add to Cart</button>
            </div>
            <div class="card">
                <h3>Classic Tie</h3>
                <span class="price">€ 45.00</span>
                <button class="btn-add">Add to Cart</button>
            </div>
        </div>
    </section>

</body>
</html>
