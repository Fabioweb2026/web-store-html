<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Checkout Center</title>
    <style>
        @import url('https://googleapis.com');
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f3eb; overflow-x: hidden; }

        /* HEADER PREMIUM */
        .main-header {
            background: #f7f3eb; display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #d4af37; background: #fff url('logo.png') no-repeat center center; background-size: cover; }
        .brand-info h1 { font-size: 24px; font-weight: 800; color: #7a5c33; letter-spacing: 3px; text-transform: uppercase; }

        nav ul { display: flex; list-style: none; gap: 10px; align-items: center; }
        .nav-link { text-decoration: none; color: #000; font-size: 11px; font-weight: 800; text-transform: uppercase; padding: 10px 20px; }
        .btn-home { border: 2px solid #000; border-radius: 6px; }

        /* CARRINHO */
        .cart-icon { cursor: pointer; position: relative; padding: 5px; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #7a5c33; color: #fff; font-size: 9px; font-weight: 800; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        /* BANNER */
        .hero-banner { width: 100%; height: 90vh; background: url('Solle-Global-Store.png') no-repeat center top; background-size: cover; }

        /* ABA LATERAL DE CHECKOUT */
        .side-menu { position: fixed; top: 0; right: -420px; width: 400px; height: 100%; background: #fff; box-shadow: -10px 0 50px rgba(0,0,0,0.1); z-index: 2000; transition: 0.5s; padding: 40px; overflow-y: auto; }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1900; }
        .overlay.active { display: block; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .btn-delete { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 10px; font-weight: 800; }

        .payment-box { margin-top: 30px; text-align: left; background: #fdfaf6; padding: 20px; border-radius: 12px; }
        .btn-finalize { width: 100%; padding: 20px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 800; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <header class="main-header">
        <div class="header-left"><div class="logo-circle"></div><div class="brand-info"><h1>SOLLENE GROUP</h1></div></div>
        <nav><ul><li><a href="index.html" class="nav-link btn-home">HOME</a></li></ul></nav>
        <div class="cart-icon" onclick="toggleCart()">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7a5c33" stroke-width="2"><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle></svg>
            <div class="cart-badge" id="cart-count">0</div>
        </div>
    </header>

    <section class="hero-banner"></section>

    <!-- ABA LATERAL DE PAGAMENTO -->
    <div class="side-menu" id="sideMenu">
        <div onclick="toggleCart()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px; text-align: right;">✕ CLOSE</div>
        <h2 style="letter-spacing:1px; font-size:18px; text-transform:uppercase; color:#7a5c33;">Final Checkout</h2>
        
        <div id="cart-list" style="margin-top:20px;"></div>

        <div style="margin-top:30px; padding-top:20px; border-top:2px solid #7a5c33; display:flex; justify-content:space-between; font-weight:800; font-size: 18px;">
            <span>TOTAL:</span><span id="total-price">€ 0.00</span>
        </div>

        <div class="payment-box">
            <h4 style="font-size:11px; text-transform:uppercase; margin-bottom:10px;">Select Payment</h4>
            <label style="display:block; margin-bottom:8px; font-size:13px;"><input type="radio" name="pay" value="Card" checked> Credit / Debit Card</label>
            <label style="display:block; font-size:13px;"><input type="radio" name="pay" value="Cash"> Cash on Delivery</label>
            <p style="color:red; font-size:10px; font-weight:800; margin-top:10px;">* NO INSTALLMENTS</p>
        </div>

        <button class="btn-finalize" onclick="finalize()">COMPLETE PURCHASE</button>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('sollene_cart')) || [];

        function toggleCart() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('sollene_cart', JSON.stringify(cart));
            updateUI();
        }

        function finalize() {
            if(cart.length === 0) return alert("Bag is empty!");
            const method = document.querySelector('input[name="pay"]:checked').value;
            alert("Order confirmed via " + method + "!");
            cart = []; localStorage.removeItem('sollene_cart'); updateUI(); toggleCart();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-list');
            if (cart.length === 0) {
                list.innerHTML = '<p style="color:#999; font-size:13px;">Bag is empty.</p>';
            } else {
                list.innerHTML = cart.map((item, index) => `
                    <div class="cart-item">
                        <div><p style="font-size:11px; font-weight:800;">${item.name}</p><p style="font-size:11px; color:#7a5c33;">€ ${item.price}.00</p></div>
                        <button class="btn-delete" onclick="removeItem(${index})">DELETE</button>
                    </div>
                `).join('');
            }
            let total = cart.reduce((sum, i) => sum + i.price, 0);
            document.getElementById('total-price').innerText = `€ ${total}.00`;
        }
        window.onload = updateUI;
    </script>
</body>
</html>
