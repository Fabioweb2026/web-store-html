<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men's Shirts | Sollene Group</title>
    <style>
        @import url('https://googleapis.com');
        html { scroll-behavior: smooth; }
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f3eb; color: #1a1a1a; }

        /* HEADER (IGUAL À PRINCIPAL) */
        .main-header {
            background: rgba(247, 243, 235, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle {
            width: 60px; height: 60px; border-radius: 50%; border: 1px solid #7a5c33;
            background: #fff url('logo.png') no-repeat center center; background-size: cover;
        }
        .brand-info h1 { font-size: 20px; font-weight: 800; color: #7a5c33; text-transform: uppercase; }

        /* MENU DROPDOWN */
        nav ul { display: flex; list-style: none; gap: 10px; align-items: center; }
        .nav-item { position: relative; }
        .nav-link { text-decoration: none; color: #000; font-size: 11px; font-weight: 800; text-transform: uppercase; padding: 12px 15px; cursor: pointer; }
        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 0;
            background-color: #fff; min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-radius: 8px; overflow: hidden;
        }
        .dropdown-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; font-size: 10px; font-weight: 700; }
        .nav-item:hover .dropdown-content { display: block; }

        /* VITRINE DE CAMISAS */
        .products-section { padding: 60px 5%; background: #fff; min-height: 100vh; }
        .page-title { text-align: center; margin-bottom: 50px; letter-spacing: 4px; color: #7a5c33; text-transform: uppercase; font-size: 18px; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        
        .card { background: #fff; border-radius: 20px; text-align: center; padding-bottom: 25px; transition: 0.4s; border: 1px solid #f9f9f9; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        
        .img-container { width: 100%; height: 350px; overflow: hidden; border-radius: 15px; margin-bottom: 15px; background: #f9f9f9; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        .btn-add { background: #7a5c33; color: #fff; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 9px; cursor: pointer; }

        /* SIDE MENU */
        .side-menu { position: fixed; top: 0; right: -420px; width: 400px; height: 100%; background: #fff; box-shadow: -10px 0 50px rgba(0,0,0,0.1); z-index: 2000; transition: 0.5s; padding: 40px; }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1900; }
        .overlay.active { display: block; }
        .cart-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .cart-item img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <div class="brand-info"><h1>Sollene Group</h1></div>
        </div>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link">HOME</a></li>
                <li class="nav-item">
                    <span class="nav-link">COLLECTIONS ▼</span>
                    <div class="dropdown-content">
                        <a href="menshirts.html">MEN'S SHIRTS</a>
                        <a href="accessories.html">ACCESSORIES</a>
                        <a href="bolsas.html">BAGS</a>
                        <a href="woman.htlm">WOMEN</a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <main class="products-section">
        <h2 class="page-title">Men's Shirts Collection</h2>
        <div class="products-grid">
            
            <!-- CAMISA 1 -->
            <div class="card">
                <div class="img-container"><img src="men1.png" class="card-img" onerror="this.src='logo.png'"></div>
                <h3>Executive White Shirt</h3>
                <p style="font-weight:800; margin:10px 0;">€ 85.00</p>
                <button class="btn-add" onclick="addToCart('White Shirt', 85, 'men1.png')">Add to Bag</button>
            </div>

            <!-- CAMISA 2 -->
            <div class="card">
                <div class="img-container"><img src="executivemen1.png" class="card-img" onerror="this.src='logo.png'"></div>
                <h3>Premium Blue Shirt</h3>
                <p style="font-weight:800; margin:10px 0;">€ 95.00</p>
                <button class="btn-add" onclick="addToCart('Blue Shirt', 95, 'executivemen1.png')">Add to Bag</button>
            </div>

        </div>
    </main>

    <!-- ABA LATERAL -->
    <div class="side-menu" id="sideMenu">
        <div onclick="toggleMenu()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px; text-align: right;">✕ CLOSE</div>
        <h2 style="font-size:18px; color:#7a5c33; text-transform:uppercase;">Summary</h2>
        <div id="cart-list" style="margin-top:20px;"></div>
        <button style="width:100%; padding:18px; background:#000; color:#fff; border:none; border-radius:12px; font-weight:800; margin-top:20px; cursor:pointer;">COMPLETE PURCHASE</button>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function addToCart(name, price, img) {
            const list = document.getElementById('cart-list');
            list.innerHTML = `
                <div class="cart-item">
                    <img src="${img}">
                    <div>
                        <h4 style="font-size:11px;">${name}</h4>
                        <p style="font-weight:800; color:#7a5c33;">€ ${price}.00</p>
                    </div>
                </div>
            `;
            toggleMenu();
        }
    </script>
</body>
</html>
