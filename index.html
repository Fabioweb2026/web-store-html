<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Global Store | Luxury Lifestyle</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            /* FUNDO 100% NÍTIDO E FIXO */
            background: url('Solle-Global-Store.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER FIXO NO TOPO */
        header {
            background: #000;
            color: #b39359;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #b39359;
            z-index: 1000;
        }
        header h1 { font-size: 18px; font-weight: 800; letter-spacing: 8px; text-transform: uppercase; }

        /* FAIXA DE PRODUTOS NO TOPO (CARDS PEQUENOS) */
        .top-products-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.7); /* Faixa preta elegante e semi-transparente */
            backdrop-filter: blur(10px);
            padding: 20px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-bottom: 1px solid rgba(179, 147, 89, 0.2);
            z-index: 999;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(179, 147, 89, 0.3);
            border-radius: 12px;
            padding: 15px;
            width: 160px; /* BEM PEQUENOS */
            text-align: center;
            transition: 0.3s;
        }

        .card:hover { background: rgba(179, 147, 89, 0.2); transform: translateY(-3px); }

        .card h3 { font-size: 11px; color: #fff; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .card .price { font-size: 16px; color: #b39359; font-weight: 800; margin-bottom: 10px; display: block; }

        .btn-add {
            background: #b39359;
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 9px;
            cursor: pointer;
            width: 100%;
        }

        /* CARRINHO DISCRETO NA DIREITA */
        .cart-float {
            position: fixed;
            top: 100px;
            right: 20px;
            width: 280px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #b39359;
            border-radius: 15px;
            padding: 20px;
            color: #fff;
            z-index: 1001;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .cart-float h4 { font-size: 12px; text-transform: uppercase; color: #b39359; margin-bottom: 15px; text-align: center; }
        #cart-items { font-size: 12px; max-height: 150px; overflow-y: auto; margin-bottom: 15px; }
        .total { border-top: 1px solid #333; padding-top: 10px; display: flex; justify-content: space-between; font-weight: 800; color: #b39359; }

        .btn-checkout {
            background: #25d366;
            color: #fff;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 10px;
            cursor: pointer;
        }

        /* MOBILE */
        @media(max-width: 768px) {
            .top-products-bar { overflow-x: auto; justify-content: flex-start; padding: 15px; }
            .card { flex-shrink: 0; }
            .cart-float { position: static; width: 90%; margin: 20px auto; }
        }
    </style>
</head>
<body>

    <header>
        <h1>SOLLENE GLOBAL STORE</h1>
    </header>

    <!-- CARDS PEQUENOS NO TOPO SUPERIOR -->
    <div class="top-products-bar">
        <div class="card">
            <h3>Executive Shirt</h3>
            <span class="price">€ 85.00</span>
            <button class="btn-add" onclick="add('Shirt', 85)">Add to Cart</button>
        </div>
        <div class="card">
            <h3>Leather Belt</h3>
            <span class="price">€ 110.00</span>
            <button class="btn-add" onclick="add('Belt', 110)">Add to Cart</button>
        </div>
        <div class="card">
            <h3>Classic Tie</h3>
            <span class="price">€ 45.00</span>
            <button class="btn-add" onclick="add('Tie', 45)">Add to Cart</button>
        </div>
    </div>

    <!-- CARRINHO DISCRETO -->
    <div class="cart-float">
        <h4>Your Selection</h4>
        <div id="cart-items">Empty bag</div>
        <div class="total">
            <span>Total</span>
            <span id="total-price">€ 0.00</span>
        </div>
        <button class="btn-checkout" onclick="checkout()">WhatsApp Checkout</button>
    </div>

    <script>
        let cart = []; let total = 0;
        function add(n, p) {
            cart.push({n, p}); total += p; update();
        }
        function update() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>${i.n}</span><span>€${i.p.toFixed(2)}</span></div>`).join('');
            document.getElementById('total-price').innerText = `€ ${total.toFixed(2)}`;
        }
        function checkout() {
            if(cart.length === 0) return alert("Selecione um produto!");
            window.open(`https://wa.me`);
        }
    </script>
</body>
</html>
