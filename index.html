<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta | Sollene Group Experience</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f3eb; color: #1a1a1a; overflow-x: hidden; }

        /* HEADER IDÊNTICO AO SOLLENE STORE */
        .main-header {
            background-color: #f7f3eb;
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 5%; border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo-circle {
            width: 75px; height: 75px; border-radius: 50%; border: 1px solid #7a5c33;
            background: #fff url('https://github.io') no-repeat center center; 
            background-size: cover;
        }

        .brand-info h1 { font-size: 26px; font-weight: 800; color: #7a5c33; letter-spacing: 4px; text-transform: uppercase; }

        nav ul { display: flex; list-style: none; gap: 20px; align-items: center; }
        nav ul li a { 
            text-decoration: none; color: #000; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1px; padding: 8px 15px; cursor: pointer;
        }

        /* ABA LATERAL (DRAWER) - IGUAL AO DA LOJA */
        .side-menu {
            position: fixed; top: 0; right: -400px;
            width: 400px; height: 100%; background: #fff;
            box-shadow: -10px 0 50px rgba(0,0,0,0.1);
            z-index: 2000; transition: 0.5s cubic-bezier(0.77,0,0.175,1);
            padding: 40px; overflow-y: auto;
        }
        .side-menu.active { right: 0; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
            display: none; z-index: 1900;
        }
        .overlay.active { display: block; }

        .drawer-item {
            display: flex; align-items: center; gap: 15px; margin-bottom: 20px;
            padding: 10px; border-radius: 12px; border: 1px solid #f9f9f9;
        }
        .drawer-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }

        /* CONTEÚDO DE MALTA */
        .hero-malta {
            width: 100%; height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://unsplash.com');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; color: #fff;
        }

        .malta-content { max-width: 1000px; margin: 60px auto; padding: 0 20px; }
        .info-card { background: #fff; padding: 40px; border-radius: 24px; border: 1px solid #eee; margin-bottom: 30px; }
        h2 { color: #7a5c33; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; }

        @media(max-width: 500px) { .side-menu { width: 100%; right: -100%; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <div class="brand-info">
                <h1>Sollene Store Group</h1>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="https://github.io">HOME</a></li>
                <li><a onclick="toggleMenu()">COLLECTIONS</a></li>
                <li><a href="#contact">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <div class="side-menu" id="sideMenu">
        <div onclick="toggleMenu()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:20px;">✕ CLOSE</div>
        <h2 style="font-size:18px;">Luxury Selection</h2>
        
        <!-- OS PRODUTOS DA LOJA APARECEM AQUI TAMBÉM -->
        <div class="drawer-item">
            <img src="https://github.ioproductos1.png" class="drawer-img">
            <div class="drawer-info">
                <h3 style="font-size:12px;">Executive Shirt</h3>
                <p style="font-weight:800; color:#7a5c33;">€ 85.00</p>
            </div>
        </div>
        <!-- Adicione mais itens se quiser -->

        <a href="https://github.io" style="display:block; text-align:center; padding:15px; background:#7a5c33; color:#fff; text-decoration:none; border-radius:8px; font-weight:800; margin-top:20px;">
            GO TO FULL STORE
        </a>
    </div>

    <section class="hero-malta">
        <h1 style="font-size: 50px; letter-spacing: 10px; text-transform: uppercase;">Malta Guide</h1>
    </section>

    <div class="malta-content">
        <div class="info-card">
            <h2>The Jewel of Mediterranean</h2>
            <p>Malta is more than just a destination; it's a lifestyle. Explore our curated guide for the most sophisticated travelers.</p>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
