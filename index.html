<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Global Store | Luxury Lifestyle</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f4f1ea; /* FUNDO CREME DOURADO QUE COMBINA COM A FOTO */
            color: #1a1a1a; 
        }

        /* BARRA SUPERIOR COM O TEXTO QUE VOCÊ PEDIU */
        .top-info-bar {
            background: #000000;
            color: #b39359;
            padding: 25px 20px;
            text-align: center;
            border-bottom: 2px solid #b39359;
        }

        .top-info-bar h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .top-info-bar p {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            max-width: 800px;
            margin: 0 auto;
            opacity: 0.8;
        }

        /* BANNER LIMPO LOGO ABAIXO DO TOPO */
        .hero-banner {
            width: 100%;
            height: 350px;
            background: url('banner-sollene.jpg') no-repeat center center; /* Nome da sua foto nova */
            background-size: cover;
            border-bottom: 1px solid rgba(179, 147, 89, 0.2);
        }

        .main-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* LADO ESQUERDO: VITRINE COM CARDS PEQUENOS */
        .products-section {
            flex: 1;
        }

        h2 {
            font-size: 11px;
            color: #b39359;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            border-left: 3px solid #b39359;
            padding-left: 15px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        /* CARD COMPACTO EXECUTIVO */
        .card {
            background: #ffffff;
            padding: 25px 15px;
            border-radius: 16px;
            border: 1px solid #e5e1da;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 240px; /* ALTURA REDUZIDA COMO VOCÊ PEDIU */
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }

        .card:hover { 
            border-color: #b39359; 
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(179, 147, 89, 0.1);
        }

        .card h3 { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 15px; }
        .card .price { font-size: 20px; color: #b39359; font-weight: 800; margin-bottom: 20px; }

        .btn-add {
            background: #1a1a1a;
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 9px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-add:hover { background: #b39359; color: #000; }

        /* CARRINHO (LADO DIREITO) */
        .cart-sidebar {
            width: 350px;
            background: #ffffff;
            border: 1px solid #b39359;
            border-radius: 20px;
            padding: 30px;
            position: sticky;
            top: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
        }

        .cart-sidebar h3 { font-size: 13px; color: #1a1a1a; text-transform: uppercase; margin-bottom: 20px; text-align: center; border-bottom: 1px solid #f4f1ea; padding-bottom: 15px; }
        #cart-items { min-height: 50px; font-size: 13px; margin-bottom: 20px; color: #666; }
        .cart-total { border-top: 1px solid #f4f1ea; padding-top: 20px; display: flex; justify-content: space-between; font-weight: 800; font-size: 22px; color: #1a1a1a; }

        .btn-checkout {
            width: 100%;
            background: #25d366;
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            margin-top: 25px;
            cursor: pointer;
            text-transform: uppercase;
        }

        @media(max-width: 900px) {
            .main-container { flex-direction: column; }
            .cart-sidebar { width: 100%; position: static; }
        }
    </style>
</head>
<body>

    <!-- TEXTO QUE SAIU DA IMAGEM E FOI PARA O TOPO -->
    <div class="top-info-bar">
        <h1>LUXURY FASHION</h1>
        <p>Discover premium clothing, elegant accessories and modern lifestyle collections designed for sophisticated people.</p>
    </div>

    <!-- BANNER AGORA APARECE LIMPO ABAIXO DO TEXTO -->
    <div class="hero-banner"></div>

    <div class="main-container">
        <main class="products-section">
            <h2>Executive Collection</h2>
            
            <div class="products-grid">
                <div class="card">
                    <h3>Executive Shirt</h3>
                    <span class="price">€ 85.00</span>
                    <button class="btn-add" onclick="add('Executive Shirt', 85)">Add to Cart</button>
                </div>

                <div class="card">
                    <h3>Leather Belt</h3>
                    <span class="price">€ 110.00</span>
                    <button class="btn-add" onclick="add('Leather Belt', 110)">Add to Cart</button>
                </div>
            </div>
        </main>

        <aside class="cart-sidebar">
            <h3>Shopping Bag</h3>
            <div id="cart-items">Empty</div>
            <div class="cart-total">
                <span>Total</span>
                <span id="total-price">€ 0.00</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">WhatsApp Order</button>
        </aside>
    </div>

    <script>
        let cart = [];
        let total = 0;
        function add(n, p) {
            cart.push({n, p});
            total += p;
            update();
        }
        function update() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#1a1a1a"><span>${i.n}</span><span>€${i.p}</span></div>`).join('');
            document.getElementById('total-price').innerText = `€ ${total.toFixed(2)}`;
        }
        function checkout() {
            if(cart.length === 0) return alert("Selecione um produto!");
            let msg = "Hello! My Order: " + cart.map(i => i.n).join(', ') + " | Total: €" + total.toFixed(2);
            window.open(`https://wa.me{msg}`);
        }
    </script>
</body>
</html>
