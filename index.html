<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Global Store | Luxury Lifestyle</title>
    <style>
        @import url('https://googleapis.com');
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #121212; color: #f4f1ea; }
        
        .top-info-bar { background: #000; color: #b39359; padding: 25px; text-align: center; border-bottom: 2px solid #b39359; }
        .top-info-bar h1 { font-size: 24px; letter-spacing: 10px; text-transform: uppercase; }
        
        .hero-banner { width: 100%; height: 350px; background: url('banner-sollene.jpg') no-repeat center center; background-size: cover; border-bottom: 1px solid rgba(179, 147, 89, 0.2); }
        
        .main-container { max-width: 1400px; margin: 40px auto; padding: 0 20px; display: flex; gap: 30px; align-items: flex-start; }
        .shop-content { flex: 1; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 15px; }
        
        .card { background: #1a1a1a; padding: 20px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: center; height: 250px; display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s; }
        .card:hover { border-color: #b39359; transform: translateY(-5px); }
        .card .price { font-size: 20px; color: #b39359; font-weight: 800; }
        
        .btn-add { background: #b39359; color: #121212; border: none; padding: 12px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 9px; cursor: pointer; }
        
        .cart-sidebar { width: 350px; background: #0a0a0a; border: 1px solid rgba(179, 147, 89, 0.4); border-radius: 20px; padding: 30px; position: sticky; top: 20px; }
        .btn-checkout { width: 100%; background: #25d366; color: #fff; border: none; padding: 18px; border-radius: 12px; font-weight: 800; margin-top: 25px; cursor: pointer; text-transform: uppercase; }
        
        @media(max-width: 1000px) { .main-container { flex-direction: column; } .cart-sidebar { width: 100%; position: static; } }
    </style>
</head>
<body>
    <div class="top-info-bar">
        <h1>LUXURY FASHION</h1>
        <p>DISCOVER PREMIUM CLOTHING AND MODERN LIFESTYLE</p>
    </div>
    <div class="hero-banner"></div>
    <div class="main-container">
        <main class="shop-content">
            <div class="products-grid">
                <div class="card">
                    <h3>Executive Shirt</h3>
                    <span class="price">€ 85.00</span>
                    <button class="btn-add" onclick="add('Executive Shirt', 85)">Add to Cart</button>
                </div>
                <div class="card">
                    <h3>Leather Belt</h3>
                    <span class="price">€ 110.00</span>
                    <button class="btn-add" onclick="add('Leather Belt', 110)">Add to Cart</button>
                </div>
            </div>
        </main>
        <aside class="cart-sidebar">
            <h3>Your Selection</h3>
            <div id="cart-items" style="margin:20px 0; color:#888;">Empty Bag</div>
            <div style="display:flex; justify-content:space-between; font-weight:800; font-size:22px; border-top:1px solid #b39359; padding-top:20px;">
                <span>Total</span>
                <span id="total-price">€ 0.00</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">WhatsApp Order</button>
        </aside>
    </div>
    <script>
        let cart = []; let total = 0;
        function add(n, p) { cart.push({n, p}); total += p; update(); }
        function update() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${i.n}</span><span>€${i.p}</span></div>`).join('');
            document.getElementById('total-price').innerText = `€ ${total.toFixed(2)}`;
        }
        function checkout() { window.open(`https://wa.me from Sollene Global Store`); }
    </script>
</body>
</html>
