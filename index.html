<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Global Store</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0e0e0e;
    color:#fff;
}

/* HEADER */
header{
    padding:25px;
    text-align:center;
    font-size:24px;
    letter-spacing:2px;
    font-weight:300;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:#1a1a1a;
    padding:20px;
    border-radius:12px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card h3{
    margin:10px 0;
}

.price{
    color:#d4af37;
    font-size:18px;
}

/* BAG */
.bag{
    background:#111;
    padding:30px;
    margin:20px;
    border-radius:12px;
}

.bag h2{
    margin-bottom:15px;
}

.total{
    margin-top:10px;
    font-size:18px;
    color:#d4af37;
}

/* BUTTON */
button{
    background:#25D366;
    border:none;
    padding:12px 20px;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
    margin-top:15px;
}
</style>
</head>

<body>

<header>
SOLLENE GLOBAL STORE
</header>

<!-- PRODUCTS -->
<section class="products">

    <div class="card">
        <h3>Luxury Watch</h3>
        <p>Modern elegance timepiece</p>
        <div class="price">€390</div>
    </div>

    <div class="card">
        <h3>Classic Leather Bag</h3>
        <p>Italian handcrafted leather</p>
        <div class="price">€520</div>
    </div>

    <div class="card">
        <h3>Gold Bracelet</h3>
        <p>Minimal luxury accessory</p>
        <div class="price">€260</div>
    </div>

    <div class="card">
        <h3>Vintage Perfume</h3>
        <p>Classic French fragrance</p>
        <div class="price">€180</div>
    </div>

</section>

<!-- BAG -->
<section class="bag">

<h2>YOUR BAG</h2>

<p>Luxury Watch - €390</p>

<div class="total">
Total: €390
</div>

<button onclick="whatsapp()">WhatsApp Checkout</button>

</section>

<script>
function whatsapp(){
    let msg = "Hello, I want to buy items from Sollene Global Store.";
    let url = "https://wa.me/0000000000?text=" + encodeURIComponent(msg);
    window.open(url, "_blank");
}
</script>

</body>
</html>
