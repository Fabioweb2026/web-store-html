<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Global Store | Executive Collection</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #121212; /* FUNDO GRAFITE PROFUNDO */
            color: #f4f1ea; /* TEXTO CREME DOURADO */
            overflow-x: hidden;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(179, 147, 89, 0.2);
            background: #0a0a0a;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 800;
            color: #b39359;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        /* LAYOUT LADO A LADO */
        .main-container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* SEÇÃO DE PRODUTOS (LADO ESQUERDO) */
        .products-section {
            flex: 1;
        }

        h2 {
            font-size: 11px;
            color: #b39359;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); /* CARDS BEM MENORES */
            gap: 15px;
        }

        /* CARD COMPACTO (IGUAL À SUA IMAGEM, MAS MENOR) */
        .card {
            background: #1a1a1a;
            padding: 25px 15px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 240px; /* ALTURA REDUZIDA */
            transition: 0.3s;
        }

        .card:hover { border-color: #b39359; transform: translateY(-5px); }

        .card h3 { font-size: 14px; font-weight: 600; margin-bottom: 20px; }
        .card .price { font-size: 20px; color: #b39359; font-weight: 800; margin-bottom: 20px; }

        .btn-add {
            background: #b39359;
            color: #121212;
            border: none;
            padding: 12px;
            border-radius: 50px; /* BOTÃO ARREDONDADO DA SUA FOTO */
            font-weight: 800;
            text-transform: uppercase;
            font-size: 9px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-add:hover { background: #f4f1ea; }

        /* CARRINHO (LADO DIREITO) */
        .cart-sidebar {
            width: 320px;
            background: #0a0a0a;
            border: 1px solid rgba(179, 147, 89, 0.3);
            border-radius: 20px;
            padding: 25px;
            position: sticky;
            top: 20px;
        }

        .cart-sidebar h3 { font-size: 13px; color: #b39359; text-transform: uppercase; margin-bottom: 20px; text-align: center; }
        #cart-items { min-height: 50px; font-size: 13px; margin-bottom: 20px; }
        .cart-total { border-top: 1px solid #222; padding-top: 15px; display: flex; justify-content: space-between; font-weight: 800; font-size: 18px; }

        .btn-whatsapp {
            width: 100%;
            background: #25d366;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 800;
            margin-top: 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
        }

        @media(max-width: 900px) {
            .main-container { flex-direction: column; }
            .cart-sidebar { width: 100%; position: static; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">SOLLENE GLOBAL</div>
    </header>

    <div class="main-container">
        <main class="products-section">
            <h2>Clothing & Accessories</h2>
            
            <div class="products-grid">
                <!-- CARD 1 -->
                <div class="card">
                    <h3>Executive Shirt</h3>
                    <span class="price">€ 85.00</span>
                    <button class="btn-add" onclick="add('Executive Shirt', 85)">Add to Cart</button>
                </div>

                <!-- CARD 2 -->
                <div class="card">
                    <h3>Leather Belt</h3>
                    <span class="price">€ 110.00</span>
                    <button class="btn-add" onclick="add('Leather Belt', 110)">Add to Cart</button>
                </div>
            </div>
        </main>

        <aside class="cart-sidebar">
            <h3>Your Selection</h3>
            <div id="cart-items">No items selected</div>
            <div class="cart-total">
                <span>Total</span>
                <span id="total-price">€ 0.00</span>
            </div>
            <button class="btn-whatsapp" onclick="checkout()">Checkout WhatsApp</button>
        </aside>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function add(n, p) {
            cart.push({n, p});
            total += p;
            update();
        }

        function update() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${i.n}</span><span>€${i.p}</span></div>`).join('');
            document.getElementById('total-price').innerText = `€ ${total.toFixed(2)}`;
        }

        function checkout() {
            if(cart.length === 0) return alert("Empty cart!");
            let msg = "Order: " + cart.map(i => i.n).join(', ') + " | Total: €" + total.toFixed(2);
            window.open(`https://wa.me{msg}`);
        }
    </script>
</body>
</html>
