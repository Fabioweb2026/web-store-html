<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Luxury Store</title>
    <style>
        @import url('https://googleapis.com');
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; overflow: hidden; }

        /* IMAGEM DE FUNDO NÍTIDA */
        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('Solle-Global-Store.png') no-repeat center top;
            background-size: cover; z-index: -1;
        }

        /* HEADER BEGE LUXO */
        .main-header {
            background: rgba(247, 243, 235, 0.95);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05);
            position: relative; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle {
            width: 60px; height: 60px; border-radius: 50%; border: 1px solid #7a5c33;
            background: #fff url('logo.png') no-repeat center center; background-size: cover;
        }
        .brand-info h1 { font-size: 20px; font-weight: 800; color: #7a5c33; text-transform: uppercase; letter-spacing: 2px; }

        nav ul { display: flex; list-style: none; gap: 20px; }
        nav a { text-decoration: none; color: #000; font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        /* ABA LATERAL (SELECTION) */
        .side-menu {
            position: fixed; top: 0; right: -400px; width: 400px; height: 100%;
            background: #fff; box-shadow: -10px 0 50px rgba(0,0,0,0.2);
            z-index: 2000; transition: 0.5s cubic-bezier(0.77,0,0.175,1); padding: 40px;
        }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; z-index: 1900; }
        .overlay.active { display: block; }

        .drawer-item { display: flex; align-items: center; gap: 15px; margin: 25px 0; padding: 15px; background: #fdfaf6; border-radius: 15px; border: 1px solid #f1eee4; }
        .drawer-img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; }

        @media(max-width: 900px) { .side-menu { width: 100%; right: -100%; } }
    </style>
</head>
<body>

    <div class="main-bg"></div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <div class="brand-info"><h1>Sollene Group</h1></div>
        </div>
        <nav>
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a onclick="toggleMenu()">COLLECTIONS</a></li>
            </ul>
        </nav>
    </header>

    <!-- ABA LATERAL COM APENAS ALGUNS ITENS SELECIONADOS -->
    <div class="side-menu" id="sideMenu">
        <div onclick="toggleMenu()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px; text-align: right;">✕ CLOSE</div>
        <h2 style="letter-spacing:2px; font-size:18px; color:#7a5c33; text-transform:uppercase;">Curated Selection</h2>
        
        <div class="drawer-item">
            <img src="productos1.png" class="drawer-img">
            <div>
                <h4 style="font-size:12px; text-transform:uppercase;">Executive Shirt</h4>
                <p style="font-weight:800; color:#7a5c33;">€ 85.00</p>
            </div>
        </div>

        <div class="drawer-item">
            <img src="producto2.png" class="drawer-img">
            <div>
                <h4 style="font-size:12px; text-transform:uppercase;">Luxury Selection</h4>
                <p style="font-weight:800; color:#7a5c33;">€ 110.00</p>
            </div>
        </div>

        <button style="width:100%; padding:18px; background:#25d366; color:#fff; border:none; border-radius:12px; font-weight:800; margin-top:30px; cursor:pointer; text-transform:uppercase;">
            Order via WhatsApp
        </button>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
