<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Luxury Store</title>
    <style>
        @import url('https://googleapis.com');
        html { scroll-behavior: smooth; }
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f3eb; color: #1a1a1a; overflow-x: hidden; }

        /* HEADER */
        .main-header {
            background: rgba(247, 243, 235, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle {
            width: 65px; height: 65px; border-radius: 50%; border: 1px solid #7a5c33;
            background: #fff url('logo.png') no-repeat center center; background-size: cover;
        }
        .brand-info h1 { font-size: 22px; font-weight: 800; color: #7a5c33; letter-spacing: 3px; text-transform: uppercase; }

        /* MENU ESTILO AMAZON (DROPDOWN) */
        nav ul { display: flex; list-style: none; gap: 10px; align-items: center; }
        .nav-item { position: relative; }
        .nav-link { 
            text-decoration: none; color: #000; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; padding: 12px 15px; cursor: pointer; display: block;
        }

        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 0;
            background-color: #fff; min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-radius: 8px; overflow: hidden; z-index: 1100;
        }
        .dropdown-content a {
            color: #333; padding: 12px 16px; text-decoration: none; display: block;
            font-size: 10px; font-weight: 700; border-bottom: 1px solid #f9f9f9;
        }
        .dropdown-content a:hover { background-color: #f7f3eb; color: #7a5c33; }
        .nav-item:hover .dropdown-content { display: block; }

        /* CARRINHO */
        .cart-icon-container { position: relative; cursor: pointer; display: flex; align-items: center; padding: 5px; }
        .cart-badge {
            position: absolute; top: -5px; right: -5px; background: #7a5c33; color: #fff;
            font-size: 9px; font-weight: 800; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #f7f3eb;
        }

        /* HERO */
        .hero-section { width: 100%; height: 85vh; background: url('Solle-Global-Store.png') no-repeat center top; background-size: cover; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 40px; }

        /* VITRINE COM NOMES CORRIGIDOS */
        .products-section { background: #fff; padding: 80px 5%; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; max-width: 1300px; margin: 0 auto; }
        .card { background: #fff; border-radius: 24px; text-align: center; padding-bottom: 30px; transition: 0.4s; }
        .img-container { width: 100%; height: 400px; overflow: hidden; border-radius: 20px; margin-bottom: 20px; background: #f9f9f9; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .btn-add { background: #7a5c33; color: #fff; border: none; padding: 14px 40px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 10px; cursor: pointer; }

        /* SIDE MENU (DRAWER) */
        .side-menu {
            position: fixed; top: 0; right: -420px; width: 400px; height: 100%;
            background: #fff; box-shadow: -10px 0 50px rgba(0,0,0,0.1);
            z-index: 2000; transition: 0.5s; padding: 40px; overflow-y: auto;
        }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1900; }
        .overlay.active { display: block; }
        .cart-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .cart-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .btn-confirm { width: 100%; padding: 20px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 800; margin-top: 20px; cursor: pointer; text-transform: uppercase; }

        @media(max-width: 900px) { .side-menu { width: 100%; } .main-header { flex-direction: column; gap: 10px; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <div class="brand-info"><h1>Sollene Group</h1></div>
        </div>
        
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link" style="border: 2px solid #000; border-radius: 8px;">HOME</a></li>
                
                <!-- MENU DROPDOWN COLLECTIONS -->
                <li class="nav-item">
                    <span class="nav-link">COLLECTIONS ▼</span>
                    <div class="dropdown-content">
                        <a href="menshirts.html">MEN'S SHIRTS</a>
                        <a href="accessories.html">ACCESSORIES</a>
                        <a href="bolsas.html">BAGS COLLECTION</a>
                        <a href="woman.htlm">WOMEN'S SELECTION</a>
                    </div>
                </li>
            </ul>
        </nav>

        <div class="cart-icon-container" onclick="toggleMenu()">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7a5c33" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <div class="cart-badge" id="cart-count">0</div>
        </div>
    </header>

    <section class="hero-section"></section>

    <section class="products-section">
        <div class="products-grid">
            <!-- CARD 1: Nome corrigido para men1.png -->
            <div class="card">
                <div class="img-container"><img src="men1.png" class="card-img" onerror="this.src='logo.png'"></div>
                <h3>Executive Men Selection</h3>
                <p style="margin:15px 0; font-weight:800;">€ 95.00</p>
                <button class="btn-add" onclick="addToCart('Executive Men', 95, 'men1.png')">Add to Bag</button>
            </div>
            <!-- CARD 2: Nome corrigido para executivemen1.png -->
            <div class="card">
                <div class="img-container"><img src="executivemen1.png" class="card-img" onerror="this.src='logo.png'"></div>
                <h3>Luxury Executive Kit</h3>
                <p style="margin:15px 0; font-weight:800;">€ 120.00</p>
                <button class="btn-add" onclick="addToCart('Executive Kit', 120, 'executivemen1.png')">Add to Bag</button>
            </div>
            <!-- CARD 3: Nome corrigido para woman.bag.png -->
            <div class="card">
                <div class="img-container"><img src="woman.bag.png" class="card-img" onerror="this.src='logo.png'"></div>
                <h3>Signature Woman Bag</h3>
                <p style="margin:15px 0; font-weight:800;">€ 185.00</p>
                <button class="btn-add" onclick="addToCart('Woman Bag', 185, 'woman.bag.png')">Add to Bag</button>
            </div>
        </div>
    </section>

    <!-- ABA LATERAL -->
    <div class="side-menu" id="sideMenu">
        <div onclick="toggleMenu()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px; text-align: right;">✕ CLOSE</div>
        <h2 style="letter-spacing:2px; font-size:18px; color:#7a5c33; text-transform:uppercase;">Order Summary</h2>
        <div id="cart-items-list" style="margin-top:20px;">
            <p style="color:#999; font-size:13px;">Select a product first.</p>
        </div>
        <div id="total-area" style="display:none; margin-top:30px; padding-top:20px; border-top:2px solid #7a5c33; justify-content: space-between; font-weight: 800;">
            <span>TOTAL</span>
            <span id="cart-total-price">€ 0.00</span>
        </div>
        <button onclick="confirmOrder()" class="btn-confirm">Complete Purchase</button>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function addToCart(name, price, img) {
            cart.push({ name, price, img });
            total += price;
            renderCart();
            document.getElementById('cart-count').innerText = cart.length;
            toggleMenu();
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            const totalArea = document.getElementById('total-area');
            if (cart.length === 0) {
                list.innerHTML = '<p style="color:#999; font-size:13px;">Select a product first.</p>';
                totalArea.style.display = 'none';
            } else {
                totalArea.style.display = 'flex';
                list.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <img src="${item.img}" onerror="this.src='logo.png'">
                        <div class="cart-item-info">
                            <h4 style="font-size:10px; text-transform:uppercase;">${item.name}</h4>
                            <p style="font-weight:800; color:#7a5c33;">€ ${item.price}.00</p>
                        </div>
                    </div>
                `).join('');
            }
            document.getElementById('cart-total-price').innerText = `€ ${total}.00`;
        }

        function confirmOrder() {
            if (cart.length === 0) return alert("Select a product first.");
            alert("Order Processed!");
            cart = []; total = 0; renderCart();
            document.getElementById('cart-count').innerText = "0";
            toggleMenu();
        }
    </script>
</body>
</html>
