<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Global Store | Luxury Lifestyle</title>
    <style>
        @import url('https://googleapis.com');
        
        *{ margin:0; padding:0; box-sizing:border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            /* IMAGEM 100% NÍTIDA NO FUNDO */
            background: url('Solle-Global-Store.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #fff;
        }

        /* BARRA SUPERIOR (LOGO TEXTO) */
        header {
            background: rgba(0, 0, 0, 0.95);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #b39359;
            z-index: 1000;
            position: relative;
        }
        header h1 { font-size: 16px; font-weight: 800; letter-spacing: 8px; color: #b39359; text-transform: uppercase; }

        /* FAIXA DE PRODUTOS NO TOPO SUPERIOR */
        .top-shelf {
            width: 100%;
            background: rgba(0, 0, 0, 0.7); /* Transparência luxuosa */
            backdrop-filter: blur(10px);
            padding: 20px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-bottom: 1px solid rgba(179, 147, 89, 0.3);
        }

        /* CARDS MENORES E MAIS ELEGANTES */
        .card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(179, 147, 89, 0.4);
            border-radius: 12px;
            padding: 15px;
            width: 170px;
            text-align: center;
            transition: 0.4s;
        }
        .card:hover { background: rgba(179, 147, 89, 0.2); transform: translateY(-5px); }

        .card h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: #fff; }
        .card .price { font-size: 16px; font-weight: 800; color: #b39359; margin-bottom: 12px; display: block; }

        .btn-add {
            background: #b39359;
            color: #000;
            border: none;
            padding: 8px;
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 8px;
            cursor: pointer;
            width: 100%;
        }

        /* CARRINHO DISCRETO NA DIREITA SUPERIOR */
        .cart-sidebar {
            position: fixed;
            top: 130px;
            right: 20px;
            width: 280px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #b39359;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            z-index: 1001;
        }

        .cart-sidebar h4 { font-size: 11px; text-transform: uppercase; color: #b39359; margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
        #cart-items { font-size: 12px; max-height: 150px; overflow-y: auto; margin-bottom: 15px; }
        .total-box { border-top: 1px solid #333; padding-top: 15px; display: flex; justify-content: space-between; font-weight: 800; font-size: 18px; color: #b39359; }

        .btn-checkout {
            width: 100%;
            background: #25d366;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: 800;
            margin-top: 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 10px;
        }

        @media(max-width: 800px) {
            .top-shelf { overflow-x: auto; justify-content: flex-start; padding: 15px; }
            .card { flex-shrink: 0; }
            .cart-sidebar { position: static; width: 90%; margin: 20px auto; }
        }
    </style>
</head>
<body>

    <header>
        <h1>SOLLENE GLOBAL STORE</h1>
    </header>

    <!-- PRODUTOS AGORA FICAM NO TOPO -->
    <div class="top-shelf">
        <div class="card">
            <h3>Executive Shirt</h3>
            <span class="price">€ 85.00</span>
            <button class="btn-add" onclick="add('Shirt', 85)">Add to Cart</button>
        </div>

        <div class="card">
            <h3>Leather Belt</h3>
            <span class="price">€ 110.00</span>
            <button class="btn-add" onclick="add('Belt', 110)">Add to Cart</button>
        </div>

        <div class="card">
            <h3>Classic Tie</h3>
            <span class="price">€ 45.00</span>
            <button class="btn-add" onclick="add('Tie', 45)">Add to Cart</button>
        </div>
    </div>

    <!-- CARRINHO FLUTUANTE NA DIREITA -->
    <aside class="cart-sidebar">
        <h4>Your Selection</h4>
        <div id="cart-items">Empty bag</div>
        <div class="total-box">
            <span>Total</span>
            <span id="total-price">€ 0.00</span>
        </div>
        <button class="btn-checkout" onclick="checkout()">WhatsApp Order</button>
    </aside>

    <script>
        let cart = []; let total = 0;
        function add(n, p) {
            cart.push({n, p}); total += p; update();
        }
        function update() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:5px;"><span>${i.n}</span><span>€${i.p.toFixed(2)}</span></div>`).join('');
            document.getElementById('total-price').innerText = `€ ${total.toFixed(2)}`;
        }
        function checkout() {
            if(cart.length === 0) return alert("Select an item first!");
            window.open(`https://wa.me`);
        }
    </script>
</body>
</html>
