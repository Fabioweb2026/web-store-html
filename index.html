<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollene Group | Luxury Checkout</title>
    <style>
        @import url('https://googleapis.com');
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f3eb; overflow-x: hidden; }

        /* HEADER PREMIUM */
        .main-header {
            background: #f7f3eb; display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #d4af37; background: #fff url('logo.png') no-repeat center center; background-size: cover; }
        .brand-info h1 { font-size: 24px; font-weight: 800; color: #7a5c33; letter-spacing: 3px; text-transform: uppercase; }

        nav ul { display: flex; list-style: none; gap: 10px; align-items: center; }
        .nav-link { text-decoration: none; color: #000; font-size: 11px; font-weight: 800; text-transform: uppercase; padding: 10px 20px; }
        .btn-home { border: 2px solid #000; border-radius: 6px; }

        /* DROPDOWN AMAZON STYLE */
        .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background-color: #fff; min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); border-radius: 4px; z-index: 1100; }
        .dropdown-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; font-size: 10px; font-weight: 700; border-bottom: 1px solid #f9f9f9; }
        .nav-item:hover .dropdown-content { display: block; }
        .nav-item { position: relative; }

        /* CARRINHO */
        .cart-icon { cursor: pointer; position: relative; padding: 5px; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #7a5c33; color: #fff; font-size: 9px; font-weight: 800; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        /* BANNER */
        .hero-banner { width: 100%; height: 90vh; background: url('Solle-Global-Store.png') no-repeat center top; background-size: cover; }

        /* SIDE MENU (CHECKOUT DEFINITIVO) */
        .side-menu { position: fixed; top: 0; right: -420px; width: 400px; height: 100%; background: #fff; box-shadow: -10px 0 50px rgba(0,0,0,0.1); z-index: 2000; transition: 0.5s; padding: 40px; overflow-y: auto; }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1900; }
        .overlay.active { display: block; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .btn-delete { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; }

        .payment-box { margin-top: 30px; text-align: left; background: #fdfaf6; padding: 20px; border-radius: 12px; border: 1px solid #f1eee4; }
        .btn-finalize { width: 100%; padding: 20px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 800; margin-top: 20px; cursor: pointer; letter-spacing: 1px; }

        @media(max-width: 900px) { .side-menu { width: 100%; } }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <header class="main-header">
        <div class="header-left"><div class="logo-circle"></div><div class="brand-info"><h1>SOLLENE GROUP</h1></div></div>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link btn-home">HOME</a></li>
                <li class="nav-item">
                    <span class="nav-link">COLLECTIONS ▼</span>
                    <div class="dropdown-content">
                        <a href="menshirts.html">MEN'S SHIRTS</a>
                        <a href="accessories.html">ACCESSORIES</a>
                        <a href="bolsas.html">BAGS COLLECTION</a>
                        <a href="woman.html">WOMAN'S SELECTION</a>
                    </div>
                </li>
            </ul>
        </nav>
        <div class="cart-icon" onclick="toggleCart()">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7a5c33" stroke-width="2.5"><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle></svg>
            <div class="cart-badge" id="cart-count">0</div>
        </div>
    </header>

    <section class="hero-banner"></section>

    <!-- ABA DE CHECKOUT CENTRALIZADA -->
    <div class="side-menu" id="sideMenu">
        <div onclick="toggleCart()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px; text-align: right;">✕ CLOSE</div>
        <h2 style="letter-spacing:1px; font-size:18px; text-transform:uppercase; color:#7a5c33; margin-bottom: 20px;">Review & Pay</h2>
        
        <div id="cart-list"></div>

        <div style="margin-top:30px; padding-top:20px; border-top:2px solid #7a5c33; display:flex; justify-content:space-between; font-weight:800; font-size: 18px;">
            <span>TOTAL:</span><span id="total-price">€ 0.00</span>
        </div>

        <div class="payment-box">
            <h4 style="font-size:11px; text-transform:uppercase; color:#7a5c33; margin-bottom:15px;">Payment Method</h4>
            <label style="display:block; margin-bottom:12px; font-size:13px; font-weight:600; cursor:pointer;"><input type="radio" name="pay" value="Card" checked style="margin-right:10px; accent-color:#7a5c33;"> Credit / Debit Card</label>
            <label style="display:block; font-size:13px; font-weight:600; cursor:pointer;"><input type="radio" name="pay" value="Cash" style="margin-right:10px; accent-color:#7a5c33;"> Cash on Delivery</label>
            <p style="color:#991b1b; font-size:10px; font-weight:800; margin-top:20px; text-transform:uppercase;">* Full payment required (Europe Standard)</p>
        </div>

        <button class="btn-finalize" onclick="finalizeOrder()">COMPLETE PURCHASE</button>
    </div>

    <script>
        // Lógica de Memória Compartilhada
        let cart = JSON.parse(localStorage.getItem('sollene_cart')) || [];

        function toggleCart() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-list');
            
            if (cart.length === 0) {
                list.innerHTML = '<p style="color:#999; font-size:13px; text-align:center; padding:20px 0;">Your selection is empty.</p>';
            } else {
                list.innerHTML = cart.map((item, index) => `
                    <div class="cart-item">
                        <div>
                            <p style="font-size:12px; font-weight:800; text-transform:uppercase;">${item.name}</p>
                            <p style="font-size:12px; color:#7a5c33;">€ ${item.price}.00</p>
                        </div>
                        <button class="btn-delete" onclick="removeItem(${index})">Delete</button>
                    </div>
                `).join('');
            }
            
            let total = cart.reduce((sum, i) => sum + i.price, 0);
            document.getElementById('total-price').innerText = `€ ${total}.00`;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('sollene_cart', JSON.stringify(cart));
            updateUI();
        }

        function finalizeOrder() {
            if(cart.length === 0) return alert("Select products before paying.");
            const method = document.querySelector('input[name="pay"]:checked').value;
            alert("Success! Order placed via " + method + ".\nTotal: " + document.getElementById('total-price').innerText);
            
            // Limpa tudo após o sucesso
            cart = [];
            localStorage.removeItem('sollene_cart');
            updateUI();
            toggleCart();
        }

        window.onload = updateUI;
    </script>
</body>
</html>
