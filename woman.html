<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Selection | Sollene Group</title>
    <style>
        @import url('https://googleapis.com');
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f3eb; color: #1a1a1a; }
        .main-header { background: #f7f3eb; display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #d4af37; background: #fff url('logo.png') no-repeat center center; background-size: cover; }
        .brand-info h1 { font-size: 24px; font-weight: 800; color: #7a5c33; letter-spacing: 3px; text-transform: uppercase; }
        nav a { text-decoration: none; color: #000; font-size: 11px; font-weight: 800; text-transform: uppercase; border: 2px solid #000; padding: 8px 20px; border-radius: 6px; }
        .products-section { padding: 60px 5%; background: #fff; min-height: 100vh; text-align: center; }
        .page-title { margin-bottom: 50px; letter-spacing: 5px; color: #7a5c33; text-transform: uppercase; font-size: 14px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; border-radius: 24px; text-align: center; padding-bottom: 30px; transition: 0.4s; border: 1px solid #f9f9f9; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .img-container { width: 100%; height: 450px; overflow: hidden; border-radius: 20px; margin-bottom: 20px; background: #f9f9f9; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .btn-add { background: #7a5c33; color: #fff; border: none; padding: 14px 40px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <div class="brand-info"><h1>SOLLENE GROUP</h1></div>
        </div>
        <nav><a href="index.html">HOME</a></nav>
    </header>
    <main class="products-section">
        <h2 class="page-title">Women's Premium Selection</h2>
        <div class="products-grid">
            <div class="card">
                <div class="img-container">
                    <img src="woman.bag.png" class="card-img" alt="Woman Bag" onerror="this.src='logo.png'">
                </div>
                <h3>Signature Leather Bag</h3>
                <p style="font-weight:800; margin:15px 0; font-size: 18px;">€ 185.00</p>
                <button class="btn-add">Add to Bag</button>
            </div>
        </div>
    </main>
</body>
</html>
