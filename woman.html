<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Store</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f7f3eb;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:#fff;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo-circle img{
    width:45px;
    height:45px;
    border-radius:50%;
}

/* NAV */
nav a{
    margin:0 10px;
    text-decoration:none;
    color:#000;
    font-weight:700;
    font-size:12px;
}

/* CART ICON */
.cart{
    cursor:pointer;
    font-weight:700;
}

/* GRID */
.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:40px 5%;
}

/* CARD */
.card{
    background:#fff;
    border-radius:16px;
    padding:15px;
    text-align:center;
}

.img-container{
    height:260px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

select{
    width:90%;
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px 15px;
    border:none;
    background:#000;
    color:#fff;
    cursor:pointer;
}

/* CART */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
}

.overlay.active{
    display:block;
}

.side-menu{
    position:fixed;
    top:0;
    right:-400px;
    width:350px;
    height:100%;
    background:#fff;
    padding:20px;
    transition:0.3s;
    overflow:auto;
}

.side-menu.active{
    right:0;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    padding:10px 0;
}

.remove-btn{
    background:none;
    border:none;
    color:red;
    cursor:pointer;
}

.clear-btn{
    width:100%;
    padding:12px;
    background:#000;
    color:#fff;
    border:none;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo-circle">
        <img src="logo.png">
    </div>

    <nav>
        <a href="index.html">HOME</a>
        <a href="woman.html">WOMAN</a>
        <a href="menshirts.html">MEN</a>
        <a href="accessories.html">ACCESSORIES</a>
    </nav>

    <div class="cart" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
    </div>
</header>

<!-- PRODUCTS -->
<main class="products-grid">

    <!-- CARD 1 -->
    <div class="card">
        <div class="img-container">
            <img src="womancalca1.png">
        </div>

        <h3>Elegant Outfit</h3>
        <p>€120</p>

        <select>
            <option value="S">S</option>
            <option value="M">M</option>
        </select>

        <button onclick="addToCart('Elegant Outfit',120,this.previousElementSibling.value)">
            ADD TO CART
        </button>
    </div>

    <!-- CARD 2 -->
    <div class="card">
        <div class="img-container">
            <img src="womancalca2.png.jpg">
        </div>

        <h3>Pants Style</h3>
        <p>€80</p>

        <select>
            <option value="S">S</option>
            <option value="M">M</option>
        </select>

        <button onclick="addToCart('Pants Style',80,this.previousElementSibling.value)">
            ADD TO CART
        </button>
    </div>

</main>

<!-- CART -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="side-menu" id="sideMenu">

    <h2>Your Cart</h2>

    <div id="cart-list"></div>

    <p id="cart-total"></p>

    <button class="clear-btn" onclick="clearCart()">
        CLEAR CART
    </button>

</div>

<!-- JS -->
<script>
function getCart(){
    return JSON.parse(localStorage.getItem("sollene_cart")) || [];
}

function saveCart(cart){
    localStorage.setItem("sollene_cart", JSON.stringify(cart));
}

function addToCart(name, price, option){
    let cart = getCart();

    cart.push({name, price, option});

    saveCart(cart);
    updateCart();
    openCart();
}

function removeItem(index){
    let cart = getCart();
    cart.splice(index,1);
    saveCart(cart);
    updateCart();
}

function clearCart(){
    localStorage.removeItem("sollene_cart");
    updateCart();
}

function updateCart(){

    let cart = getCart();

    let list = document.getElementById("cart-list");
    let count = document.getElementById("cart-count");
    let total = document.getElementById("cart-total");

    if(count) count.innerText = cart.length;

    if(!list) return;

    if(cart.length === 0){
        list.innerHTML = "<p>Cart empty</p>";
        if(total) total.innerHTML = "";
        return;
    }

    let sum = 0;

    list.innerHTML = cart.map((item,index)=>{
        sum += Number(item.price);

        return `
        <div class="cart-item">
            <div>
                <b>${item.name}</b><br>
                <small>${item.option}</small><br>
                €${item.price}
            </div>

            <button class="remove-btn" onclick="removeItem(${index})">
                REMOVE
            </button>
        </div>
        `;
    }).join('');

    if(total){
        total.innerHTML = "TOTAL: € " + sum;
    }
}

function toggleCart(){
    document.getElementById("sideMenu").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

function openCart(){
    document.getElementById("sideMenu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

document.addEventListener("DOMContentLoaded", updateCart);
</script>

</body>
</html>
