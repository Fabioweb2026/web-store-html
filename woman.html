<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Women's Selection | Sollene Group</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:sans-serif;
    background:#f7f3eb;
    color:#1a1a1a;
}

.main-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    position:sticky;
    top:0;
    background:#f7f3eb;
    border-bottom:1px solid rgba(0,0,0,0.05);
}

.logo-circle{
    width:55px;height:55px;border-radius:50%;
    border:1px solid #d4af37;
    background:#fff url('logo.png') center/cover no-repeat;
}

nav a{
    text-decoration:none;
    font-weight:800;
    font-size:11px;
    color:#000;
    border:2px solid #000;
    padding:8px 20px;
    border-radius:6px;
}

.cart-icon{
    cursor:pointer;
    position:relative;
}

.cart-badge{
    position:absolute;
    top:-8px;
    right:-8px;
    background:#7a5c33;
    color:#fff;
    font-size:10px;
    width:18px;
    height:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
}

.products-section{
    padding:60px 5%;
    background:#fff;
}

.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:40px;
}

.card{
    background:#fff;
    border-radius:20px;
    padding-bottom:25px;
    text-align:center;
}

.img-container{
    height:500px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fdfaf6;
    margin-bottom:15px;
}

.card-img{
    max-width:100%;
    max-height:100%;
}

.select-option{
    width:80%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
}

.btn-add{
    background:#7a5c33;
    color:#fff;
    border:none;
    padding:14px 40px;
    border-radius:40px;
    font-weight:800;
    cursor:pointer;
}

.side-menu{
    position:fixed;
    top:0;
    right:-420px;
    width:400px;
    height:100%;
    background:#fff;
    box-shadow:-10px 0 50px rgba(0,0,0,0.1);
    transition:0.4s;
    padding:30px;
    overflow-y:auto;
}

.side-menu.active{right:0;}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
}

.overlay.active{display:block;}

.cart-item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    padding:10px 0;
}

.remove-btn{
    background:none;
    border:none;
    color:red;
    font-size:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<header class="main-header">
    <div style="display:flex;gap:15px;align-items:center;">
        <div class="logo-circle"></div>
        <h2 style="color:#7a5c33;">SOLLENE</h2>
    </div>

    <nav>
        <a href="index.html">HOME</a>
    </nav>

    <div class="cart-icon" onclick="toggleCart()">
        🛒
        <div class="cart-badge" id="cart-count">0</div>
    </div>
</header>

<section class="products-section">

<div class="products-grid">

<!-- CARD 1 -->
<div class="card">
    <div class="img-container">
        <img src="imagem.woman.png" class="card-img">
    </div>

    <h3>Executive Signature Style</h3>
    <p><b>€195.00</b></p>

    <select class="select-option">
        <option>T-Shirt</option>
        <option>Pants</option>
        <option>Full Outfit</option>
    </select>

    <button class="btn-add"
    onclick="addToCart('Executive Signature Style',195,this.parentNode.querySelector('select').value)">
    Add to Bag
    </button>
</div>

<!-- CARD 2 -->
<div class="card">
    <div class="img-container">
        <img src="womancalca2.png" class="card-img">
    </div>

    <h3>Executive Pants Style</h3>
    <p><b>€25.00</b></p>

    <select class="select-option">
        <option>Pants 1</option>
        <option>Pants 2</option>
        <option>Full Outfit</option>
    </select>

    <button class="btn-add"
    onclick="addToCart('Executive Pants Style',25,this.parentNode.querySelector('select').value)">
    Add to Bag
    </button>
</div>

</div>

</section>

<!-- CART -->
<div class="side-menu" id="sideMenu">
    <h3>Cart</h3>
    <div id="cart-list"></div>
</div>

<script>

function getCart(){
    return JSON.parse(localStorage.getItem("sollene_cart")) || [];
}

function saveCart(cart){
    localStorage.setItem("sollene_cart", JSON.stringify(cart));
}

function addToCart(name, price, option){

    let cart = getCart();

    cart.push({name, price, option});

    saveCart(cart);
    updateUI();
    toggleCart();
}

function removeItem(index){
    let cart = getCart();
    cart.splice(index,1);
    saveCart(cart);
    updateUI();
}

function updateUI(){

    let cart = getCart();

    document.getElementById("cart-count").innerText = cart.length;

    let list = document.getElementById("cart-list");

    if(!list) return;

    if(cart.length === 0){
        list.innerHTML = "<p>Cart empty</p>";
        return;
    }

    list.innerHTML = cart.map((item,index)=>`
        <div class="cart-item">
            <div>
                <b>${item.name}</b><br>
                ${item.option}<br>
                €${item.price}
            </div>
            <button class="remove-btn" onclick="removeItem(${index})">X</button>
        </div>
    `).join('');
}

function toggleCart(){
    document.getElementById("sideMenu").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

document.addEventListener("DOMContentLoaded", updateUI);

</script>

</body>
</html>
