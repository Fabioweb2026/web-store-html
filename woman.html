<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:sans-serif;
    background:#f7f3eb;
    color:#1a1a1a;
}

.main-header{
    background:#f7f3eb;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px 5%;
    border-bottom:1px solid rgba(0,0,0,0.05);
    position:sticky;
    top:0;
    z-index:1000;
}

.logo-circle{
    width:55px;
    height:55px;
    border-radius:50%;
    border:1px solid #d4af37;
    background:#fff url('logo.png') no-repeat center center;
    background-size:cover;
}

nav a{
    text-decoration:none;
    color:#000;
    font-size:11px;
    font-weight:800;
    text-transform:uppercase;
    border:2px solid #000;
    padding:8px 20px;
    border-radius:6px;
}

.cart-icon{
    cursor:pointer;
    position:relative;
    padding:5px;
}

.cart-badge{
    position:absolute;
    top:-10px;
    right:-8px;
    background:#7a5c33;
    color:#fff;
    font-size:10px;
    font-weight:800;
    width:20px;
    height:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    border:2px solid #f7f3eb;
}

.products-section{
    padding:60px 5%;
    background:#fff;
    min-height:100vh;
    text-align:center;
}

.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:40px;
    max-width:1200px;
    margin:0 auto;
}

.card{
    background:#fff;
    border-radius:24px;
    text-align:center;
    padding-bottom:30px;
    border:1px solid #f9f9f9;
    overflow:hidden;
}

.img-container{
    width:100%;
    height:550px;
    overflow:hidden;
    background:#fdfaf6;
    margin-bottom:20px;
    padding:10px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card-img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

.select-option{
    width:80%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ddd;
    margin-bottom:18px;
    font-weight:700;
    background:#fff;
}

.btn-add{
    background:#7a5c33;
    color:#fff;
    border:none;
    padding:15px 45px;
    border-radius:50px;
    font-weight:800;
    text-transform:uppercase;
    font-size:10px;
    cursor:pointer;
}

.side-menu{
    position:fixed;
    top:0;
    right:-420px;
    width:400px;
    height:100%;
    background:#fff;
    box-shadow:-10px 0 50px rgba(0,0,0,0.1);
    z-index:2000;
    transition:0.5s;
    padding:40px;
    overflow-y:auto;
}

.side-menu.active{
    right:0;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    z-index:1900;
}

.overlay.active{
    display:block;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    border-bottom:1px solid #eee;
    padding-bottom:10px;
    font-size:13px;
}

.remove-btn{
    color:#ff4d4d;
    border:none;
    background:none;
    cursor:pointer;
    font-size:10px;
    font-weight:800;
    text-transform:uppercase;
}

</style>
</head>

<script>

function getCart(){

return JSON.parse(localStorage.getItem('sollene_cart')) || [];

}

function toggleCart(){

document.getElementById('sideMenu').classList.toggle('active');

document.getElementById('overlay').classList.toggle('active');

}

function addToCart(name, price, option){

let currentCart = getCart();

currentCart.push({

name:name,
price:price,
option:option

});

localStorage.setItem(
'sollene_cart',
JSON.stringify(currentCart)
);

updateUI();

document.getElementById('sideMenu').classList.add('active');

document.getElementById('overlay').classList.add('active');

}

function removeItem(index){

let currentCart = getCart();

currentCart.splice(index,1);

localStorage.setItem(
'sollene_cart',
JSON.stringify(currentCart)
);

updateUI();

}

function updateUI(){

let currentCart = getCart();

document.getElementById('cart-count').innerText = currentCart.length;

const list = document.getElementById('cart-list');

if(currentCart.length === 0){

list.innerHTML = `
<p style="color:#999; font-size:13px;">
Bag is empty.
</p>
`;

}else{

list.innerHTML = currentCart.map((item,index)=>`

<div class="cart-item">

<div>

<p style="font-weight:800; text-transform:uppercase; font-size:11px;">
${item.name}
</p>

<p style="color:#7a5c33; font-size:12px; margin-top:3px;">
${item.option}
</p>

<p style="color:#000; font-size:12px; margin-top:3px;">
€ ${item.price}.00
</p>

</div>

<button class="remove-btn" onclick="removeItem(${index})">
DELETE
</button>

</div>

`).join('');

}

}

window.onload = updateUI;

</script>
