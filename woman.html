<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollene Group</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#f7f3eb;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:#fff;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    z-index:1000;
}

/* LOGO */
.logo-circle{
    width:55px;
    height:55px;
    border-radius:50%;
    overflow:hidden;
    border:2px solid #d4af37;
}

.logo-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
}

nav a{
    text-decoration:none;
    color:#000;
    margin:0 10px;
    font-weight:700;
    font-size:12px;
}

.cart-icon{
    cursor:pointer;
    font-size:18px;
}

/* HERO */
.hero{
    width:100%;
    height:85vh;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 20%;
}

/* GRID */
.collections{
    padding:60px 5%;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-top:30px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:16px;
}

/* CART */
.side-menu{
    position:fixed;
    top:0;
    right:-400px;
    width:380px;
    height:100%;
    background:#fff;
    padding:20px;
    transition:0.3s;
    overflow:auto;
    z-index:2000;
}

.side-menu.active{
    right:0;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
}

.overlay.active{
    display:block;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.remove-btn{
    background:none;
    border:none;
    color:red;
    cursor:pointer;
    font-size:12px;
}

.clear-btn, .checkout-btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    cursor:pointer;
    font-weight:700;
}

.clear-btn{
    background:#000;
    color:#fff;
}

.checkout-btn{
    background:#7a5c33;
    color:#fff;
}

</style>

</head>

<body>

<!-- HEADER -->
<header>

    <div class="logo-circle">
        <img src="logo.png">
    </div>

    <nav>
        <a href="index.html">HOME</a>
        <a href="woman.html">WOMAN</a>
        <a href="menshirts.html">MEN</a>
        <a href="accessories.html">ACCESSORIES</a>
    </nav>

    <div class="cart-icon" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
    </div>

</header>

<!-- HERO -->
<section class="hero">
    <img src="Solle-Global-Store.png">
</section>

<!-- COLLECTIONS -->
<section class="collections">

    <h2>COLLECTIONS</h2>

    <div class="grid">

        <div class="card">
            <h3>Women</h3>
            <a href="woman.html">View Collection</a>
        </div>

        <div class="card">
            <h3>Men</h3>
            <a href="menshirts.html">View Collection</a>
        </div>

        <div class="card">
            <h3>Accessories</h3>
            <a href="accessories.html">View Collection</a>
        </div>

    </div>

</section>

<!-- CART -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="side-menu" id="sideMenu">

    <h2>Your Cart</h2>

    <div id="cart-list"></div>

    <p id="cart-total" style="margin-top:10px;font-weight:bold;"></p>

    <button class="clear-btn" onclick="clearCart()">
        CLEAR CART
    </button>

    <button class="checkout-btn" onclick="checkout()">
        FINALIZE PURCHASE
    </button>

</div>

<script>

function getCart(){
    return JSON.parse(localStorage.getItem("sollene_cart")) || [];
}

function saveCart(cart){
    localStorage.setItem("sollene_cart", JSON.stringify(cart));
}

function updateUI(){

    let cart = getCart();

    let list = document.getElementById("cart-list");
    let totalBox = document.getElementById("cart-total");

    document.getElementById("cart-count").innerText = cart.length;

    if(!list) return;

    if(cart.length === 0){
        list.innerHTML = "<p>Cart empty</p>";
        if(totalBox) totalBox.innerText = "";
        return;
    }

    let total = 0;

    list.innerHTML = cart.map((item,index)=>{
        total += Number(item.price);

        return `
        <div class="cart-item">
            <div>
                <b>${item.name}</b><br>
                <small>${item.option}</small><br>
                €${item.price}
            </div>

            <button class="remove-btn" onclick="removeItem(${index})">
                REMOVE
            </button>
        </div>
        `;
    }).join('');

    totalBox.innerText = "Total: € " + total;
}

function removeItem(index){
    let cart = getCart();
    cart.splice(index,1);
    saveCart(cart);
    updateUI();
}

function clearCart(){
    localStorage.removeItem("sollene_cart");
    updateUI();
}

function toggleCart(){
    document.getElementById("sideMenu").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

function checkout(){
    let cart = getCart();

    if(cart.length === 0){
        alert("Cart is empty");
        return;
    }

    alert("Order completed successfully!");
    localStorage.removeItem("sollene_cart");
    updateUI();
    toggleCart();
}

document.addEventListener("DOMContentLoaded", updateUI);

</script>

</body>
</html>
