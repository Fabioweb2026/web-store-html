<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Women | Sollene</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#f7f3eb;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:#fff;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    z-index:1000;
}

/* LOGO */
.logo-circle{
    width:55px;
    height:55px;
    border-radius:50%;
    overflow:hidden;
}

.logo-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* GRID */
.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
    padding:40px 5%;
}

/* CARD */
.card{
    background:#fff;
    border-radius:16px;
    padding:15px;
    text-align:center;
}

/* IMAGE */
.img-container{
    width:100%;
    height:320px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fdfaf6;
    border-radius:12px;
    overflow:hidden;
}

.card-img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:10px;
}

/* BUTTON */
.btn-add{
    width:100%;
    margin-top:10px;
    padding:12px;
    background:#7a5c33;
    color:#fff;
    border:none;
    cursor:pointer;
    font-weight:700;
    border-radius:8px;
}

/* CART */
.side-menu{
    position:fixed;
    top:0;
    right:-400px;
    width:380px;
    height:100%;
    background:#fff;
    padding:20px;
    transition:0.3s;
    overflow:auto;
    z-index:2000;
}

.side-menu.active{
    right:0;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
}

.overlay.active{
    display:block;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.remove-btn{
    background:none;
    border:none;
    color:red;
    cursor:pointer;
    font-size:12px;
}

.clear-btn{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#000;
    color:#fff;
    border:none;
    cursor:pointer;
}

.cart-icon{
    cursor:pointer;
    font-size:18px;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>

    <div class="logo-circle">
        <img src="logo.png">
    </div>

    <nav>
        <a href="index.html">HOME</a>
    </nav>

    <div class="cart-icon" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
    </div>

</header>

<!-- PRODUCTS -->
<main class="products-grid">

    <!-- CARD 1 -->
    <div class="card">
        <div class="img-container">
            <img src="womancalca1.png" class="card-img">
        </div>

        <h3>Elegant Outfit</h3>
        <p>€195</p>

        <select class="select-option">
            <option value="T-Shirt">T-Shirt</option>
            <option value="Pants">Pants</option>
            <option value="Full">Full Outfit</option>
        </select>

        <button class="btn-add"
        onclick="addToCart('Elegant Outfit',195,this.previousElementSibling.value)">
            ADD TO CART
        </button>
    </div>

    <!-- CARD 2 -->
    <div class="card">
        <div class="img-container">
            <img src="woman.calca2.png.jpg" class="card-img">
        </div>

        <h3>Luxury Pants</h3>
        <p>€120</p>

        <select class="select-option">
            <option value="Pants 1">Pants 1</option>
            <option value="Pants 2">Pants 2</option>
        </select>

        <button class="btn-add"
        onclick="addToCart('Luxury Pants',120,this.previousElementSibling.value)">
            ADD TO CART
        </button>
    </div>

</main>

<!-- CART -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="side-menu" id="sideMenu">

    <h2>Your Cart</h2>

    <div id="cart-list"></div>

    <button class="clear-btn" onclick="clearCart()">
        CLEAR CART
    </button>

</div>

<!-- SCRIPT (GLOBAL CART) -->
<script>

function getCart(){
    return JSON.parse(localStorage.getItem("sollene_cart")) || [];
}

function saveCart(cart){
    localStorage.setItem("sollene_cart", JSON.stringify(cart));
}

function addToCart(name, price, option){
    let cart = getCart();

    cart.push({name, price, option});

    saveCart(cart);
    updateUI();
    openCart();
}

function removeItem(index){
    let cart = getCart();

    cart.splice(index,1);

    saveCart(cart);
    updateUI();
}

function clearCart(){
    localStorage.removeItem("sollene_cart");
    updateUI();
}

function updateUI(){

    let cart = getCart();

    document.getElementById("cart-count").innerText = cart.length;

    let list = document.getElementById("cart-list");

    if(cart.length === 0){
        list.innerHTML = "<p>Cart empty</p>";
        return;
    }

    list.innerHTML = cart.map((item,index)=>`
        <div class="cart-item">
            <div>
                <b>${item.name}</b><br>
                <small>${item.option}</small><br>
                €${item.price}
            </div>

            <button class="remove-btn" onclick="removeItem(${index})">
                REMOVE
            </button>
        </div>
    `).join('');
}

function toggleCart(){
    document.getElementById("sideMenu").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

function openCart(){
    document.getElementById("sideMenu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

document.addEventListener("DOMContentLoaded", updateUI);

</script>

</body>
</html>
