<!DOCTYPE html>
<html lang="en">

    <style>
        @import url('googleapis.com');
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f3eb; color: #1a1a1a; }
        .main-header { background: #f7f3eb; display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #d4af37; background: #fff url('logo.png') no-repeat center center; background-size: cover; }
        .cart-icon-container { position: relative; cursor: pointer; display: flex; align-items: center; }
        .cart-badge { position: absolute; top: -8px; right: -8px; background: #7a5c33; color: #fff; font-size: 10px; font-weight: 800; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #f7f3eb; }
        .products-section { padding: 60px 5%; background: #fff; min-height: 100vh; text-align: center; }
        .page-title { margin-bottom: 50px; letter-spacing: 5px; color: #7a5c33; text-transform: uppercase; font-size: 14px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; border-radius: 24px; text-align: center; padding-bottom: 30px; border: 1px solid #f9f9f9; transition: 0.4s; overflow: hidden; }
        .img-container { width: 100%; height: 550px; overflow: hidden; background: #fdfaf6; margin-bottom: 20px; padding: 10px; display: flex; align-items: center; justify-content: center; }
        .card-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-add { background: #7a5c33; color: #fff; border: none; padding: 15px 45px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 11px; cursor: pointer; }
        .side-menu { position: fixed; top: 0; right: -420px; width: 400px; height: 100%; background: #fff; box-shadow: -10px 0 50px rgba(0,0,0,0.1); z-index: 2000; transition: 0.5s; padding: 40px; overflow-y: auto; }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1900; }
        .overlay.active { display: block; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; font-size: 13px; }
    </style>
</head>
