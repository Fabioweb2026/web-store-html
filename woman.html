<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sollene Store</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f7f3eb;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:#fff;
    position:sticky;
    top:0;
}

/* LOGO */
.logo img{
    width:45px;
    height:45px;
    border-radius:50%;
}

/* NAV */
nav a{
    margin:0 8px;
    text-decoration:none;
    color:#000;
    font-size:12px;
    font-weight:700;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:40px 5%;
}

/* CARD */
.card{
    background:#fff;
    padding:15px;
    border-radius:16px;
    text-align:center;
}

.img-box{
    height:260px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.img-box img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

select{
    width:90%;
    padding:10px;
    margin:10px 0;
}

button{
    background:#000;
    color:#fff;
    border:none;
    padding:10px;
    cursor:pointer;
}

/* CART */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
}

.overlay.active{
    display:block;
}

.cart{
    position:fixed;
    right:-400px;
    top:0;
    width:350px;
    height:100%;
    background:#fff;
    padding:20px;
    transition:0.3s;
    overflow:auto;
}

.cart.active{
    right:0;
}

.item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    padding:10px 0;
}

.remove{
    color:red;
    background:none;
    border:none;
    cursor:pointer;
}

.clear{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#000;
    color:#fff;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo">
        <img src="logo.png">
    </div>

    <nav>
        <a href="index.html">HOME</a>
        <a href="woman.html">WOMAN</a>
        <a href="menshirts.html">MEN</a>
        <a href="accessories.html">ACCESSORIES</a>
    </nav>

    <div onclick="toggleCart()" style="cursor:pointer;">
        🛒 <span id="count">0</span>
    </div>
</header>

<!-- PRODUCTS -->
<div class="grid">

    <div class="card">
        <div class="img-box">
            <img src="womancalca1.png">
        </div>
        <h3>Product 1</h3>
        <p>€100</p>

        <select>
            <option value="S">S</option>
            <option value="M">M</option>
        </select>

        <button onclick="add('Product 1',100,this.previousElementSibling.value)">
            ADD
        </button>
    </div>

    <div class="card">
        <div class="img-box">
            <img src="womancalca2.png.jpg">
        </div>
        <h3>Product 2</h3>
        <p>€80</p>

        <select>
            <option value="S">S</option>
            <option value="M">M</option>
        </select>

        <button onclick="add('Product 2',80,this.previousElementSibling.value)">
            ADD
        </button>
    </div>

</div>

<!-- CART -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">

    <h2>Your Cart</h2>

    <div id="list"></div>

    <p id="total"></p>

    <button class="clear" onclick="clearCart()">CLEAR CART</button>
</div>

<script>
function getCart(){
    return JSON.parse(localStorage.getItem("sollene_cart")) || [];
}

function save(cart){
    localStorage.setItem("sollene_cart", JSON.stringify(cart));
}

function add(name,price,size){
    let cart = getCart();
    cart.push({name,price,size});
    save(cart);
    update();
    openCart();
}

function remove(i){
    let cart = getCart();
    cart.splice(i,1);
    save(cart);
    update();
}

function clearCart(){
    localStorage.removeItem("sollene_cart");
    update();
}

function update(){
    let cart = getCart();

    let list = document.getElementById("list");
    let count = document.getElementById("count");
    let total = document.getElementById("total");

    if(count) count.innerText = cart.length;

    if(cart.length === 0){
        list.innerHTML = "<p>Empty</p>";
        total.innerHTML = "";
        return;
    }

    let sum = 0;

    list.innerHTML = cart.map((i,idx)=>{
        sum += Number(i.price);

        return `
        <div class="item">
            <div>
                <b>${i.name}</b><br>
                ${i.size}<br>
                €${i.price}
            </div>

            <button class="remove" onclick="remove(${idx})">X</button>
        </div>
        `;
    }).join('');

    total.innerHTML = "TOTAL € " + sum;
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

function openCart(){
    document.getElementById("cart").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

update();
</script>

</body>
</html>
