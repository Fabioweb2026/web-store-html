<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Women's Collection | Sollene Group</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:sans-serif;
    background:#f7f3eb;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:#f7f3eb;
    position:sticky;
    top:0;
    border-bottom:1px solid rgba(0,0,0,0.05);
}

.logo-circle{
    width:55px;height:55px;
    border-radius:50%;
    border:1px solid #d4af37;
    background:#fff url('logo.png') center/cover no-repeat;
}

.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
    padding:25px;
}

.card{
    background:#fff;
    border-radius:18px;
    padding:15px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.img-container{
    height:320px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f7f3eb;
    border-radius:12px;
    margin-bottom:10px;
}

.card-img{
    max-width:100%;
    max-height:100%;
}

.select-option{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

.btn-add{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#7a5c33;
    color:#fff;
    font-weight:800;
    cursor:pointer;
}

.cart-icon{
    cursor:pointer;
}

.cart-badge{
    background:#7a5c33;
    color:#fff;
    border-radius:50%;
    padding:4px 8px;
    font-size:12px;
    margin-left:5px;
}

.side-menu{
    position:fixed;
    top:0;
    right:-420px;
    width:400px;
    height:100%;
    background:#fff;
    box-shadow:-10px 0 30px rgba(0,0,0,0.1);
    transition:0.4s;
    padding:20px;
    overflow-y:auto;
}

.side-menu.active{right:0;}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
}

.overlay.active{display:block;}

.cart-item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    padding:10px 0;
}

.remove-btn{
    background:none;
    border:none;
    color:red;
    font-size:11px;
    cursor:pointer;
}

.btn-clear{
    width:100%;
    margin-top:15px;
    padding:10px;
    border:none;
    background:#000;
    color:#fff;
    cursor:pointer;
    border-radius:20px;
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<header>
    <div style="display:flex;gap:10px;align-items:center;">
        <div class="logo-circle"></div>
        <h3>SOLLENE</h3>
    </div>

    <div onclick="toggleCart()" class="cart-icon">
        🛒 <span id="cart-count" class="cart-badge">0</span>
    </div>
</header>

<!-- PRODUCTS -->
<div class="products-grid">

    <!-- CARD 1 -->
    <div class="card">
        <div class="img-container">
            <img src="imagem.woman.png" class="card-img">
        </div>

        <h3>Signature Style</h3>
        <p><b>€195</b></p>

        <select class="select-option">
            <option>T-Shirt</option>
            <option>Pants</option>
            <option>Full Outfit</option>
        </select>

        <button class="btn-add"
        onclick="addToCart('Signature Style',195,this.parentNode.querySelector('select').value)">
        Add to Bag
        </button>
    </div>

    <!-- CARD 2 -->
    <div class="card">
        <div class="img-container">
            <img src="womancalca2.png.jpg" class="card-img">
        </div>

        <h3>Luxury Pants</h3>
        <p><b>€85</b></p>

        <select class="select-option">
            <option>Size 36</option>
            <option>Size 38</option>
            <option>Size 40</option>
        </select>

        <button class="btn-add"
        onclick="addToCart('Luxury Pants',85,this.parentNode.querySelector('select').value)">
        Add to Bag
        </button>
    </div>

    <!-- CARD 3 -->
    <div class="card">
        <div class="img-container">
            <img src="womancalça3.png" class="card-img">
        </div>

        <h3>Premium Pants</h3>
        <p><b>€95</b></p>

        <select class="select-option">
            <option>Black</option>
            <option>Beige</option>
            <option>Grey</option>
        </select>

        <button class="btn-add"
        onclick="addToCart('Premium Pants',95,this.parentNode.querySelector('select').value)">
        Add to Bag
        </button>
    </div>

</div>

<!-- CART -->
<div class="side-menu" id="sideMenu">
    <h3>Your Cart</h3>

    <div id="cart-list"></div>

    <button class="btn-clear" onclick="clearCart()">
        Clear Cart
    </button>
</div>

<script>

function getCart(){
    return JSON.parse(localStorage.getItem("sollene_cart")) || [];
}

function saveCart(cart){
    localStorage.setItem("sollene_cart", JSON.stringify(cart));
}

function addToCart(name, price, option){
    let cart = getCart();
    cart.push({name, price, option});
    saveCart(cart);
    updateUI();
}

function removeItem(index){
    let cart = getCart();
    cart.splice(index,1);
    saveCart(cart);
    updateUI();
}

function clearCart(){
    localStorage.removeItem("sollene_cart");
    updateUI();
}

function updateUI(){

    let cart = getCart();

    document.getElementById("cart-count").innerText = cart.length;

    let list = document.getElementById("cart-list");

    if(cart.length === 0){
        list.innerHTML = "<p>Cart empty</p>";
        return;
    }

    list.innerHTML = cart.map((item,index)=>`
        <div class="cart-item">
            <div>
                <b>${item.name}</b><br>
                ${item.option}<br>
                €${item.price}
            </div>

            <button class="remove-btn" onclick="removeItem(${index})">
                REMOVE
            </button>
        </div>
    `).join('');
}

function toggleCart(){
    document.getElementById("sideMenu").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

document.addEventListener("DOMContentLoaded", updateUI);

</script>

</body>
</html>
