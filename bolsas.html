<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bags Collection | Sollene Group Official</title>
    <style>
        @import url('https://googleapis.com');
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f3eb; color: #1a1a1a; }

        /* HEADER PREMIUM */
        .main-header {
            background: #f7f3eb; display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-circle { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #d4af37; background: #fff url('logo.png') no-repeat center center; background-size: cover; }
        
        .cart-icon-container { position: relative; cursor: pointer; display: flex; align-items: center; }
        .cart-badge {
            position: absolute; top: -8px; right: -8px; background: #7a5c33; color: #fff;
            font-size: 10px; font-weight: 800; width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #f7f3eb;
        }

        /* VITRINE CENTRALIZADA */
        .products-section { padding: 60px 5%; background: #fff; min-height: 100vh; text-align: center; }
        .page-title { margin-bottom: 50px; letter-spacing: 5px; color: #7a5c33; text-transform: uppercase; font-size: 14px; }
        
        .products-grid { 
            display: flex; 
            justify-content: center; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: #fff; 
            border-radius: 24px; 
            text-align: center; 
            padding-bottom: 30px; 
            border: 1px solid #f9f9f9; 
            width: 100%;
            max-width: 450px; 
            transition: 0.4s;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }

        .img-container { width: 100%; height: 480px; overflow: hidden; border-radius: 20px; margin-bottom: 20px; background: #f9f9f9; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }

        .btn-add {
            background: #7a5c33; color: #fff; border: none;
            padding: 15px 45px; border-radius: 50px; font-weight: 800;
            text-transform: uppercase; font-size: 11px; cursor: pointer;
        }

        /* ABA LATERAL */
        .side-menu { position: fixed; top: 0; right: -420px; width: 400px; height: 100%; background: #fff; box-shadow: -10px 0 50px rgba(0,0,0,0.1); z-index: 2000; transition: 0.5s; padding: 40px; }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1900; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <header class="main-header">
        <div class="header-left">
            <div class="logo-circle"></div>
            <h1 style="font-size: 20px; font-weight: 800; color: #7a5c33;">SOLLENE</h1>
        </div>
        <nav><a href="index.html" style="text-decoration:none; color:#000; font-weight:800; font-size:11px; border: 2px solid #000; padding: 8px 15px; border-radius: 6px;">HOME</a></nav>
        
        <div class="cart-icon-container" onclick="toggleCart()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7a5c33" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <div class="cart-badge" id="cart-count">0</div>
        </div>
    </header>

    <main class="products-section">
        <h2 class="page-title">Executive Bags Selection</h2>
        <div class="products-grid">
            
            <div class="card">
                <div class="img-container">
                    <!-- Nova imagem inserida aqui -->
                    <img src="bolsa.1.png" class="card-img" alt="Executive Bag" onerror="this.src='logo.png'">
                </div>
                <h3>Executive Signature Bag</h3>
                <p style="font-weight:800; margin:15px 0; font-size: 20px;">€ 195.00</p>
                <button class="btn-add" onclick="addToCart('Signature Bag', 195)">Add to Bag</button>
            </div>

        </div>
    </main>

    <div class="side-menu" id="sideMenu">
        <div onclick="toggleCart()" style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px; text-align: right;">✕ CLOSE</div>
        <h2 style="letter-spacing:1px; font-size:18px; text-transform:uppercase; color:#7a5c33;">Summary</h2>
        <div id="cart-list" style="margin-top:20px;"></div>
        <button style="width:100%; padding:18px; background:#000; color:#fff; border:none; border-radius:12px; font-weight:800; margin-top:20px; cursor:pointer;">CHECKOUT</button>
    </div>

    <script>
        let count = 0;
        function toggleCart() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        function addToCart(name, price) {
            count++;
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-list').innerHTML = `<div style="display:flex; justify-content:space-between;"><span>${name}</span><strong>€ ${price}.00</strong></div>`;
            toggleCart();
        }
    </script>
</body>
</html>
