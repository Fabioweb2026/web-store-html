<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bags Collection | Sollene Group Official</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:sans-serif;
            background:#f7f3eb;
            color:#1a1a1a;
            overflow-x:hidden;
        }

        /* HEADER */
        .main-header{
            background:#f7f3eb;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:15px 5%;
            border-bottom:1px solid rgba(0,0,0,0.05);
            position:sticky;
            top:0;
            z-index:1000;
        }

        .header-left{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .logo-circle{
            width:55px;
            height:55px;
            border-radius:50%;
            border:1px solid #d4af37;
            background:#fff url('logo.png') no-repeat center center;
            background-size:cover;
        }

        .nav-box a{
            text-decoration:none;
            color:#000;
            font-size:11px;
            font-weight:800;
            text-transform:uppercase;
            border:2px solid #000;
            padding:8px 20px;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
        }

        .nav-box a:hover{
            background:#000;
            color:#fff;
        }

        /* CART ICON */
        .cart-icon-container{
            position:relative;
            cursor:pointer;
            display:flex;
            align-items:center;
        }

        .cart-badge{
            position:absolute;
            top:-10px;
            right:-8px;
            background:#7a5c33;
            color:#fff;
            font-size:10px;
            font-weight:800;
            width:20px;
            height:20px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:50%;
            border:2px solid #f7f3eb;
        }

        /* PRODUCTS */
        .products-section{
            padding:60px 5%;
            background:#fff;
            min-height:100vh;
            text-align:center;
        }

        .page-title{
            margin-bottom:50px;
            letter-spacing:5px;
            color:#7a5c33;
            text-transform:uppercase;
            font-size:14px;
        }

        .products-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:40px;
            max-width:1300px;
            margin:0 auto;
        }

        .card{
            background:#fff;
            border-radius:24px;
            text-align:center;
            padding-bottom:30px;
            border:1px solid #f0f0f0;
            transition:0.4s;
        }

        .card:hover{
            transform:translateY(-10px);
            box-shadow:0 15px 30px rgba(0,0,0,0.05);
        }

        .img-container{
            width:100%;
            height:480px;
            overflow:hidden;
            background:#fdfaf6;
            margin-bottom:20px;
            border-radius:20px;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:15px;
        }

        .card-img{
            max-width:100%;
            max-height:100%;
            object-fit:contain;
            transition:0.5s;
        }

        .btn-add{
            background:#7a5c33;
            color:#fff;
            border:none;
            padding:15px 40px;
            border-radius:50px;
            font-weight:800;
            text-transform:uppercase;
            font-size:10px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-add:hover{
            background:#000;
        }

        /* SIDE CART */
        .side-menu{
            position:fixed;
            top:0;
            right:-420px;
            width:400px;
            height:100%;
            background:#fff;
            box-shadow:-10px 0 50px rgba(0,0,0,0.1);
            z-index:2000;
            transition:0.5s;
            padding:40px;
            overflow-y:auto;
        }

        .side-menu.active{
            right:0;
        }

        .overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.4);
            display:none;
            z-index:1900;
        }

        .overlay.active{
            display:block;
        }

        .cart-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:15px;
            padding-bottom:10px;
            border-bottom:1px solid #eee;
            font-size:13px;
        }

        .remove-btn{
            color:#ff4d4d;
            border:none;
            background:none;
            cursor:pointer;
            font-size:10px;
            font-weight:800;
            text-transform:uppercase;
        }

        .checkout-btn{
            display:block;
            text-align:center;
            padding:18px;
            background:#000;
            color:#fff;
            text-decoration:none;
            border-radius:12px;
            font-weight:800;
            margin-top:15px;
            font-size:11px;
            text-transform:uppercase;
            letter-spacing:1px;
            transition:0.3s;
        }

        .checkout-btn:hover{
            background:#7a5c33;
        }

        @media(max-width:768px){

            .products-grid{
                grid-template-columns:1fr;
            }

            .side-menu{
                width:100%;
            }
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <header class="main-header">

        <div class="header-left">
            <div class="logo-circle"></div>
            <h1 style="font-size:20px; font-weight:800; color:#7a5c33;">
                SOLLENE
            </h1>
        </div>

        <div class="nav-box">
            <a href="./index.html">
                HOME
            </a>
        </div>

        <div class="cart-icon-container" onclick="toggleCart()">

            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7a5c33" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>

            <div class="cart-badge" id="cart-count">0</div>

        </div>

    </header>

    <main class="products-section">

        <h2 class="page-title">
            Executive Bags Collection
        </h2>

        <div class="products-grid">

            <!-- PRODUCT 1 -->
            <div class="card">

                <div class="img-container">
                    <img src="bolsa.1.png"
                         class="card-img"
                         onerror="this.src='logo.png'">
                </div>

                <h3>Executive Signature Bag</h3>

                <p style="font-weight:800; margin:15px 0; font-size:18px;">
                    € 195.00
                </p>

                <button class="btn-add"
                        onclick="addToCart('Executive Signature Bag',195)">
                    Add to Bag
                </button>

            </div>

            <!-- PRODUCT 2 -->
            <div class="card">

                <div class="img-container">
                    <img src="woman.bag.png"
                         class="card-img"
                         onerror="this.src='logo.png'">
                </div>

                <h3>Signature Leather Clutch</h3>

                <p style="font-weight:800; margin:15px 0; font-size:18px;">
                    € 185.00
                </p>

                <button class="btn-add"
                        onclick="addToCart('Signature Leather Clutch',185)">
                    Add to Bag
                </button>

            </div>

            <!-- PRODUCT 3 -->
            <div class="card">

                <div class="img-container">
                    <img src="bolsa.1.png"
                         class="card-img"
                         onerror="this.src='logo.png'">
                </div>

                <h3>Premium Travel Case</h3>

                <p style="font-weight:800; margin:15px 0; font-size:18px;">
                    € 210.00
                </p>

                <button class="btn-add"
                        onclick="addToCart('Premium Travel Case',210)">
                    Add to Bag
                </button>

            </div>

        </div>

    </main>

    <!-- SIDE MENU -->
    <div class="side-menu" id="sideMenu">

        <div onclick="toggleCart()"
             style="cursor:pointer; font-weight:800; color:#7a5c33; margin-bottom:30px; text-align:right;">
            ✕ CLOSE
        </div>

        <h2 style="letter-spacing:1px; font-size:18px; text-transform:uppercase; color:#7a5c33;">
            Selected Items
        </h2>

        <div id="cart-list" style="margin-top:20px;"></div>

        <div style="
            margin-top:25px;
            padding-top:20px;
            border-top:2px solid #7a5c33;
            display:flex;
            justify-content:space-between;
            font-weight:800;
            font-size:18px;
        ">
            <span>TOTAL:</span>
            <span id="cart-total">€ 0.00</span>
        </div>

        <p style="
            margin-top:30px;
            font-size:12px;
            background:#f7f3eb;
            padding:15px;
            border-radius:8px;
            font-weight:600;
            text-align:center;
        ">
            To finalize payment,<br>
            please proceed to the <strong>HOME PAGE</strong>.
        </p>

        <a href="./index.html?openCart=true"
           class="checkout-btn">
            GO TO CHECKOUT
        </a>

    </div>

    <script>

        function getCart(){

            return JSON.parse(
                localStorage.getItem('sollene_cart')
            ) || [];

        }

        function saveCart(cart){

            localStorage.setItem(
                'sollene_cart',
                JSON.stringify(cart)
            );

        }

        function toggleCart(){

            document
                .getElementById('sideMenu')
                .classList.toggle('active');

            document
                .getElementById('overlay')
                .classList.toggle('active');

        }

        function addToCart(name, price){

            let cart = getCart();

            cart.push({
                name:name,
                price:price
            });

            saveCart(cart);

            updateUI();

            if(
                !document
                    .getElementById('sideMenu')
                    .classList.contains('active')
            ){
                toggleCart();
            }

        }

        function removeItem(index){

            let cart = getCart();

            cart.splice(index,1);

            saveCart(cart);

            updateUI();

        }

        function updateUI(){

            let cart = getCart();

            document.getElementById('cart-count').innerText = cart.length;

            const list = document.getElementById('cart-list');

            if(cart.length === 0){

                list.innerHTML = `
                    <p style="color:#999; font-size:13px;">
                        Bag is empty.
                    </p>
                `;

            } else {

                list.innerHTML = cart.map((item,index) => `

                    <div class="cart-item">

                        <div>
                            <p style="
                                font-weight:800;
                                text-transform:uppercase;
                                font-size:11px;
                            ">
                                ${item.name}
                            </p>

                            <p style="
                                color:#7a5c33;
                                font-size:12px;
                                font-weight:600;
                                margin-top:3px;
                            ">
                                € ${item.price}.00
                            </p>
                        </div>

                        <button class="remove-btn"
                                onclick="removeItem(${index})">
                            DELETE
                        </button>

                    </div>

                `).join('');

            }

            let total = cart.reduce(
                (sum,item) => sum + item.price,
                0
            );

            document.getElementById('cart-total').innerText =
                `€ ${total}.00`;

        }

        window.onload = function(){

            updateUI();

        };

    </script>

</body>
</html>
