<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accessories</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
    background:#f7f3eb;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:#f7f3eb;
    border-bottom:1px solid #ddd;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    padding:40px;
    background:#fff;
}

.card{
    background:#fff;
    border:1px solid #eee;
    border-radius:12px;
    padding:20px;
    text-align:center;
}

img{
    max-width:100%;
    height:220px;
    object-fit:contain;
}

select{
    width:80%;
    padding:10px;
    margin:10px 0;
}

button{
    background:#7a5c33;
    color:#fff;
    border:none;
    padding:12px 25px;
    font-weight:800;
    border-radius:30px;
    cursor:pointer;
}

#cartBox{
    position:fixed;
    right:0;
    top:0;
    width:320px;
    height:100%;
    background:#fff;
    border-left:1px solid #ddd;
    padding:20px;
    overflow:auto;
}

.item{
    border-bottom:1px solid #eee;
    padding:10px 0;
    font-size:13px;
}

.remove{
    background:none;
    border:none;
    color:red;
    font-weight:800;
    cursor:pointer;
}

</style>
</head>

<body>

<header>
<h2>SOLLENE ACCESSORIES</h2>
<div>CART (<span id="count">0</span>)</div>
</header>

<section class="products">

<!-- ITEM 1 -->
<div class="card">
<img src="accessory1.png" onerror="this.src='logo.png'">

<h3>Luxury Belt</h3>
<p>€120</p>

<select id="opt1">
<option>Black</option>
<option>Brown</option>
</select>

<button onclick="add('Luxury Belt',120,opt1.value)">
ADD TO CART
</button>
</div>

<!-- ITEM 2 -->
<div class="card">
<img src="accessory2.png" onerror="this.src='logo.png'">

<h3>Designer Wallet</h3>
<p>€90</p>

<select id="opt2">
<option>Leather</option>
<option>Carbon</option>
</select>

<button onclick="add('Designer Wallet',90,opt2.value)">
ADD TO CART
</button>
</div>

</section>

<!-- CART -->
<div id="cartBox">
<h3>Your Cart</h3>
<div id="list"></div>
</div>

<script>

function getCart(){
return JSON.parse(localStorage.getItem("sollene_cart")) || [];
}

function saveCart(c){
localStorage.setItem("sollene_cart", JSON.stringify(c));
}

function add(name,price,option){

let cart = getCart();

cart.push({
name:name,
price:price,
option:option
});

saveCart(cart);
render();
}

function removeItem(i){

let cart = getCart();

cart.splice(i,1);

saveCart(cart);
render();
}

function render(){

let cart = getCart();

document.getElementById("count").innerText = cart.length;

let list = document.getElementById("list");

if(cart.length === 0){
list.innerHTML = "<p>Cart empty</p>";
return;
}

list.innerHTML = cart.map((p,i)=>`
<div class="item">
<b>${p.name}</b><br>
${p.option}<br>
€ ${p.price}
<br>
<button class="remove" onclick="removeItem(${i})">DELETE</button>
</div>
`).join("");

}

render();

</script>

</body>
</html>
