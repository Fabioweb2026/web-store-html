<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessories | Sollene Group Official</title>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        body { font-family: sans-serif; background: #f7f3eb; color: #1a1a1a; }
        .main-header { background: #f7f3eb; display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo-circle { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #d4af37; background: #fff url('logo.png') no-repeat center center; background-size: cover; }
        nav a { text-decoration: none; color: #000; font-size: 11px; font-weight: 800; text-transform: uppercase; border: 2px solid #000; padding: 8px 20px; border-radius: 6px; cursor: pointer; }
        .cart-icon-container { position: relative; cursor: pointer; display: flex; align-items: center; }
        .cart-badge { position: absolute; top: -10px; right: -8px; background: #7a5c33; color: #fff; font-size: 10px; font-weight: 800; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #f7f3eb; }
        .products-section { padding: 60px 5%; background: #fff; min-height: 100vh; text-align: center; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; border-radius: 24px; text-align: center; padding-bottom: 30px; border: 1px solid #f9f9f9; }
        .img-container { width: 100%; height: 480px; overflow: hidden; border-radius: 20px; margin-bottom: 20px; background: #fdfaf6; padding: 15px; display: flex; align-items: center; justify-content: center; }
        .card-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-add { background: #7a5c33; color: #fff; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <header class="main-header">
        <div style="display:flex; align-items:center; gap:15px;"><div class="logo-circle"></div><h1 style="font-size:20px; color:#7a5c33; font-weight:800;">SOLLENE</h1></div>
        <nav><a href="index.html">HOME</a></nav>
        <div class="cart-icon-container" onclick="goToCheckout()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7a5c33" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <div class="cart-badge" id="cart-count">0</div>
        </div>
    </header>

    <main class="products-section">
        <div class="products-grid">
            <div class="card">
                <div class="img-container"><img src="produtdos45.png" class="card-img" onerror="this.src='logo.png'"></div>
                <h3>Executive Tie</h3><p style="font-weight:800; margin:15px 0; font-size: 18px;">€ 45.00</p>
                <button class="btn-add" onclick="addToCart('Executive Tie', 45)">Add to Bag</button>
            </div>
            <div class="card">
                <div class="img-container"><img src="produtdos45.png" class="card-img" style="filter: hue-rotate(50deg);" onerror="this.src='logo.png'"></div>
                <h3>Leather Belt</h3><p style="font-weight:800; margin:15px 0; font-size: 18px;">€ 65.00</p>
                <button class="btn-add" onclick="addToCart('Leather Belt', 65)">Add to Bag</button>
            </div>
            <div class="card">
                <div class="img-container"><img src="produtdos45.png" class="card-img" style="filter: brightness(0.8);" onerror="this.src='logo.png'"></div>
                <h3>Slim Wallet</h3><p style="font-weight:800; margin:15px 0; font-size: 18px;">€ 55.00</p>
                <button class="btn-add" onclick="addToCart('Slim Wallet', 55)">Add to Bag</button>
            </div>
        </div>
    </main>

    <script>
        function getGlobalCart() { return JSON.parse(localStorage.getItem('sollene_cart')) || []; }
        function addToCart(name, price) {
            let cart = getGlobalCart();
            cart.push({name, price});
            localStorage.setItem('sollene_cart', JSON.stringify(cart));
            goToCheckout();
        }
        function goToCheckout() { window.location.href = "index.html"; }
        window.onload = function() { document.getElementById('cart-count').innerText = getGlobalCart().length; }
    </script>
</body>
</html>
