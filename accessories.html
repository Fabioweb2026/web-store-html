<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accessories | Sollene Group</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:sans-serif;
    background:#f7f3eb;
}

.main-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:#f7f3eb;
    border-bottom:1px solid rgba(0,0,0,0.05);
    position:sticky;
    top:0;
    z-index:1000;
}

.logo-circle{
    width:55px;
    height:55px;
    border-radius:50%;
    border:1px solid #d4af37;
    background:#fff url('logo.png') center/cover no-repeat;
}

.cart-btn{
    font-weight:800;
    cursor:pointer;
}

.products-section{
    padding:60px 5%;
    background:#fff;
    min-height:100vh;
}

.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:40px;
}

.card{
    background:#fff;
    border-radius:20px;
    padding:20px;
    border:1px solid #eee;
    text-align:center;
}

.img-container{
    height:400px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fdfaf6;
    margin-bottom:15px;
}

.card img{
    max-width:100%;
    max-height:100%;
}

select{
    width:80%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

button{
    background:#7a5c33;
    color:#fff;
    border:none;
    padding:12px 30px;
    border-radius:30px;
    font-weight:800;
    cursor:pointer;
}

.side-menu{
    position:fixed;
    top:0;
    right:-420px;
    width:380px;
    height:100%;
    background:#fff;
    box-shadow:-10px 0 40px rgba(0,0,0,0.2);
    transition:0.4s;
    padding:25px;
    overflow:auto;
    z-index:2000;
}

.side-menu.active{
    right:0;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
    z-index:1500;
}

.overlay.active{
    display:block;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    padding:10px 0;
}

.remove{
    background:none;
    color:red;
    font-weight:800;
    border:none;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<header class="main-header">

<div class="logo-circle"></div>

<div class="cart-btn" onclick="toggleCart()">
CART (<span id="count">0</span>)
</div>

</header>

<section class="products-section">

<div class="products-grid">

<!-- CARD 1 -->
<div class="card">

<div class="img-container">
<img src="accessory1.png">
</div>

<h3>Luxury Belt</h3>
<p>€120</p>

<select id="op1">
<option value="Black">Black</option>
<option value="Brown">Brown</option>
</select>

<button onclick="add('Luxury Belt',120,op1.value)">
ADD TO CART
</button>

</div>

<!-- CARD 2 -->
<div class="card">

<div class="img-container">
<img src="accessory2.png">
</div>

<h3>Designer Wallet</h3>
<p>€90</p>

<select id="op2">
<option value="Leather">Leather</option>
<option value="Carbon">Carbon</option>
</select>

<button onclick="add('Designer Wallet',90,op2.value)">
ADD TO CART
</button>

</div>

</div>

</section>

<div class="side-menu" id="cart">

<h3>Cart</h3>

<div id="list"></div>

</div>

<script>

function getCart(){
return JSON.parse(localStorage.getItem("sollene_cart")) || [];
}

function save(cart){
localStorage.setItem("sollene_cart", JSON.stringify(cart));
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

function add(name,price,option){

let cart = getCart();

cart.push({
name:name,
price:price,
option:option
});

save(cart);

render();
}

function removeItem(i){

let cart = getCart();

cart.splice(i,1);

save(cart);

render();
}

function render(){

let cart = getCart();

document.getElementById("count").innerText = cart.length;

let list = document.getElementById("list");

if(cart.length === 0){
list.innerHTML = "<p>Cart empty</p>";
return;
}

list.innerHTML = cart.map((p,i)=>`
<div class="cart-item">

<div>
<b>${p.name}</b><br>
<small>${p.option}</small><br>
€ ${p.price}
</div>

<button class="remove" onclick="removeItem(${i})">X</button>

</div>
`).join("");

}

render();

</script>

</body>
</html>
