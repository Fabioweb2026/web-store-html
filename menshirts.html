<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Store</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
    background:#f7f3eb;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:#fff;
    border-bottom:1px solid #ddd;
    position:sticky;
    top:0;
}

/* GRID */
.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:40px 5%;
}

.card{
    background:#fff;
    border-radius:15px;
    padding:15px;
    text-align:center;
}

/* IMAGE FIX */
.img-container{
    height:260px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card-img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

/* SELECT */
select{
    width:100%;
    padding:10px;
    margin:10px 0;
}

/* BUTTON */
.btn-add{
    width:100%;
    padding:10px;
    background:#7a5c33;
    color:#fff;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* CART */
.side-menu{
    position:fixed;
    top:0;
    right:-400px;
    width:360px;
    height:100%;
    background:#fff;
    transition:0.3s;
    padding:20px;
    overflow:auto;
    box-shadow:-5px 0 20px rgba(0,0,0,0.1);
}

.side-menu.active{
    right:0;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
}

.overlay.active{
    display:block;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    padding:10px 0;
}

.remove-btn{
    background:none;
    border:none;
    color:red;
    cursor:pointer;
    font-weight:800;
}

.clear-btn{
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#000;
    color:#fff;
    border:none;
    cursor:pointer;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<header>

<h2>MY STORE</h2>

<div onclick="toggleCart()" style="cursor:pointer;">
🛒 <span id="cart-count">0</span>
</div>

</header>

<!-- PRODUCTS -->
<div class="products-grid">

    <div class="card">
        <div class="img-container">
            <img src="bone.png" class="card-img">
        </div>

        <h3>Cap</h3>
        <p>€45</p>

        <select>
            <option>Black</option>
            <option>White</option>
        </select>

        <button class="btn-add"
        onclick="addToCart('Cap',45,this.parentNode.querySelector('select').value)">
        Add
        </button>
    </div>

    <div class="card">
        <div class="img-container">
            <img src="chinelo.png" class="card-img">
        </div>

        <h3>Slides</h3>
        <p>€60</p>

        <select>
            <option>40</option>
            <option>41</option>
        </select>

        <button class="btn-add"
        onclick="addToCart('Slides',60,this.parentNode.querySelector('select').value)">
        Add
        </button>
    </div>

</div>

<!-- CART -->
<div class="side-menu" id="sideMenu">

    <h2>Your Cart</h2>

    <div id="cart-list"></div>

    <button class="clear-btn" onclick="clearCart()">
        CLEAR CART
    </button>

</div>

<script>

function getCart(){
    return JSON.parse(localStorage.getItem("sollene_cart")) || [];
}

function saveCart(cart){
    localStorage.setItem("sollene_cart", JSON.stringify(cart));
}

function addToCart(name, price, option){
    let cart = getCart();

    cart.push({name, price, option});

    saveCart(cart);
    updateUI();
    toggleCart();
}

function removeItem(index){
    let cart = getCart();
    cart.splice(index,1);
    saveCart(cart);
    updateUI();
}

function clearCart(){
    localStorage.removeItem("sollene_cart");
    updateUI();
}

function updateUI(){

    let cart = getCart();

    document.getElementById("cart-count").innerText = cart.length;

    let list = document.getElementById("cart-list");

    if(cart.length === 0){
        list.innerHTML = "<p>Cart empty</p>";
        return;
    }

    list.innerHTML = cart.map((item,index)=>`
        <div class="cart-item">
            <div>
                <b>${item.name}</b><br>
                ${item.option}<br>
                €${item.price}
            </div>

            <button class="remove-btn" onclick="removeItem(${index})">
                X
            </button>
        </div>
    `).join('');

}

function toggleCart(){
    document.getElementById("sideMenu").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

document.addEventListener("DOMContentLoaded", updateUI);

</script>

</body>
</html>
