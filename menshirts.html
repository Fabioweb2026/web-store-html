<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Men Shirts</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
    background:#f7f3eb;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#f7f3eb;
    border-bottom:1px solid #ddd;
}

.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.img-container{
    height:280px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f7f3eb;
}

.card-img{
    max-width:100%;
    max-height:100%;
}

.select-option{
    width:100%;
    padding:10px;
    margin:10px 0;
}

.btn-add{
    width:100%;
    padding:10px;
    background:#7a5c33;
    color:#fff;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.side-menu{
    position:fixed;
    right:-400px;
    top:0;
    width:380px;
    height:100%;
    background:#fff;
    transition:0.3s;
    padding:20px;
}

.side-menu.active{
    right:0;
}

</style>
</head>

<body>

<header>
    <h3>SOLLENE</h3>
    <div onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
</header>

<div class="products-grid">

    <div class="card">
        <div class="img-container">
            <img src="menshirt1.png" class="card-img">
        </div>

        <h3>Classic Shirt</h3>
        <p>€120</p>

        <select class="select-option">
            <option>S</option>
            <option>M</option>
            <option>L</option>
        </select>

        <button class="btn-add"
        onclick="addToCart('Classic Shirt',120,this.parentNode.querySelector('select').value)">
        Add to Bag
        </button>
    </div>

</div>

<!-- CART -->
<div class="side-menu" id="sideMenu">
    <h3>Cart</h3>
    <div id="cart-list"></div>
</div>

<script>

function getCart(){
    return JSON.parse(localStorage.getItem("sollene_cart")) || [];
}

function saveCart(cart){
    localStorage.setItem("sollene_cart", JSON.stringify(cart));
}

function addToCart(name, price, option){
    let cart = getCart();
    cart.push({name, price, option});
    saveCart(cart);
    updateUI();
}

function updateUI(){

    let cart = getCart();

    document.getElementById("cart-count").innerText = cart.length;

    let list = document.getElementById("cart-list");

    if(!list) return;

    list.innerHTML = cart.map((item)=>`
        <div>
            <b>${item.name}</b><br>
            ${item.option}<br>
            €${item.price}
        </div>
        <hr>
    `).join('');

}

function toggleCart(){
    document.getElementById("sideMenu").classList.toggle("active");
}

document.addEventListener("DOMContentLoaded", updateUI);

</script>

</body>
</html>
