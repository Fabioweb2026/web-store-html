<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Men Shirts | Sollene Group</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:sans-serif;
    background:#f7f3eb;
}

.main-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:#f7f3eb;
    border-bottom:1px solid #ddd;
}

.logo-circle{
    width:50px;
    height:50px;
    border-radius:50%;
    background:url('logo.png') center/cover;
    border:1px solid #d4af37;
}

.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    padding:40px 5%;
}

.card{
    background:#fff;
    border-radius:20px;
    padding:15px;
    text-align:center;
.img-container{
    width:100%;
    height:320px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fdfaf6;
    border-radius:16px;
    overflow:hidden;
}

.card-img{
    width:100%;
    height:100%;
    object-fit:contain; /* mantém proporção sem cortar */
    padding:10px;
}
.select-option{
    width:90%;
    padding:12px;
    margin:10px 0;
}
    .img-container{
    width:100%;
    height:320px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fdfaf6;
    border-radius:16px;
    overflow:hidden;
}

.card-img{
    width:100%;
    height:100%;
    object-fit:contain; /* mantém proporção sem cortar */
    padding:10px;
}

.select-option{
    width:90%;
    padding:12px;
    margin:10px 0;
}

.btn-add{
    width:100%;
    padding:12px;
    background:#7a5c33;
    border:none;
    color:#fff;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
}

.side-menu{
    position:fixed;
    right:-420px;
    top:0;
    width:380px;
    height:100%;
    background:#fff;
    transition:0.3s;
    padding:20px;
    overflow:auto;
}

.side-menu.active{
    right:0;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
}

.overlay.active{
    display:block;
}

.cart-item{
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.remove-btn{
    background:none;
    border:none;
    color:red;
    font-size:12px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<header class="main-header">

<div class="logo-circle"></div>

<h3>SOLLENE MEN</h3>

<div onclick="toggleCart()" style="cursor:pointer;">
🛒 <span id="cart-count">0</span>
</div>

</header>

<div class="products-grid">

<!-- CARD 1 -->
<div class="card">
    <div class="img-container">
        <img src="bone.png" class="card-img">
    </div>
    <h3>Luxury Cap</h3>
    <p>€45</p>

    <select class="select-option">
        <option>Black</option>
        <option>White</option>
    </select>

    <button class="btn-add"
    onclick="addToCart('Luxury Cap',45,this.parentNode.querySelector('select').value)">
    Add to Bag
    </button>
</div>

<!-- CARD 2 -->
<div class="card">
    <div class="img-container">
        <img src="chinelo.png" class="card-img">
    </div>
    <h3>Luxury Slides</h3>
    <p>€60</p>

    <select class="select-option">
        <option>40</option>
        <option>41</option>
        <option>42</option>
    </select>

    <button class="btn-add"
    onclick="addToCart('Luxury Slides',60,this.parentNode.querySelector('select').value)">
    Add to Bag
    </button>
</div>

<!-- CARD 3 -->
<div class="card">
    <div class="img-container">
        <img src="gravata.png">
    </div>
    <h3>Silk Tie</h3>
    <p>€35</p>

    <select class="select-option">
        <option>Red</option>
        <option>Black</option>
    </select>

    <button class="btn-add"
    onclick="addToCart('Silk Tie',35,this.parentNode.querySelector('select').value)">
    Add to Bag
    </button>
</div>

<!-- CARD 4 -->
<div class="card">
    <div class="img-container">
        <img src="menshorts.png">
    </div>
    <h3>Summer Shorts</h3>
    <p>€80</p>

    <select class="select-option">
        <option>S</option>
        <option>M</option>
        <option>L</option>
    </select>

    <button class="btn-add"
    onclick="addToCart('Summer Shorts',80,this.parentNode.querySelector('select').value)">
    Add to Bag
    </button>
</div>

</div>

<!-- CART -->
<div class="side-menu" id="sideMenu">
    <h3>Cart</h3>
    <div id="cart-list"></div>
</div>

<script>

function getCart(){
    return JSON.parse(localStorage.getItem("sollene_cart")) || [];
}

function saveCart(cart){
    localStorage.setItem("sollene_cart", JSON.stringify(cart));
}

function addToCart(name, price, option){
    let cart = getCart();
    cart.push({name, price, option});
    saveCart(cart);
    updateUI();
    toggleCart();
}

function removeItem(index){
    let cart = getCart();
    cart.splice(index,1);
    saveCart(cart);
    updateUI();
}

function updateUI(){

    let cart = getCart();

    document.getElementById("cart-count").innerText = cart.length;

    let list = document.getElementById("cart-list");

    if(!list) return;

    if(cart.length === 0){
        list.innerHTML = "<p>Cart empty</p>";
        return;
    }

    list.innerHTML = cart.map((item,index)=>`
        <div class="cart-item">
            <b>${item.name}</b><br>
            ${item.option}<br>
            €${item.price}
            <br>
            <button class="remove-btn" onclick="removeItem(${index})">REMOVE</button>
        </div>
    `).join('');
}

function toggleCart(){
    document.getElementById("sideMenu").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

document.addEventListener("DOMContentLoaded", updateUI);

</script>

</body>
</html>
