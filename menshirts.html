<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollene Store</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:sans-serif;
    background:#f7f3eb;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:#fff;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
}

.logo{
    font-weight:800;
    color:#7a5c33;
}

/* GRID PRODUTOS */
.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:25px;
    padding:40px 5%;
}

/* CARD */
.card{
    background:#fff;
    border-radius:16px;
    padding:15px;
    text-align:center;
}

.img-container{
    width:100%;
    height:320px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fdfaf6;
    border-radius:12px;
    overflow:hidden;
}

.card-img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:10px;
}

.select-option{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

.btn-add{
    width:100%;
    margin-top:10px;
    padding:12px;
    background:#7a5c33;
    color:#fff;
    border:none;
    cursor:pointer;
    font-weight:700;
    border-radius:8px;
}

/* CART */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
}

.overlay.active{
    display:block;
}

.side-menu{
    position:fixed;
    top:0;
    right:-400px;
    width:380px;
    height:100%;
    background:#fff;
    padding:20px;
    transition:0.3s;
    overflow:auto;
}

.side-menu.active{
    right:0;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.remove-btn{
    color:red;
    border:none;
    background:none;
    cursor:pointer;
}

.clear-btn{
    width:100%;
    padding:12px;
    background:#000;
    color:#fff;
    border:none;
    margin-top:15px;
    cursor:pointer;
}

.cart-icon{
    cursor:pointer;
}

</style>
</head>

<body>

<header>
    <div class="logo">SOLLENE GROUP</div>

    <div class="cart-icon" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
    </div>
</header>

<div class="products-grid">

    <!-- CARD EXEMPLO -->
    <div class="card">
        <div class="img-container">
            <img src="womancalca1.png" class="card-img">
        </div>

        <h3>Product 1</h3>
        <p>€195</p>

        <select class="select-option">
            <option value="T-Shirt">T-Shirt</option>
            <option value="Pants">Pants</option>
            <option value="Full">Full</option>
        </select>

        <button class="btn-add"
        onclick="addToCart('Product 1',195,this.previousElementSibling.value)">
        ADD TO CART
        </button>
    </div>

    <!-- OUTRO CARD -->
    <div class="card">
        <div class="img-container">
            <img src="woman.calça2.png.jpg" class="card-img">
        </div>

        <h3>Product 2</h3>
        <p>€120</p>

        <select class="select-option">
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
        </select>

        <button class="btn-add"
        onclick="addToCart('Product 2',120,this.previousElementSibling.value)">
        ADD TO CART
        </button>
    </div>

</div>

<!-- CART -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="side-menu" id="sideMenu">

    <h2>Your Cart</h2>

    <div id="cart-list"></div>

    <button class="clear-btn" onclick="clearCart()">
        CLEAR CART
    </button>

</div>

<script>

/* CART SYSTEM */

function getCart(){
    return JSON.parse(localStorage.getItem("sollene_cart")) || [];
}

function saveCart(cart){
    localStorage.setItem("sollene_cart", JSON.stringify(cart));
}

function addToCart(name, price, option){

    let cart = getCart();

    cart.push({name, price, option});

    saveCart(cart);
    updateUI();
    openCart();
}

function removeItem(index){
    let cart = getCart();

    cart.splice(index,1);

    saveCart(cart);
    updateUI();
}

function clearCart(){
    localStorage.removeItem("sollene_cart");
    updateUI();
}

function updateUI(){

    let cart = getCart();

    document.getElementById("cart-count").innerText = cart.length;

    let list = document.getElementById("cart-list");

    if(cart.length === 0){
        list.innerHTML = "<p>Cart empty</p>";
        return;
    }

    list.innerHTML = cart.map((item,index)=>`
        <div class="cart-item">
            <div>
                <b>${item.name}</b><br>
                <small>${item.option}</small><br>
                €${item.price}
            </div>

            <button class="remove-btn" onclick="removeItem(${index})">
                X
            </button>
        </div>
    `).join('');
}

function toggleCart(){
    document.getElementById("sideMenu").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

function openCart(){
    document.getElementById("sideMenu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

document.addEventListener("DOMContentLoaded", updateUI);

</script>

</body>
</html>
